const Btn = ({children,onClick,color='blue',size='md',disabled,type='button',className=''}) => {
  const c = color==='blue'?'bg-brand hover:bg-brand-light text-white'
           :color==='red'?'bg-red-600 hover:bg-red-700 text-white'
           :color==='green'?'bg-green-600 hover:bg-green-700 text-white'
           :color==='gray'?'bg-gray-200 hover:bg-gray-300 text-gray-700'
           :'bg-white border border-gray-300 hover:bg-gray-50 text-gray-700';
  const s = size==='sm'?'px-3 py-1 text-xs':'px-4 py-2 text-sm';
  return <button type={type} onClick={onClick} disabled={disabled}
    className={`${c} ${s} rounded-lg font-medium transition disabled:opacity-50 disabled:cursor-not-allowed ${className}`}>
    {children}
  </button>;
};

const Badge = ({text,color='gray'}) => {

};

// LOGIN
function LoginPage({onLogin}) {
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const submit = async e => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      const {data,error} = await sb.rpc('fn_login',{p_email:email.trim(),p_password:pass});
      if(error) throw error;
      if(!data||!data.length){setErr('Credenciales incorrectas');setLoading(false);return;}
      const u=data[0];
      sessionStorage.setItem(SK,JSON.stringify(u));
      onLogin(u);
    } catch(e){ setErr('Error al conectar. Verifica tu conexión.'); setLoading(false); }
  };
  return (
    <div className="min-h-screen bg-gradient-to-br from-navy to-navy-light flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 fade">
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-brand rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg">
            <span className="text-white font-bold text-2xl">S</span>
          </div>
          <h1 className="text-xl font-bold text-gray-800">SERTA</h1>
          <p className="text-xs text-gray-500 mt-1">Sistema de Gestión Interna</p>
        </div>
        <form onSubmit={submit} className="space-y-4">
          <Input label="Correo electrónico" type="email" value={email} onChange={setEmail} required placeholder="usuario@serta.com.mx"/>
          <Input label="Contraseña" type="password" value={pass} onChange={setPass} required placeholder="••••••••"/>
          {err && <p className="text-red-600 text-xs bg-red-50 px-3 py-2 rounded-lg">{err}</p>}
          <Btn type="submit" disabled={loading} className="w-full justify-center">{loading?'Iniciando sesión...':'Iniciar Sesión'}</Btn>
        </form>
        <p className="text-center text-xs text-gray-400 mt-6">© {new Date().getFullYear()} SERTA de México</p>
      </div>
    </div>
  );
}

// DASHBOARD
function Dashboard({user}) {
  const [s,setS]=useState({emp:0,vac:0,proy:0,cli:0});
  useEffect(()=>{
    (async()=>{
      const [e,v,p,c]=await Promise.all([
        sb.from('empleados').select('id',{count:'exact',head:true}).eq('activo',true),
        sb.from('vacaciones').select('id',{count:'exact',head:true}).eq('estatus','Pendiente'),
        sb.from('proyectos').select('id',{count:'exact',head:true}).eq('estatus','En Progreso'),
        sb.from('clientes').select('id',{count:'exact',head:true}).eq('activo',true),
      ]);
      setS({emp:e.count||0,vac:v.count||0,proy:p.count||0,cli:c.count||0});
    })();
  },[]);
  const h=new Date().getHours();
  const sal=h<12?'Buenos días':h<18?'Buenas tardes':'Buenas noches';
  return (
    <div className="p-6 fade">
      <div className="mb-6">
        <h1 className="text-2xl font-bold text-gray-800">{sal}, {user.nombre.split(' ')[0]} 👋</h1>
        <p className="text-gray-500 text-sm mt-1">{new Date().toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <StatCard title="Empleados activos" value={s.emp} icon="👥" color="blue"/>
        <StatCard title="Vacaciones pendientes" value={s.vac} icon="🏖️" color="orange"/>
        <StatCard title="Proyectos en curso" value={s.proy} icon="🏗️" color="purple"/>
        <StatCard title="Clientes activos" value={s.cli} icon="🤝" color="green"/>
      </div>
      <div className="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm">
        <h2 className="font-semibold text-gray-700 mb-4">Módulos del sistema</h2>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
          {MODS.filter(m=>m.id!=='dashboard').map(m=>{
            const ok=!m.perm||user.rol==='Administrador'||user[m.perm];
            return ok?<div key={m.id} className="bg-gray-50 rounded-xl p-4 border border-gray-100"><div className="text-2xl mb-1">{m.icon}</div><p className="font-medium text-sm text-gray-700">{m.label}</p></div>:null;
          })}
        </div>
      </div>
    </div>
  );
}

function EmpleadosTab({user}) {
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [fDept,setFDept]=useState('');
  const [fRol,setFRol]=useState('');
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');
  const isAdmin=user.rol==='Administrador'; const puedeCrear=user.perm_empleados;

  const load=useCallback(async()=>{
    setLoading(true);
    const {data:d}=await sb.from('empleados').select('*').order('nombre');
    setData(d||[]); setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const depts=[...new Set((data||[]).map(e=>e.departamento).filter(Boolean))].sort();
  const filt=useMemo(()=>(data||[]).filter(e=>{
    const q=search.toLowerCase();
    return (!q||(e.nombre||'').toLowerCase().includes(q)||(e.email||'').toLowerCase().includes(q)||(e.puesto||'').toLowerCase().includes(q))
      &&(!fDept||e.departamento===fDept)&&(!fRol||e.rol===fRol);
  }),[data,search,fDept,fRol]);

  const ef={nombre:'',email:'',password:'',puesto:'',departamento:'',rol:'Analista',telefono:'',tipo_contrato:'Indefinido',salario:'',dias_vacaciones:6,activo:true,notas:'',perm_empleados:false,perm_clientes:false,perm_proveedores:false,perm_proyectos:false,perm_ventas:false,perm_finanzas:false,perm_calidad:false};

  const save=async e=>{
    e.preventDefault(); setSaving(true); setMsg('');
    try{
      if(modal==='nuevo'){
        const{error}=await sb.rpc('fn_crear_empleado',{
          p_nombre:form.nombre,p_email:form.email,p_password:form.password||'Serta2026!',
          p_departamento:form.departamento,p_rol:form.rol,p_puesto:form.puesto,
          p_telefono:form.telefono,p_salario:parseFloat(form.salario)||0,
          p_perm_empleados:!!form.perm_empleados,p_perm_clientes:!!form.perm_clientes,
          p_perm_proveedores:!!form.perm_proveedores,p_perm_proyectos:!!form.perm_proyectos,
          p_perm_ventas:!!form.perm_ventas,p_perm_finanzas:!!form.perm_finanzas,p_perm_calidad:!!form.perm_calidad});
        if(error) throw error;
      } else {
        const upd={nombre:form.nombre,puesto:form.puesto,departamento:form.departamento,rol:form.rol,telefono:form.telefono,tipo_contrato:form.tipo_contrato,salario:parseFloat(form.salario)||0,dias_vacaciones:parseInt(form.dias_vacaciones)||6,activo:form.activo,notas:form.notas,perm_empleados:!!form.perm_empleados,perm_clientes:!!form.perm_clientes,perm_proveedores:!!form.perm_proveedores,perm_proyectos:!!form.perm_proyectos,perm_ventas:!!form.perm_ventas,perm_finanzas:!!form.perm_finanzas,perm_calidad:!!form.perm_calidad};
        const{error}=await sb.from('empleados').update(upd).eq('id',sel.id);
        if(error) throw error;
        if(form.password) await sb.rpc('fn_cambiar_password',{p_id:sel.id,p_nueva:form.password});
      }
      setMsg('✅ Guardado correctamente');
      await load();
      setTimeout(()=>{setModal(null);setMsg('');},1100);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const PC=({k,lbl})=>(
    <label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
      <input type="checkbox" checked={!!form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.checked}))} className="w-4 h-4 accent-blue-600"/>
      {lbl}
    </label>
  );
  const rc=r=>r==='Administrador'?'blue':r==='Gerente'?'purple':r==='Coordinador'?'yellow':'gray';

  return (
    <div className="fade">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div><h2 className="text-xl font-bold text-gray-800">Empleados</h2><p className="text-sm text-gray-500">{filt.length} registro{filt.length!==1?'s':''}</p></div>
        {puedeCrear&&<Btn onClick={()=>{setForm(ef);setModal('nuevo');setMsg('');}}>+ Nuevo empleado</Btn>}
      </div>
      <div className="flex flex-wrap gap-2 mb-4">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar nombre, email, puesto..." className="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 flex-1 min-w-48"/>
        <select value={fDept} onChange={e=>setFDept(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
          <option value="">Todos los deptos.</option>
          {depts.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
        <select value={fRol} onChange={e=>setFRol(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
          <option value="">Todos los roles</option>
          {['Administrador','Gerente','Coordinador','Analista','Operativo'].map(r=><option key={r} value={r}>{r}</option>)}
        </select>
      </div>
      {loading?<Spin/>:filt.length===0?<Empty msg="Sin empleados registrados"/>:(
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="bg-gray-50 border-b border-gray-100">
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Nombre</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden md:table-cell">Puesto</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">Departamento</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Rol</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Estatus</th>
                <th className="px-4 py-3 text-right font-semibold text-gray-600">Acciones</th>
              </tr></thead>
              <tbody className="divide-y divide-gray-50">
                {filt.map(e=>(
                  <tr key={e.id} className="hover:bg-gray-50/70 transition">
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2">
                        <div className="w-8 h-8 bg-blue-50 rounded-full flex items-center justify-center flex-shrink-0">
                          <span className="text-blue-600 font-semibold text-xs">{(e.nombre||'?').charAt(0)}</span>
                        </div>
                        <div><p className="font-medium text-gray-800">{e.nombre}</p><p className="text-xs text-gray-400">{e.email}</p></div>
                      </div>
                    </td>
                    <td className="px-4 py-3 text-gray-600 hidden md:table-cell">{e.puesto||'—'}</td>
                    <td className="px-4 py-3 text-gray-600 hidden lg:table-cell">{e.departamento||'—'}</td>
                    <td className="px-4 py-3"><Badge text={e.rol} color={rc(e.rol)}/></td>
                    <td className="px-4 py-3"><Badge text={e.activo?'Activo':'Inactivo'} color={e.activo?'green':'red'}/></td>
                    <td className="px-4 py-3">
                      <div className="flex items-center justify-end gap-1">
                        <Btn size="sm" color="outline" onClick={()=>{setSel(e);setModal('ver');}}>Ver</Btn>
                        {isAdmin&&<Btn size="sm" color="outline" onClick={()=>{setSel(e);setForm({...e,password:''});setModal('editar');setMsg('');}}>Editar</Btn>}
                        {isAdmin&&<Btn size="sm" color={e.activo?'red':'green'} onClick={async()=>{await sb.from('empleados').update({activo:!e.activo}).eq('id',e.id);load();}}>{e.activo?'Desactivar':'Activar'}</Btn>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {modal==='ver'&&sel&&(
        <Modal title="Expediente de empleado" onClose={()=>setModal(null)} size="lg">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="flex flex-col items-center text-center">
              <div className="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-3">
                <span className="text-blue-600 font-bold text-4xl">{(sel.nombre||'?').charAt(0)}</span>
              </div>
              <h3 className="font-bold text-gray-800 text-lg">{sel.nombre}</h3>
              <p className="text-gray-500 text-sm">{sel.puesto}</p>
              <div className="mt-2 space-y-1"><Badge text={sel.rol} color={rc(sel.rol)}/></div>
              <div className="mt-1"><Badge text={sel.activo?'Activo':'Inactivo'} color={sel.activo?'green':'red'}/></div>
            </div>
            <div className="md:col-span-2 space-y-4">
              <div className="grid grid-cols-2 gap-3">
                {[['Email',sel.email],['Teléfono',sel.telefono||'—'],['Departamento',sel.departamento||'—'],['Contrato',sel.tipo_contrato||'—'],['Fecha ingreso',fmtD(sel.fecha_ingreso)],['Días vacaciones',sel.dias_vacaciones],['Salario',sel.salario?fmt(sel.salario):'—'],['Último acceso',fmtD(sel.ultimo_acceso)]].map(([k,v])=>(
                  <div key={k} className="bg-gray-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-0.5">{k}</p><p className="text-sm font-medium text-gray-800 break-all">{v}</p></div>
                ))}

              <div className="bg-gray-50 rounded-xl p-3">
                <p className="text-xs text-gray-500 mb-2">Permisos de acceso</p>
                <div className="flex flex-wrap gap-2">
                  {[['perm_empleados','RR.HH.'],['perm_clientes','Ventas'],['perm_finanzas','Finanzas'],['perm_proyectos','Proyectos'],['perm_calidad','Calidad']].map(([k,l])=>(
                    <Badge key={k} text={l} color={sel[k]?'green':'gray'}/>

            </div>

          <form onSubmit={save}>

              <Input label="Email" type="email" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))} required disabled={modal==='editar'}/>
              <Input label={modal==='nuevo'?'Contraseña':'Nueva contraseña (opcional)'} type="password" value={form.password} onChange={v=>setForm(f=>({...f,password:v}))} required={modal==='nuevo'}/>
              <Input label="Teléfono" value={form.telefono} onChange={v=>setForm(f=>({...f,telefono:v}))}/>
              <Input label="Puesto" value={form.puesto} onChange={v=>setForm(f=>({...f,puesto:v}))}/>
              <Input label="Departamento" value={form.departamento} onChange={v=>setForm(f=>({...f,departamento:v}))}/>
              <Sel label="Rol" value={form.rol} onChange={v=>setForm(f=>({...f,rol:v}))} options={(isAdmin?['Administrador','Gerente','Coordinador','Analista','Operativo']:['Gerente','Coordinador','Analista','Operativo']).map(r=>({value:r,label:r}))}/>
              <Sel label="Tipo de contrato" value={form.tipo_contrato} onChange={v=>setForm(f=>({...f,tipo_contrato:v}))} options={['Indefinido','Temporal','Por Proyecto','Honorarios'].map(r=>({value:r,label:r}))}/>
              <Input label="Salario mensual" type="number" value={form.salario} onChange={v=>setForm(f=>({...f,salario:v}))}/>
              <Input label="Días de vacaciones" type="number" value={form.dias_vacaciones} onChange={v=>setForm(f=>({...f,dias_vacaciones:v}))}/>
            </div>
            <div className="mt-4 p-4 bg-gray-50 rounded-xl">
              <p className="text-xs font-semibold text-gray-600 mb-3">Permisos de acceso</p>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                <PC k="perm_empleados" lbl="RR.HH."/>
                <PC k="perm_clientes" lbl="Ventas/CRM"/>
                <PC k="perm_proveedores" lbl="Proveedores"/>
                <PC k="perm_proyectos" lbl="Proyectos"/>
                <PC k="perm_ventas" lbl="Ventas extra"/>
                <PC k="perm_finanzas" lbl="Finanzas"/>
                <PC k="perm_calidad" lbl="Calidad"/>
              </div>
            </div>
            <div className="mt-4">
              <label className="text-xs font-medium text-gray-600 block mb-1">Notas</label>
              <textarea value={form.notas||''} onChange={e=>setForm(f=>({...f,notas:e.target.value}))} rows={2} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"/>
            </div>
            {modal==='editar'&&<div className="mt-3 flex items-center gap-2"><input type="checkbox" id="act" checked={!!form.activo} onChange={e=>setForm(f=>({...f,activo:e.target.checked}))} className="accent-blue-600"/><label htmlFor="act" className="text-sm text-gray-600">Empleado activo</label></div>}
            {msg&&<p className="mt-3 text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
            <div className="flex justify-end gap-2 mt-5">
              <Btn color="gray" onClick={()=>setModal(null)}>Cancelar</Btn>
              <Btn type="submit" disabled={saving}>{saving?'Guardando...':'Guardar'}</Btn>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

function VacacionesTab({user}) {
  const [data,setData]=useState([]);
  const [emps,setEmps]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');
  const [fEst,setFEst]=useState('');
  const isAdmin=user.rol==='Administrador'||user.rol==='Gerente';

  const load=useCallback(async()=>{
    setLoading(true);
    const [v,e]=await Promise.all([
      sb.from('vacaciones').select('*,emp:empleados!vacaciones_empleado_id_fkey(nombre,departamento),apr:empleados!vacaciones_aprobado_por_fkey(nombre)').order('created_at',{ascending:false}),
      sb.from('empleados').select('id,nombre,dias_vacaciones').eq('activo',true).order('nombre')
    ]);
    setData(v.data||[]); setEmps(e.data||[]); setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const filt=useMemo(()=>(data||[]).filter(v=>!fEst||v.estatus===fEst),[data,fEst]);
  const dias=(a,b)=>{if(!a||!b)return 0;return Math.max(0,Math.round((new Date(b)-new Date(a))/(864e5))+1);};
  const ef={empleado_id:'',fecha_inicio:'',fecha_fin:'',tipo:'Vacaciones',motivo:''};

  const save=async e=>{
    e.preventDefault(); setSaving(true); setMsg('');
    try{
      const d=dias(form.fecha_inicio,form.fecha_fin);
      const{error}=await sb.from('vacaciones').insert({empleado_id:parseInt(form.empleado_id),fecha_inicio:form.fecha_inicio,fecha_fin:form.fecha_fin,dias_solicitados:d,tipo:form.tipo,motivo:form.motivo,estatus:'Pendiente'});
      if(error) throw error;
      setMsg('✅ Solicitud registrada');
      await load();
      setTimeout(()=>{setModal(false);setMsg('');},1000);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const cambiar=async(id,est)=>{
    await sb.from('vacaciones').update({estatus:est,aprobado_por:user.id}).eq('id',id);
    load();
  };

  const ec=e=>e==='Aprobado'?'green':e==='Rechazado'?'red':'yellow';
  const ti=t=>t==='Vacaciones'?'🏖️':t==='Incapacidad'?'🏥':t==='Permiso con goce'?'✅':'⏸️';

  return (
    <div className="fade">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div><h2 className="text-xl font-bold text-gray-800">Vacaciones y Permisos</h2><p className="text-sm text-gray-500">{filt.length} solicitudes</p></div>
        <div className="flex gap-2">
          <select value={fEst} onChange={e=>setFEst(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="">Todos los estatus</option>
            {['Pendiente','Aprobado','Rechazado'].map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          <Btn onClick={()=>{setForm(ef);setModal(true);setMsg('');}}>+ Nueva solicitud</Btn>
        </div>
      </div>
      {loading?<Spin/>:filt.length===0?<Empty msg="Sin solicitudes registradas"/>:(
        <div className="space-y-3">
          {filt.map(v=>(
            <div key={v.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
              <div className="flex flex-wrap items-start justify-between gap-3">
                <div className="flex items-center gap-3">
                  <span className="text-2xl">{ti(v.tipo)}</span>
                  <div>
                    <p className="font-semibold text-gray-800">{v.emp?.nombre||'—'}</p>
                    <p className="text-xs text-gray-500">{v.emp?.departamento||''} · {v.tipo}</p>
                  </div>
                </div>
                <Badge text={v.estatus} color={ec(v.estatus)}/>
              </div>
              <div className="mt-3 grid grid-cols-3 gap-3 text-sm">
                <div className="bg-gray-50 rounded-xl p-3 text-center"><p className="text-xs text-gray-400">Inicio</p><p className="font-medium">{fmtD(v.fecha_inicio)}</p></div>
                <div className="bg-gray-50 rounded-xl p-3 text-center"><p className="text-xs text-gray-400">Fin</p><p className="font-medium">{fmtD(v.fecha_fin)}</p></div>
                <div className="bg-gray-50 rounded-xl p-3 text-center"><p className="text-xs text-gray-400">Días</p><p className="font-bold text-blue-600">{v.dias_solicitados}</p></div>
              </div>
              {v.motivo&&<p className="text-xs text-gray-500 mt-2">Motivo: {v.motivo}</p>}
              {isAdmin&&v.estatus==='Pendiente'&&(
                <div className="flex gap-2 mt-3">
                  <Btn size="sm" color="green" onClick={()=>cambiar(v.id,'Aprobado')}>✓ Aprobar</Btn>
                  <Btn size="sm" color="red" onClick={()=>cambiar(v.id,'Rechazado')}>✗ Rechazar</Btn>
                </div>
              )}
              {v.apr&&<p className="text-xs text-gray-400 mt-2">Revisado por: {v.apr.nombre}</p>}
            </div>
          ))}
        </div>
      )}
      {modal&&(
        <Modal title="Nueva solicitud" onClose={()=>setModal(false)}>
          <form onSubmit={save} className="space-y-4">
            <Sel label="Empleado" value={form.empleado_id||''} onChange={v=>setForm(f=>({...f,empleado_id:v}))} required options={[{value:'',label:'Selecciona empleado'},...emps.map(e=>({value:e.id,label:e.nombre}))]}/>
            <Sel label="Tipo" value={form.tipo} onChange={v=>setForm(f=>({...f,tipo:v}))} options={['Vacaciones','Permiso con goce','Permiso sin goce','Incapacidad'].map(t=>({value:t,label:t}))}/>
            <div className="grid grid-cols-2 gap-3">
              <Input label="Fecha inicio" type="date" value={form.fecha_inicio} onChange={v=>setForm(f=>({...f,fecha_inicio:v}))} required/>
              <Input label="Fecha fin" type="date" value={form.fecha_fin} onChange={v=>setForm(f=>({...f,fecha_fin:v}))} required/>
            </div>
            {form.fecha_inicio&&form.fecha_fin&&<p className="text-sm text-blue-600 font-medium bg-blue-50 px-3 py-2 rounded-lg">📅 Total: {dias(form.fecha_inicio,form.fecha_fin)} día(s)</p>}
            <div className="flex flex-col gap-1">
              <label className="text-xs font-medium text-gray-600">Motivo</label>
              <textarea value={form.motivo||''} onChange={e=>setForm(f=>({...f,motivo:e.target.value}))} rows={2} className="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"/>
            </div>
            {msg&&<p className="text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
            <div className="flex justify-end gap-2">
              <Btn color="gray" onClick={()=>setModal(false)}>Cancelar</Btn>
              <Btn type="submit" disabled={saving}>{saving?'Guardando...':'Registrar solicitud'}</Btn>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

function AsistenciasTab({user}) {
  const [data,setData]=useState([]);
  const [emps,setEmps]=useState([]);
  const [loading,setLoading]=useState(true);
  const [fecha,setFecha]=useState(new Date().toISOString().split('T')[0]);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');
  const isAdmin=user.rol==='Administrador'||user.rol==='Gerente';

  const load=useCallback(async()=>{
    setLoading(true);
    const [a,e]=await Promise.all([
      sb.from('asistencias').select('*,emp:empleados(nombre,departamento)').eq('fecha',fecha).order('created_at'),
      sb.from('empleados').select('id,nombre,departamento').eq('activo',true).order('nombre')
    ]);
    setData(a.data||[]); setEmps(e.data||[]); setLoading(false);
  },[fecha]);
  useEffect(()=>{load();},[load]);

  const byEmp=useMemo(()=>{const m={};(data||[]).forEach(a=>m[a.empleado_id]=a);return m;},[data]);
  const res=useMemo(()=>{const c={Presente:0,Ausente:0,Tarde:0,'Home Office':0,Vacaciones:0,Incapacidad:0};(data||[]).forEach(a=>{if(c[a.estatus]!==undefined)c[a.estatus]++;});return c;},[data]);

  const save=async e=>{
    e.preventDefault(); setSaving(true); setMsg('');
    try{
      const{error}=await sb.from('asistencias').upsert({empleado_id:parseInt(form.empleado_id),fecha:fecha,hora_entrada:form.hora_entrada||null,hora_salida:form.hora_salida||null,estatus:form.estatus,notas:form.notas||''},{onConflict:'empleado_id,fecha'});
      if(error) throw error;
      setMsg('✅ Registrado'); await load();
      setTimeout(()=>{setModal(false);setMsg('');},900);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const ec=s=>s==='Presente'?'green':s==='Ausente'?'red':s==='Tarde'?'yellow':s==='Home Office'?'blue':'gray';
  const ei=s=>s==='Presente'?'✅':s==='Ausente'?'❌':s==='Tarde'?'⚠️':s==='Home Office'?'🏠':s==='Vacaciones'?'🏖️':'🏥';

  return (
    <div className="fade">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div><h2 className="text-xl font-bold text-gray-800">Asistencias</h2><p className="text-sm text-gray-500">{data.length} registros</p></div>
        <div className="flex gap-2 items-center">
          <Input type="date" value={fecha} onChange={setFecha}/>
          {isAdmin&&<Btn onClick={()=>{setForm({estatus:'Presente',hora_entrada:'09:00',hora_salida:'18:00'});setModal(true);setMsg('');}}>+ Registrar</Btn>}
        </div>
      </div>
      <div className="grid grid-cols-3 md:grid-cols-6 gap-2 mb-5">
        {Object.entries(res).map(([k,v])=>(
          <div key={k} className="bg-white rounded-xl border border-gray-100 p-3 text-center shadow-sm">
            <p className="text-2xl font-bold text-gray-800">{v}</p><p className="text-xs text-gray-500 mt-0.5">{k}</p>
          </div>
        ))}
      </div>
      {loading?<Spin/>:(
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="bg-gray-50 border-b border-gray-100">
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Empleado</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden md:table-cell">Depto.</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Estatus</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">Entrada</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">Salida</th>
              </tr></thead>
              <tbody className="divide-y divide-gray-50">
                {emps.map(emp=>{
                  const r=byEmp[emp.id];
                  return (
                    <tr key={emp.id} className={`hover:bg-gray-50/70 transition ${!r?'opacity-60':''}`}>
                      <td className="px-4 py-3">
                        <div className="flex items-center gap-2">
                          <div className="w-7 h-7 bg-blue-50 rounded-full flex items-center justify-center">
                            <span className="text-blue-600 text-xs font-bold">{emp.nombre.charAt(0)}</span>
                          </div>
                          <span className="font-medium text-gray-800">{emp.nombre}</span>
                        </div>
                      </td>
                      <td className="px-4 py-3 text-gray-500 hidden md:table-cell">{emp.departamento||'—'}</td>
                      <td className="px-4 py-3">{r?<Badge text={`${ei(r.estatus)} ${r.estatus}`} color={ec(r.estatus)}/>:<Badge text="Sin registro" color="gray"/>}</td>
                      <td className="px-4 py-3 text-gray-600 hidden lg:table-cell">{r?.hora_entrada||'—'}</td>
                      <td className="px-4 py-3 text-gray-600 hidden lg:table-cell">{r?.hora_salida||'—'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {modal&&(
        <Modal title="Registrar asistencia" onClose={()=>setModal(false)}>
          <form onSubmit={save} className="space-y-4">
            <Sel label="Empleado" value={form.empleado_id||''} onChange={v=>setForm(f=>({...f,empleado_id:v}))} required options={[{value:'',label:'Selecciona empleado'},...emps.map(e=>({value:e.id,label:e.nombre}))]}/>
            <Sel label="Estatus" value={form.estatus} onChange={v=>setForm(f=>({...f,estatus:v}))} options={['Presente','Ausente','Tarde','Home Office','Vacaciones','Incapacidad'].map(s=>({value:s,label:s}))}/>
            <div className="grid grid-cols-2 gap-3">
              <Input label="Hora entrada" type="time" value={form.hora_entrada||''} onChange={v=>setForm(f=>({...f,hora_entrada:v}))}/>
              <Input label="Hora salida" type="time" value={form.hora_salida||''} onChange={v=>setForm(f=>({...f,hora_salida:v}))}/>
            </div>
            <Input label="Notas" value={form.notas||''} onChange={v=>setForm(f=>({...f,notas:v}))}/>
            {msg&&<p className="text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
            <div className="flex justify-end gap-2">
              <Btn color="gray" onClick={()=>setModal(false)}>Cancelar</Btn>
              <Btn type="submit" disabled={saving}>{saving?'Guardando...':'Registrar'}</Btn>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

function OrganigramaTab() {
  const [emps,setEmps]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    (async()=>{
      const{data}=await sb.from('empleados').select('id,nombre,puesto,departamento,rol').eq('activo',true).order('rol');
      setEmps(data||[]); setLoading(false);
    })();
  },[]);

  const byDept=useMemo(()=>{
    const m={};
    (emps||[]).forEach(e=>{const d=e.departamento||'Sin departamento';if(!m[d])m[d]=[];m[d].push(e);});
    return m;
  },[emps]);

  const ro=['Administrador','Gerente','Coordinador','Analista','Operativo'];
  const rc=r=>r==='Administrador'?'border-blue-400 bg-blue-50':r==='Gerente'?'border-purple-400 bg-purple-50':r==='Coordinador'?'border-yellow-400 bg-yellow-50':'border-gray-300 bg-white';
  const rb=r=>r==='Administrador'?'blue':r==='Gerente'?'purple':r==='Coordinador'?'yellow':'gray';

  return (
    <div className="fade">
      <div className="mb-5"><h2 className="text-xl font-bold text-gray-800">Organigrama</h2><p className="text-sm text-gray-500">{emps.length} empleados activos</p></div>
      {loading?<Spin/>:(
        <div className="space-y-6">
          {Object.entries(byDept).sort().map(([dept,list])=>(
            <div key={dept} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
              <div className="flex items-center gap-2 mb-4">
                <div className="w-2 h-6 bg-brand rounded-full"/>
                <h3 className="font-bold text-gray-700 text-lg">{dept}</h3>
                <span className="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded-full">{list.length}</span>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                {[...list].sort((a,b)=>ro.indexOf(a.rol)-ro.indexOf(b.rol)).map(e=>(
                  <div key={e.id} className={`border-2 ${rc(e.rol)} rounded-xl p-3 text-center`}>
                    <div className="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-2">
                      <span className="text-blue-600 font-bold text-lg">{e.nombre.charAt(0)}</span>
                    </div>
                    <p className="font-semibold text-gray-800 text-sm leading-tight">{e.nombre}</p>
                    <p className="text-gray-500 text-xs mt-0.5">{e.puesto||'—'}</p>
                    <div className="mt-2"><Badge text={e.rol} color={rb(e.rol)}/></div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function RRHHModule({user}) {
  const [tab,setTab]=useState('empleados');
  const tabs=[{id:'empleados',label:'👥 Empleados'},{id:'vacaciones',label:'🏖️ Vacaciones'},{id:'asistencias',label:'📅 Asistencias'},{id:'organigrama',label:'🏢 Organigrama'}];
  return (
    <div className="p-6 fade">
      <h1 className="text-2xl font-bold text-gray-800 mb-5">Recursos Humanos</h1>
      <div className="flex gap-1 bg-gray-100 rounded-xl p-1 mb-6 overflow-x-auto">
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap ${tab===t.id?'bg-white text-blue-600 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>
            {t.label}
          </button>
        ))}
      </div>
      {tab==='empleados'&&<EmpleadosTab user={user}/>}
      {tab==='vacaciones'&&<VacacionesTab user={user}/>}
      {tab==='asistencias'&&<AsistenciasTab user={user}/>}
      {tab==='organigrama'&&<OrganigramaTab/>}
    </div>
  );
}

function Pronto({titulo,icon,semana}) {
  return (
    <div className="p-6 flex items-center justify-center min-h-96 fade">
      <div className="text-center">
        <div className="text-6xl mb-4">{icon}</div>
        <h2 className="text-xl font-bold text-gray-700">{titulo}</h2>
        <p className="text-gray-400 text-sm mt-2">Módulo en construcción</p>
        <div className="mt-4 bg-blue-50 text-blue-600 text-sm px-4 py-2 rounded-xl inline-block">Próximamente — Semana {semana}</div>
      </div>
    </div>
  );
}

function App() {
  const [user,setUser]=useState(()=>getS());
  const [mod,setMod]=useState('dashboard');
  const logout=()=>{sessionStorage.removeItem(SK);setUser(null);};
  if(!user) return <LoginPage onLogin={u=>{setUser(u);setMod('dashboard');}}/>;
  return (
    <div className="flex min-h-screen">
      <Sidebar user={user} active={mod} setActive={setMod} onLogout={logout}/>
      <main className="flex-1 overflow-y-auto bg-gray-50">
        {mod==='dashboard' &&<Dashboard user={user}/>}
        {mod==='rrhh'      &&<RRHHModule user={user}/>}
        {mod==='ventas'    &&<Pronto titulo="Ventas / CRM" icon="💼" semana="2"/>}
        {mod==='finanzas'  &&<Pronto titulo="Finanzas" icon="💰" semana="2"/>}
        {mod==='proyectos' &&<Pronto titulo="Proyectos y Operaciones" icon="🏗️" semana="3"/>}
        {mod==='calidad'   &&<Pronto titulo="Calidad" icon="✅" semana="3"/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
