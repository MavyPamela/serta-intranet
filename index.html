// LOGIN ─────────────────────────────────────────────────────────
function LoginPage({onLogin}){
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const submit=async e=>{
    e.preventDefault();setErr('');setLoading(true);
    try{
      const{data,error}=await sb.rpc('fn_login',{p_email:email.trim(),p_password:pass});
      if(error)throw error;
      if(!data||!data.length){setErr('Credenciales incorrectas');setLoading(false);return;}
      sessionStorage.setItem(SK,JSON.stringify(data[0]));
      onLogin(data[0]);
    }catch(e){setErr('Error de conexión. Intenta de nuevo.');setLoading(false);}
  };
  return(
    <div className="min-h-screen flex">
      {/* Left panel — branding */}
      <div className="hidden lg:flex flex-col justify-between w-1/2 bg-navy-dark p-12" style={{background:'linear-gradient(145deg,#1a252f 0%,#2c3e50 60%,#3d5166 100%)'}}>
        <SertaLogo size="lg" white/>
        <div>
          <h2 className="text-white text-3xl font-bold leading-tight mb-4">Plataforma de<br/>Gestión Interna</h2>
          <p className="text-white/50 text-sm leading-relaxed">Centraliza proyectos, proveedores, requisiciones y comisiones en un solo lugar.</p>
        </div>
        <p className="text-white/25 text-xs">© {new Date().getFullYear()} SERTA de México · Confidencial</p>
      </div>
      {/* Right panel — login form */}
      <div className="flex-1 flex items-center justify-center p-8 bg-gray-50">
        <div className="w-full max-w-sm fade">
          {/* Mobile logo */}
          <div className="lg:hidden mb-10 flex justify-center">
            <SertaLogo size="lg"/>
          </div>
          <div className="mb-8">
            <h1 className="text-2xl font-bold text-gray-800">Bienvenido</h1>
            <p className="text-gray-500 text-sm mt-1">Ingresa tus credenciales para continuar</p>
          </div>
          <form onSubmit={submit} className="space-y-5">
            <div className="flex flex-col gap-1.5">
              <label className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Correo electrónico</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="usuario@serta.com.mx"
                className="border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand bg-white shadow-sm transition"/>
            </div>
            <div className="flex flex-col gap-1.5">
              <label className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Contraseña</label>
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)} required placeholder="••••••••"
                className="border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand bg-white shadow-sm transition"/>
            </div>
            {err&&<p className="text-red-600 text-xs bg-red-50 border border-red-100 px-3 py-2 rounded-xl">{err}</p>}
            <button type="submit" disabled={loading}
              className="w-full py-3 rounded-xl text-sm font-semibold text-white transition disabled:opacity-60"
              style={{background:'linear-gradient(90deg,#00b5b5,#00d0d0)',boxShadow:'0 4px 14px rgba(0,181,181,.4)'}}>
              {loading?'Iniciando sesión...':'Iniciar Sesión →'}
            </button>
          </form>
          <p className="text-center text-xs text-gray-400 mt-8">© {new Date().getFullYear()} SERTA de México</p>
        </div>
      </div>
    </div>
  );
}

function Dashboard({user}){
  const[s,setS]=useState({proy:0,cumples:[],aniversarios:[],
    reqsPendientes:[],vacPendientes:[],proyAutorizar:[],comBorradores:0,misVentas:[],
    esCumple:false,esAniversario:false,anosAntig:0});
  const canAprobar=user.rol==='Administrador'||user.perm_aprobar_req||user.perm_autorizar_proyectos;
  const canAprobarVac=user.rol==='Administrador'||user.perm_aprobar_vacaciones;
  const canVerCom=user.rol==='Administrador'||user.perm_ver_comisiones||user.perm_autorizar_proyectos;
  const esVendedor=user.perm_ventas;
  const esContabilidad=user.perm_finanzas||user.perm_contabilidad;

  useEffect(()=>{
    (async()=>{
      const hoy=new Date(); const mesActual=hoy.getMonth()+1; const diaActual=hoy.getDate();
      const[pRes,cbRes,rqRes,vacRes,proyAutRes,comBorRes,misVentasRes,empsRes]=await Promise.all([
        sb.from('proyectos').select('id',{count:'exact',head:true}).eq('status','Activo'),
        sb.from('empleados').select('nombre,cumple_dia,cumple_mes,foto_url,fecha_ingreso').eq('activo',true),
        canAprobar?sb.from('requisiciones').select('id,numero_requisicion,descripcion,total_pago').eq('status','Pendiente').eq('director_id',user.id).order('created_at',{ascending:false}).limit(8):{data:[]},
        canAprobarVac?sb.from('vacaciones').select('id,tipo,dias,fecha_inicio,fecha_fin').eq('estatus','Pendiente').order('created_at',{ascending:false}).limit(5):{data:[]},
        canAprobar?sb.from('proyectos').select('id,nombre,numero_proyecto,importe').in('status',['En venta','Venta','En espera de autorización']).order('created_at',{ascending:false}).limit(5):{data:[]},
        (canVerCom||esContabilidad)?sb.from('comisiones').select('id',{count:'exact',head:true}).eq('status','Borrador'):{data:null,count:0},
        esVendedor?sb.from('proyectos').select('id,nombre,status,importe,numero_proyecto').in('status',['En venta','Venta','En espera de autorización','Autorizado']).or(`vendedor_id.eq.${user.id},created_by.eq.${user.id}`).order('created_at',{ascending:false}).limit(5):{data:[]},
        sb.from('empleados').select('nombre,fecha_ingreso,foto_url').eq('activo',true).not('fecha_ingreso','is',null),
      ]);
      const emps=cbRes.data||[];
      const cumples=emps.filter(e=>e.cumple_mes===mesActual);
      // Aniversarios este mes
      const aniversarios=(empsRes.data||[]).filter(e=>{
        if(!e.fecha_ingreso)return false;
        const ing=new Date(e.fecha_ingreso);
        return (ing.getMonth()+1)===mesActual && ing.getFullYear()!==hoy.getFullYear();
      }).map(e=>{
        const ing=new Date(e.fecha_ingreso);
        return{...e, anos:hoy.getFullYear()-ing.getFullYear()};
      });
      // Cumpleaños/aniversario del usuario actual
      const userEmp=emps.find(e=>e.nombre===user.nombre);
      const esCumple=userEmp&&userEmp.cumple_dia===diaActual&&userEmp.cumple_mes===mesActual;
      const{data:empData}=await sb.from('empleados').select('fecha_ingreso').eq('id',user.id).single();
      let esAniversario=false; let anosAntig=0;
      if(empData?.fecha_ingreso){
        const ing=new Date(empData.fecha_ingreso);
        esAniversario=ing.getDate()===diaActual&&(ing.getMonth()+1)===mesActual&&ing.getFullYear()!==hoy.getFullYear();
        anosAntig=hoy.getFullYear()-ing.getFullYear();
      }
      setS({
        proy:pRes.count||0, cumples, aniversarios,
        reqsPendientes:rqRes.data||[], vacPendientes:vacRes.data||[],
        proyAutorizar:proyAutRes.data||[], comBorradores:comBorRes.count||0,
        misVentas:misVentasRes.data||[], esCumple, esAniversario, anosAntig,
      });
    })();
  },[canAprobar,canAprobarVac,canVerCom,esVendedor,esContabilidad,user.id,user.nombre]);

  const h=new Date().getHours();
  const sal=h<12?'Buenos días':h<18?'Buenas tardes':'Buenas noches';
  const MESES_N=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  return(
    <div className="fade" style={{minHeight:'100vh',background:'#f4f6f9'}}>

      {/* ── Banners de felicitación ── */}
      {s.esCumple&&(
        <div style={{background:'linear-gradient(135deg,#fce7f3,#fdf2f8)',borderBottom:'2px solid #f9a8d4',padding:'18px 32px',display:'flex',alignItems:'center',gap:'16px'}}>
          <span style={{fontSize:'2rem'}}>🎂</span>
          <div>
            <p style={{fontWeight:700,color:'#9d174d',fontSize:'1rem'}}>¡Feliz cumpleaños, {user.nombre.split(' ')[0]}!</p>
            <p style={{color:'#be185d',fontSize:'0.82rem'}}>Todo el equipo de SERTA te desea un día muy especial. ¡Que los cumplas muy feliz!</p>
          </div>
        </div>
      )}
      {s.esAniversario&&!s.esCumple&&(
        <div style={{background:'linear-gradient(135deg,#eff6ff,#dbeafe)',borderBottom:'2px solid #93c5fd',padding:'18px 32px',display:'flex',alignItems:'center',gap:'16px'}}>
          <span style={{fontSize:'2rem'}}>⭐</span>
          <div>
            <p style={{fontWeight:700,color:'#1e40af',fontSize:'1rem'}}>{s.anosAntig} {s.anosAntig===1?'año':'años'} con nosotros, {user.nombre.split(' ')[0]}</p>
            <p style={{color:'#1d4ed8',fontSize:'0.82rem'}}>Gracias por tu compromiso y dedicación. ¡Tu trayectoria es parte esencial de SERTA!</p>
          </div>
        </div>
      )}

      {/* ── Hero ── */}
      <div style={{background:'linear-gradient(135deg,#1a252f 0%,#2c3e50 60%,#3d5166 100%)',padding:'28px 32px 32px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:'-40px',right:'-40px',width:'260px',height:'260px',borderRadius:'50%',border:'1px solid rgba(0,181,181,0.12)'}}/>
        <div style={{position:'absolute',bottom:'-30px',left:'40%',width:'160px',height:'160px',borderRadius:'50%',border:'1px solid rgba(0,181,181,0.08)'}}/>
        <div style={{position:'relative'}}>
          <p style={{color:'rgba(255,255,255,0.5)',fontSize:'0.82rem',marginBottom:'4px'}}>{sal}, <span style={{color:'white',fontWeight:600}}>{user.nombre.split(' ')[0]}</span></p>
          <h1 style={{color:'white',fontSize:'1.75rem',fontWeight:800,lineHeight:1.2,marginBottom:'6px'}}>Bienvenido a SERTA Intranet</h1>
          <p style={{color:'rgba(255,255,255,0.35)',fontSize:'0.78rem'}}>{new Date().toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
          <div style={{marginTop:'16px',display:'flex',alignItems:'center',gap:'8px'}}>
            <div style={{height:'2px',width:'32px',borderRadius:'2px',background:'#00b5b5'}}/>
            <p style={{fontSize:'0.6rem',fontWeight:700,letterSpacing:'0.2em',color:'#00b5b5'}}>INTELLIGENCE PARTNER</p>
          </div>
        </div>
      </div>

      {/* ── Layout principal ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:'20px',padding:'24px',alignItems:'start'}}>

        {/* ════ COLUMNA IZQUIERDA ════ */}
        <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>

          {/* Misión · Visión · Filosofía */}
          <div style={{background:'white',borderRadius:'16px',border:'1px solid #f1f5f9',padding:'14px',boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'16px'}}>
              <div style={{width:'3px',height:'18px',borderRadius:'2px',background:'linear-gradient(180deg,#00b5b5,#008a8a)'}}/>
              <p style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.18em',color:'#6b7280'}}>Identidad Corporativa</p>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'14px'}}>
              <PillarCard icon="🎯" titulo="Nuestra Misión" tagline="Por qué existimos"
                accentBg="linear-gradient(135deg,#1a252f,#2c3e50)"
                desc="Ayudamos a las empresas a tomar decisiones estratégicas con inteligencia de mercados confiable y óptima. Integramos metodologías de vanguardia con tecnología avanzada para ofrecer soluciones perfectamente sustentadas."/>
              <PillarCard icon="🔭" titulo="Nuestra Visión" tagline="A dónde vamos"
                accentBg="linear-gradient(135deg,#007f7f,#00b5b5)"
                desc="Ser empresa referencia en inteligencia de mercados en México y los países donde trabajemos, reconocida por la confiabilidad, innovación y valor estratégico de nuestras soluciones para la toma de decisiones."/>
              <PillarCard icon="💬" titulo="Nuestra Filosofía" tagline="Cómo lo hacemos"
                accentBg="linear-gradient(135deg,#3d5166,#4a6177)"
                desc="Somos una opción inteligente. Combinamos experiencia, calidad y empatía. Creemos en analizar a fondo para proponer soluciones claras y fáciles de entender. Profundizamos para que lo complejo se vuelva simple."/>
            </div>
          </div>

          {/* Valores */}
          <div style={{background:'white',borderRadius:'16px',border:'1px solid #f1f5f9',padding:'14px',boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'16px'}}>
              <div style={{width:'3px',height:'18px',borderRadius:'2px',background:'linear-gradient(180deg,#00b5b5,#008a8a)'}}/>
              <p style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.18em',color:'#6b7280'}}>Nuestros Valores</p>
              <p style={{fontSize:'0.65rem',color:'#d1d5db',marginLeft:'4px'}}>· pasa el mouse para leer</p>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}}>
              {[
                {icon:'🤝',titulo:'Confianza',desc:'Trabajamos con transparencia y compromiso, generando relaciones basadas en la confianza mutua y en información precisa y oportuna.'},
                {icon:'⚖️',titulo:'Integridad',desc:'Nos guiamos por la honestidad y la ética en cada decisión, asegurando que cada análisis refleje fielmente la realidad del mercado.'},
                {icon:'💡',titulo:'Innovación',desc:'Nos mantenemos a la vanguardia con capacitación continua y herramientas tecnológicas de última generación para soluciones eficientes.'},
                {icon:'🔒',titulo:'Confidencialidad',desc:'La información es un activo estratégico. Operamos bajo un estricto código de ética que garantiza la protección de los datos de nuestros clientes.'},
                {icon:'🔗',titulo:'Sinergia',desc:'Fomentamos un entorno donde las habilidades de cada persona se combinan para generar un impacto mayor en nuestros clientes y proyectos.'},
                {icon:'🌿',titulo:'Bienestar',desc:'Promovemos el equilibrio entre vida profesional y personal — la salud y la felicidad del equipo son esenciales para nuestro éxito colectivo.'},
              ].map((v,i)=><ValorCard key={i} {...v}/>)}
            </div>
          </div>

          {/* Política de Calidad */}
          <CalidadCard/>

          {/* Celebraciones del mes */}
          {(s.cumples.length>0||s.aniversarios.length>0)&&(
            <div style={{background:'white',borderRadius:'16px',border:'1px solid #f1f5f9',padding:'20px',boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'16px'}}>
                <div style={{width:'3px',height:'18px',borderRadius:'2px',background:'linear-gradient(180deg,#f472b6,#fb7185)'}}/>
                <p style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.18em',color:'#6b7280'}}>Celebraciones de {MESES_N[new Date().getMonth()]}</p>
              </div>
              {s.cumples.length>0&&(
                <div style={{marginBottom:s.aniversarios.length>0?'16px':0}}>
                  <p style={{fontSize:'0.7rem',fontWeight:600,color:'#9d174d',marginBottom:'10px'}}>🎂 Cumpleaños</p>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
                    {s.cumples.map((e,i)=>(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:'8px',background:'#fdf2f8',borderRadius:'10px',padding:'8px 12px',border:'1px solid #fbcfe8'}}>
                        <Avatar nombre={e.nombre} foto_url={e.foto_url}/>
                        <div>
                          <p style={{fontSize:'0.78rem',fontWeight:600,color:'#1f2937'}}>{e.nombre.split(' ').slice(0,2).join(' ')}</p>
                          <p style={{fontSize:'0.68rem',color:'#be185d'}}>{e.cumple_dia} de {MESES_N[(e.cumple_mes||1)-1]}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {s.aniversarios.length>0&&(
                <div>
                  <p style={{fontSize:'0.7rem',fontWeight:600,color:'#1e40af',marginBottom:'10px'}}>⭐ Aniversarios</p>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
                    {s.aniversarios.map((e,i)=>(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:'8px',background:'#eff6ff',borderRadius:'10px',padding:'8px 12px',border:'1px solid #bfdbfe'}}>
                        <Avatar nombre={e.nombre} foto_url={e.foto_url}/>
                        <div>
                          <p style={{fontSize:'0.78rem',fontWeight:600,color:'#1f2937'}}>{e.nombre.split(' ').slice(0,2).join(' ')}</p>
                          <p style={{fontSize:'0.68rem',color:'#1d4ed8'}}>{e.anos} {e.anos===1?'año':'años'} en SERTA</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          <p style={{textAlign:'center',fontSize:'0.68rem',color:'#d1d5db',paddingBottom:'4px'}}>© {new Date().getFullYear()} SERTA de México · Confidencial · Uso interno</p>
        </div>

        {/* ════ COLUMNA DERECHA — Panel ejecutivo ════ */}
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>

          {/* Stat: proyectos activos */}
          <div style={{background:'linear-gradient(135deg,#1a252f,#2c3e50)',borderRadius:'16px',padding:'18px 20px',color:'white'}}>
            <p style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.15em',color:'rgba(255,255,255,0.45)',marginBottom:'6px'}}>Proyectos activos</p>
            <div style={{display:'flex',alignItems:'flex-end',gap:'8px'}}>
              <p style={{fontSize:'2.8rem',fontWeight:800,lineHeight:1,color:'#00d0d0'}}>{s.proy}</p>
              <p style={{fontSize:'0.75rem',color:'rgba(255,255,255,0.4)',marginBottom:'6px'}}>en curso</p>
            </div>
          </div>

          {/* Panel pendientes */}
          <div style={{background:'white',borderRadius:'16px',border:'1px solid #f1f5f9',overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
            <div style={{background:'#1a252f',padding:'14px 18px',display:'flex',alignItems:'center',gap:'8px'}}>
              <span style={{fontSize:'0.9rem'}}>⚡</span>
              <p style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.15em',color:'rgba(255,255,255,0.7)'}}>Mis pendientes</p>
            </div>
            <div style={{padding:'12px',display:'flex',flexDirection:'column',gap:'8px'}}>

              {/* Proyectos por autorizar */}
              {canAprobar&&(
                <div style={{borderRadius:'10px',border:'1px solid #ede9fe',overflow:'hidden'}}>
                  <div style={{background:'#f5f3ff',padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <p style={{fontSize:'0.68rem',fontWeight:700,color:'#5b21b6',textTransform:'uppercase',letterSpacing:'0.08em'}}>Proyectos · autorizar</p>
                    <span style={{background:'#7c3aed',color:'white',fontSize:'0.65rem',fontWeight:700,borderRadius:'99px',padding:'1px 7px'}}>{s.proyAutorizar.length}</span>
                  </div>
                  {s.proyAutorizar.length===0
                    ?<p style={{padding:'8px 12px',fontSize:'0.72rem',color:'#9ca3af',fontStyle:'italic'}}>Sin pendientes</p>
                    :<div>{s.proyAutorizar.map((p,i)=>(
                      <div key={i} style={{padding:'8px 12px',borderTop:'1px solid #f3f4f6',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div><p style={{fontSize:'0.75rem',fontWeight:600,color:'#1f2937'}}>{p.nombre}</p><p style={{fontSize:'0.65rem',color:'#9ca3af'}}>#{p.numero_proyecto}</p></div>
                        <p style={{fontSize:'0.72rem',fontWeight:700,color:'#7c3aed'}}>{fmt(p.importe||0)}</p>
                      </div>
                    ))}</div>
                  }
                </div>
              )}

              {/* Requisiciones */}
              {canAprobar&&(
                <div style={{borderRadius:'10px',border:'1px solid #fef3c7',overflow:'hidden'}}>
                  <div style={{background:'#fffbeb',padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <p style={{fontSize:'0.68rem',fontWeight:700,color:'#92400e',textTransform:'uppercase',letterSpacing:'0.08em'}}>Requisiciones · autorizar</p>
                    <span style={{background:'#d97706',color:'white',fontSize:'0.65rem',fontWeight:700,borderRadius:'99px',padding:'1px 7px'}}>{s.reqsPendientes.length}</span>
                  </div>
                  {s.reqsPendientes.length===0
                    ?<p style={{padding:'8px 12px',fontSize:'0.72rem',color:'#9ca3af',fontStyle:'italic'}}>Sin pendientes</p>
                    :<div>{s.reqsPendientes.map((r,i)=>(
                      <div key={i} style={{padding:'8px 12px',borderTop:'1px solid #f3f4f6',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div><p style={{fontSize:'0.75rem',fontWeight:600,color:'#1f2937'}}>{r.descripcion||'Req #'+r.numero_requisicion}</p><p style={{fontSize:'0.65rem',color:'#9ca3af'}}>#{r.numero_requisicion}</p></div>
                        <p style={{fontSize:'0.72rem',fontWeight:700,color:'#d97706'}}>{fmt(r.total_pago)}</p>
                      </div>
                    ))}</div>
                  }
                </div>
              )}

              {/* Vacaciones */}
              {canAprobarVac&&(
                <div style={{borderRadius:'10px',border:'1px solid #cffafe',overflow:'hidden'}}>
                  <div style={{background:'#ecfeff',padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <p style={{fontSize:'0.68rem',fontWeight:700,color:'#155e75',textTransform:'uppercase',letterSpacing:'0.08em'}}>Vacaciones · aprobar</p>
                    <span style={{background:'#0891b2',color:'white',fontSize:'0.65rem',fontWeight:700,borderRadius:'99px',padding:'1px 7px'}}>{s.vacPendientes.length}</span>
                  </div>
                  {s.vacPendientes.length===0
                    ?<p style={{padding:'8px 12px',fontSize:'0.72rem',color:'#9ca3af',fontStyle:'italic'}}>Sin pendientes</p>
                    :<div>{s.vacPendientes.map((v,i)=>(
                      <div key={i} style={{padding:'8px 12px',borderTop:'1px solid #f3f4f6',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div><p style={{fontSize:'0.75rem',fontWeight:600,color:'#1f2937'}}>{v.tipo}</p><p style={{fontSize:'0.65rem',color:'#9ca3af'}}>{fmtD(v.fecha_inicio)} → {fmtD(v.fecha_fin)}</p></div>
                        <span style={{fontSize:'0.7rem',fontWeight:700,color:'#0891b2'}}>{v.dias}d</span>
                      </div>
                    ))}</div>
                  }
                </div>
              )}

              {/* Comisiones en borrador */}
              {(canVerCom||esContabilidad)&&s.comBorradores>0&&(
                <div style={{borderRadius:'10px',border:'1px solid #d1fae5',background:'#ecfdf5',padding:'10px 12px',display:'flex',alignItems:'center',gap:'10px'}}>
                  <span style={{fontSize:'1.5rem',fontWeight:800,color:'#00b5b5'}}>{s.comBorradores}</span>
                  <div><p style={{fontSize:'0.72rem',fontWeight:600,color:'#065f46'}}>Comisión{s.comBorradores!==1?'es':''} en borrador</p><p style={{fontSize:'0.65rem',color:'#6b7280'}}>Pendiente{s.comBorradores!==1?'s':''} de revisar</p></div>
                </div>
              )}

              {/* Mis ventas (vendedor) */}
              {esVendedor&&s.misVentas.length>0&&(
                <div style={{borderRadius:'10px',border:'1px solid #e0f2fe',overflow:'hidden'}}>
                  <div style={{background:'#f0f9ff',padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <p style={{fontSize:'0.68rem',fontWeight:700,color:'#075985',textTransform:'uppercase',letterSpacing:'0.08em'}}>Mis ventas activas</p>
                    <span style={{background:'#0284c7',color:'white',fontSize:'0.65rem',fontWeight:700,borderRadius:'99px',padding:'1px 7px'}}>{s.misVentas.length}</span>
                  </div>
                  <div>{s.misVentas.map((p,i)=>(
                    <div key={i} style={{padding:'8px 12px',borderTop:'1px solid #f3f4f6',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div><p style={{fontSize:'0.75rem',fontWeight:600,color:'#1f2937'}}>{p.nombre}</p><p style={{fontSize:'0.65rem',color:'#9ca3af'}}>{p.status}</p></div>
                      <p style={{fontSize:'0.72rem',fontWeight:700,color:'#0284c7'}}>{fmt(p.importe||0)}</p>
                    </div>
                  ))}</div>
                </div>
              )}

              {!canAprobar&&!canAprobarVac&&!canVerCom&&!esContabilidad&&!esVendedor&&(
                <div style={{textAlign:'center',padding:'16px 0'}}>
                  <p style={{fontSize:'1.5rem',marginBottom:'6px'}}>✅</p>
                  <p style={{fontSize:'0.75rem',color:'#9ca3af'}}>Todo al día — sin pendientes</p>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function EmpleadosTab({user}){
  const[data,setData]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[fDept,setFDept]=useState('');
  const[modal,setModal]=useState(null);
  const[sel,setSel]=useState(null);
  const[form,setForm]=useState({});
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');
  const isAdmin=user.rol==='Administrador';
  const puedeCrear=user.perm_empleados||isAdmin;

  const load=useCallback(async()=>{
    setLoading(true);
    const{data:d}=await sb.from('empleados').select('*').order('nombre');
    setData(d||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const depts=[...new Set((data||[]).map(e=>e.departamento).filter(Boolean))].sort();
  const filt=useMemo(()=>(data||[]).filter(e=>{
    const q=search.toLowerCase();
    return(!q||(e.nombre||'').toLowerCase().includes(q)||(e.email||'').toLowerCase().includes(q)||(e.puesto||'').toLowerCase().includes(q))&&(!fDept||e.departamento===fDept);
  }),[data,search,fDept]);

  const ef={nombre:'',email:'',password:'',puesto:'',departamento:'',rol:'Analista',telefono:'',tipo_contrato:'Indefinido',salario:'',dias_vacaciones:6,fecha_ingreso:'',cumple_dia:'',cumple_mes:'',foto_url:'',notas:'',activo:true,
    perm_empleados:false,perm_clientes:false,perm_proveedores:false,perm_proyectos:false,perm_ventas:false,perm_finanzas:false,perm_calidad:false,
    perm_alta_empleados:false,perm_aprobar_vacaciones:false,perm_ver_salarios:false,perm_autorizar_proyectos:false,perm_asignar_pm:false,perm_requisiciones:false,perm_aprobar_req:false,perm_ver_comisiones:false};

  const save=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      if(modal==='nuevo'){
        const{error}=await sb.rpc('fn_crear_empleado',{
          p_nombre:form.nombre,p_email:form.email,p_password:form.password||'Serta2026!',
          p_departamento:form.departamento,p_rol:form.rol,p_puesto:form.puesto,
          p_telefono:form.telefono,p_salario:parseFloat(form.salario)||0,
          p_perm_empleados:!!form.perm_empleados,p_perm_clientes:!!form.perm_clientes,
          p_perm_proveedores:!!form.perm_proveedores,p_perm_proyectos:!!form.perm_proyectos,
          p_perm_ventas:!!form.perm_ventas,p_perm_finanzas:!!form.perm_finanzas,p_perm_calidad:!!form.perm_calidad});
        if(error)throw error;
        // Update extra fields
        const{data:nw}=await sb.from('empleados').select('id').eq('email',form.email).single();
        if(nw){
          await sb.from('empleados').update({
            fecha_ingreso:form.fecha_ingreso||null,cumple_dia:form.cumple_dia||null,cumple_mes:form.cumple_mes||null,foto_url:form.foto_url||'',notas:form.notas||'',
            perm_alta_empleados:!!form.perm_alta_empleados,perm_aprobar_vacaciones:!!form.perm_aprobar_vacaciones,perm_ver_salarios:!!form.perm_ver_salarios,
            perm_autorizar_proyectos:!!form.perm_autorizar_proyectos,perm_asignar_pm:!!form.perm_asignar_pm,
            perm_requisiciones:!!form.perm_requisiciones,perm_aprobar_req:!!form.perm_aprobar_req,perm_ver_comisiones:!!form.perm_ver_comisiones
          }).eq('id',nw.id);
        }
      }else{
        const upd={nombre:form.nombre,puesto:form.puesto,departamento:form.departamento,rol:form.rol,telefono:form.telefono,
          tipo_contrato:form.tipo_contrato,salario:parseFloat(form.salario)||0,dias_vacaciones:parseInt(form.dias_vacaciones)||6,
          activo:form.activo,notas:form.notas,foto_url:form.foto_url||'',
          fecha_ingreso:form.fecha_ingreso||null,cumple_dia:form.cumple_dia||null,cumple_mes:form.cumple_mes||null,
          perm_empleados:!!form.perm_empleados,perm_clientes:!!form.perm_clientes,perm_proveedores:!!form.perm_proveedores,
          perm_proyectos:!!form.perm_proyectos,perm_ventas:!!form.perm_ventas,perm_finanzas:!!form.perm_finanzas,perm_calidad:!!form.perm_calidad,
          perm_alta_empleados:!!form.perm_alta_empleados,perm_aprobar_vacaciones:!!form.perm_aprobar_vacaciones,perm_ver_salarios:!!form.perm_ver_salarios,
          perm_autorizar_proyectos:!!form.perm_autorizar_proyectos,perm_asignar_pm:!!form.perm_asignar_pm,
          perm_requisiciones:!!form.perm_requisiciones,perm_aprobar_req:!!form.perm_aprobar_req,perm_ver_comisiones:!!form.perm_ver_comisiones};
        const{error}=await sb.from('empleados').update(upd).eq('id',sel.id);
        if(error)throw error;
        if(form.password)await sb.rpc('fn_cambiar_password',{p_id:sel.id,p_nueva:form.password});
      }
      setMsg('✅ Guardado correctamente');
      await load();
      setTimeout(()=>{setModal(null);setMsg('');},1200);
    }catch(er){setMsg('❌ '+(er.message||'Error al guardar'));}
    setSaving(false);
  };

  const PC=({k,lbl})=>(<label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer"><input type="checkbox" checked={!!form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.checked}))} className="w-4 h-4 accent-blue-600"/>{lbl}</label>);
  const rc=r=>r==='Administrador'?'blue':r==='Gerente'?'purple':r==='Coordinador'?'yellow':'gray';

  return(
    <div className="fade">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div><h2 className="text-xl font-bold text-gray-800">Empleados</h2><p className="text-sm text-gray-500">{filt.length} registro{filt.length!==1?'s':''}</p></div>
        {puedeCrear&&<Btn onClick={()=>{setForm(ef);setModal('nuevo');setMsg('');}}>+ Nuevo empleado</Btn>}
      </div>
      <div className="flex flex-wrap gap-2 mb-4">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar nombre, email, puesto..." className="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 flex-1 min-w-48"/>
        <select value={fDept} onChange={e=>setFDept(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
          <option value="">Todos los deptos.</option>
          {depts.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
      </div>
      {loading?<Spin/>:filt.length===0?<Empty msg="Sin empleados registrados"/>:(
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="bg-gray-50 border-b border-gray-100">
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Empleado</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden md:table-cell">Puesto / Depto.</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Rol</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">Ingreso</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">Cumpleaños</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Estatus</th>
                <th className="px-4 py-3 text-right font-semibold text-gray-600">Acciones</th>
              </tr></thead>
              <tbody className="divide-y divide-gray-50">
                {filt.map(e=>(
                  <tr key={e.id} className="hover:bg-gray-50/70 transition">
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2">
                        <Avatar nombre={e.nombre} foto_url={e.foto_url}/>
                        <div><p className="font-medium text-gray-800">{e.nombre}</p><p className="text-xs text-gray-400">{e.email}</p></div>
                      </div>
                    </td>
                    <td className="px-4 py-3 hidden md:table-cell"><p className="text-gray-700">{e.puesto||'—'}</p><p className="text-xs text-gray-400">{e.departamento||'—'}</p></td>
                    <td className="px-4 py-3"><Badge text={e.rol} color={rc(e.rol)}/></td>
                    <td className="px-4 py-3 text-gray-500 text-xs hidden lg:table-cell">{fmtD(e.fecha_ingreso)}</td>
                    <td className="px-4 py-3 hidden lg:table-cell">
                      {e.cumple_dia&&e.cumple_mes?<span className="text-xs text-gray-600">🎂 {e.cumple_dia} {['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][e.cumple_mes-1]}</span>:<span className="text-xs text-gray-300">—</span>}
                    </td>
                    <td className="px-4 py-3"><Badge text={e.activo?'Activo':'Inactivo'} color={e.activo?'green':'red'}/></td>
                    <td className="px-4 py-3">
                      <div className="flex items-center justify-end gap-1">
                        <Btn size="sm" color="outline" onClick={()=>{setSel(e);setModal('ver');}}>Ver</Btn>
                        {isAdmin&&<Btn size="sm" color="outline" onClick={()=>{setSel(e);setForm({...e,password:''});setModal('editar');setMsg('');}}>Editar</Btn>}
                        {isAdmin&&<Btn size="sm" color={e.activo?'red':'green'} onClick={async()=>{await sb.from('empleados').update({activo:!e.activo}).eq('id',e.id);load();}}>{e.activo?'Baja':'Alta'}</Btn>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Modal VER */}
      {modal==='ver'&&sel&&(
        <Modal title="Expediente del empleado" onClose={()=>setModal(null)} size="lg">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="flex flex-col items-center text-center gap-2">
              <Avatar nombre={sel.nombre} foto_url={sel.foto_url} size="xl"/>
              <h3 className="font-bold text-gray-800 text-lg mt-2">{sel.nombre}</h3>
              <p className="text-gray-500 text-sm">{sel.puesto||'—'}</p>
              <Badge text={sel.rol} color={rc(sel.rol)}/>
              <Badge text={sel.activo?'Activo':'Inactivo'} color={sel.activo?'green':'red'}/>
              {sel.departamento&&<div className="bg-gray-100 rounded-lg px-3 py-1 text-xs text-gray-600">{sel.departamento}</div>}
            </div>
            <div className="md:col-span-2 space-y-4">
              <div className="grid grid-cols-2 gap-3">
                {[
                  ['📧 Email',sel.email],['📱 Teléfono',sel.telefono||'—'],
                  ['📅 Fecha ingreso',fmtD(sel.fecha_ingreso)],['🎂 Cumpleaños',sel.cumple_dia&&sel.cumple_mes?`${sel.cumple_dia} de ${['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'][sel.cumple_mes-1]}`:'—'],
                  ['📋 Tipo contrato',sel.tipo_contrato||'—'],['🏖️ Días de vacaciones',sel.dias_vacaciones||0],
                  ['🕐 Último acceso',sel.ultimo_acceso?fmtD(sel.ultimo_acceso):'—'],
                ].map(([k,v])=>(
                  <div key={k} className="bg-gray-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-0.5">{k}</p><p className="text-sm font-medium text-gray-800 break-all">{v}</p></div>
                ))}
              </div>
              <div className="bg-blue-50 rounded-xl p-3">
                <p className="text-xs text-gray-600 font-semibold mb-2">🔐 Permisos de módulos</p>
                <div className="flex flex-wrap gap-1.5">
                  {[['perm_empleados','RR.HH.'],['perm_clientes','Ventas'],['perm_finanzas','Finanzas'],['perm_proyectos','Proyectos'],['perm_calidad','Calidad'],['perm_alta_empleados','Alta empl.'],['perm_aprobar_vacaciones','Apr. vac.'],['perm_requisiciones','Requisiciones'],['perm_aprobar_req','Apr. req.'],['perm_ver_comisiones','Comisiones']].map(([k,l])=>(
                    <Badge key={k} text={l} color={sel[k]?'green':'gray'}/>
                  ))}
                </div>
              </div>
              {sel.notas&&<div className="bg-yellow-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-1">📝 Notas</p><p className="text-sm text-gray-700">{sel.notas}</p></div>}
            </div>
          </div>
        </Modal>
      )}

      {/* Modal NUEVO/EDITAR */}
      {(modal==='nuevo'||modal==='editar')&&(
        <Modal title={modal==='nuevo'?'Nuevo empleado':'Editar empleado'} onClose={()=>setModal(null)} size="xl">
          <form onSubmit={save}>
            {/* Datos personales */}
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Datos personales</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
              <Input label="Nombre completo" value={form.nombre} onChange={v=>setForm(f=>({...f,nombre:v}))} required/>
              <Input label="Email" type="email" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))} required disabled={modal==='editar'}/>
              <Input label={modal==='nuevo'?'Contraseña':'Nueva contraseña (opcional)'} type="password" value={form.password} onChange={v=>setForm(f=>({...f,password:v}))} required={modal==='nuevo'}/>
              <Input label="Teléfono" value={form.telefono} onChange={v=>setForm(f=>({...f,telefono:v}))}/>
              <div className="flex flex-col gap-1">
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Cumpleaños 🎂</label>
                <div className="flex gap-2">
                  <select value={form.cumple_dia||''} onChange={e=>setForm(f=>({...f,cumple_dia:e.target.value?parseInt(e.target.value):''}))}
                    className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white flex-1"
                    onFocus={e=>{e.target.style.borderColor='#00b5b5';e.target.style.boxShadow='0 0 0 3px rgba(0,181,181,0.15)';}}
                    onBlur={e=>{e.target.style.borderColor='';e.target.style.boxShadow='';}}>
                    <option value="">Día</option>
                    {Array.from({length:31},(_,i)=><option key={i+1} value={i+1}>{i+1}</option>)}
                  </select>
                  <select value={form.cumple_mes||''} onChange={e=>setForm(f=>({...f,cumple_mes:e.target.value?parseInt(e.target.value):''}))}
                    className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white flex-1"
                    onFocus={e=>{e.target.style.borderColor='#00b5b5';e.target.style.boxShadow='0 0 0 3px rgba(0,181,181,0.15)';}}
                    onBlur={e=>{e.target.style.borderColor='';e.target.style.boxShadow='';}}>
                    <option value="">Mes</option>
                    {['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'].map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}
                  </select>
                </div>
              </div>
              <Input label="Foto (URL de imagen)" value={form.foto_url} onChange={v=>setForm(f=>({...f,foto_url:v}))} placeholder="https://..."/>
            </div>
            {/* Datos laborales */}
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3 mt-2">Datos laborales</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
              <Input label="Puesto" value={form.puesto} onChange={v=>setForm(f=>({...f,puesto:v}))}/>
              <Sel label="Departamento" value={form.departamento} onChange={v=>setForm(f=>({...f,departamento:v}))}
                options={[{value:'',label:'Selecciona...'},{value:'Dirección General',label:'Dirección General'},{value:'Recursos Humanos',label:'Recursos Humanos'},{value:'Ventas / Comercial',label:'Ventas / Comercial'},{value:'Finanzas / Contabilidad',label:'Finanzas / Contabilidad'},{value:'Operaciones',label:'Operaciones'},{value:'Análisis',label:'Análisis'},{value:'Sistemas',label:'Sistemas'}]}/>
              <Sel label="Rol en el sistema" value={form.rol} onChange={v=>setForm(f=>({...f,rol:v}))}
                options={(isAdmin?['Administrador','Gerente','Coordinador','Analista','Operativo']:['Gerente','Coordinador','Analista','Operativo']).map(r=>({value:r,label:r}))}/>
              <Sel label="Tipo de contrato" value={form.tipo_contrato} onChange={v=>setForm(f=>({...f,tipo_contrato:v}))}
                options={['Indefinido','Temporal','Por Proyecto','Honorarios'].map(r=>({value:r,label:r}))}/>
              <Input label="Fecha de ingreso 📅" type="date" value={form.fecha_ingreso} onChange={v=>setForm(f=>({...f,fecha_ingreso:v}))}/>
              <Input label="Días de vacaciones" type="number" value={form.dias_vacaciones} onChange={v=>setForm(f=>({...f,dias_vacaciones:v}))}/>
            </div>
            {/* Permisos de módulos */}
            {isAdmin&&(<>
              <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3 mt-2">Acceso a módulos</p>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-2 p-4 rounded-xl mb-4" style={{background:'rgba(0,181,181,0.06)'}}>
                <PC k="perm_empleados" lbl="👥 RR.HH."/>
                <PC k="perm_clientes" lbl="💼 Ventas/CRM"/>
                <PC k="perm_proveedores" lbl="🏭 Proveedores"/>
                <PC k="perm_proyectos" lbl="🏗️ Proyectos"/>
                <PC k="perm_ventas" lbl="📊 Ventas extra"/>
                <PC k="perm_finanzas" lbl="💰 Finanzas"/>
                <PC k="perm_calidad" lbl="✅ Calidad"/>
              </div>
              <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Permisos de acciones</p>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-2 p-4 bg-orange-50 rounded-xl mb-4">
                <PC k="perm_alta_empleados" lbl="➕ Dar alta empleados"/>
                <PC k="perm_aprobar_vacaciones" lbl="✅ Aprobar vacaciones"/>
                <PC k="perm_autorizar_proyectos" lbl="📋 Autorizar proyectos"/>
                <PC k="perm_asignar_pm" lbl="👤 Asignar PM"/>
                <PC k="perm_requisiciones" lbl="📦 Crear requisiciones"/>
                <PC k="perm_aprobar_req" lbl="✔️ Aprobar requisiciones"/>
                <PC k="perm_ver_comisiones" lbl="💵 Ver comisiones"/>
              </div>
            </>)}
            <Textarea label="Notas" value={form.notas} onChange={v=>setForm(f=>({...f,notas:v}))}/>
            {modal==='editar'&&<div className="mt-3 flex items-center gap-2"><input type="checkbox" id="act" checked={!!form.activo} onChange={e=>setForm(f=>({...f,activo:e.target.checked}))} className="accent-blue-600"/><label htmlFor="act" className="text-sm text-gray-600">Empleado activo</label></div>}
            {msg&&<p className="mt-3 text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
            <div className="flex justify-end gap-2 mt-5">
              <Btn color="gray" onClick={()=>setModal(null)}>Cancelar</Btn>
              <Btn type="submit" disabled={saving}>{saving?'Guardando...':'Guardar empleado'}</Btn>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

// RR.HH. — VACACIONES (con días disponibles)
// ═══════════════════════════════════════════════════════════════
function VacacionesTab({user}){
  const[data,setData]=useState([]);
  const[emps,setEmps]=useState([]);
  const[loading,setLoading]=useState(true);
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({});
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');
  const[fEst,setFEst]=useState('');
  const[verEmp,setVerEmp]=useState(null);
  const puedeAprobar=user.perm_aprobar_vacaciones||user.rol==='Administrador'||user.rol==='Gerente';

  const load=useCallback(async()=>{
    setLoading(true);
    const[v,e]=await Promise.all([
      sb.from('vacaciones').select('*,emp:empleados!vacaciones_empleado_id_fkey(nombre,departamento,dias_vacaciones,foto_url),apr:empleados!vacaciones_aprobado_por_fkey(nombre)').order('created_at',{ascending:false}),
      sb.from('empleados').select('id,nombre,dias_vacaciones,departamento,foto_url').eq('activo',true).order('nombre')
    ]);
    setData(v.data||[]);setEmps(e.data||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  // Calcular días usados y disponibles por empleado en el año actual
  const diasUsadosPorEmp=useMemo(()=>{
    const m={};
    (data||[]).filter(v=>v.estatus==='Aprobado'&&v.tipo==='Vacaciones'&&new Date(v.fecha_inicio).getFullYear()===anioActual)
      .forEach(v=>{m[v.empleado_id]=(m[v.empleado_id]||0)+(v.dias_solicitados||0);});
    return m;
  },[data]);

  const filt=useMemo(()=>(data||[]).filter(v=>!fEst||v.estatus===fEst),[data,fEst]);
  const dias=(a,b)=>{if(!a||!b)return 0;return Math.max(0,Math.round((new Date(b)-new Date(a))/(864e5))+1);};
  const ef={empleado_id:'',fecha_inicio:'',fecha_fin:'',tipo:'Vacaciones',motivo:''};

  const save=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      const d=dias(form.fecha_inicio,form.fecha_fin);
      const{error}=await sb.from('vacaciones').insert({empleado_id:parseInt(form.empleado_id),fecha_inicio:form.fecha_inicio,fecha_fin:form.fecha_fin,dias_solicitados:d,tipo:form.tipo,motivo:form.motivo,estatus:'Pendiente'});
      if(error)throw error;
      setMsg('✅ Solicitud registrada');await load();
      setTimeout(()=>{setModal(false);setMsg('');},1000);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const cambiar=async(id,est)=>{
    await sb.from('vacaciones').update({estatus:est,aprobado_por:user.id}).eq('id',id);load();
  };

  const ec=e=>e==='Aprobado'?'green':e==='Rechazado'?'red':'yellow';
  const ti=t=>t==='Vacaciones'?'🏖️':t==='Incapacidad'?'🏥':t==='Permiso con goce'?'✅':'⏸️';

  return(
    <div className="fade">
      {/* Resumen de saldos */}
      <div className="mb-5">
        <h2 className="text-xl font-bold text-gray-800 mb-3">Vacaciones y Permisos</h2>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          {emps.slice(0,8).map(e=>{
            const usados=diasUsadosPorEmp[e.id]||0;
            const disponibles=(e.dias_vacaciones||0)-usados;
            const pct=e.dias_vacaciones?Math.round((usados/e.dias_vacaciones)*100):0;
            return(
              <div key={e.id} className="bg-white rounded-xl border border-gray-100 shadow-sm p-3">
                <div className="flex items-center gap-2 mb-2">
                  <Avatar nombre={e.nombre} foto_url={e.foto_url}/>

        </div>

        <div className="space-y-3">

                  </div>
                  <Badge text={v.estatus} color={ec(v.estatus)}/>

                <div className="mt-3 grid grid-cols-3 gap-3 text-sm">
                  <div className="bg-gray-50 rounded-xl p-3 text-center"><p className="text-xs text-gray-400">Inicio</p><p className="font-medium">{fmtD(v.fecha_inicio)}</p></div>
                  <div className="bg-gray-50 rounded-xl p-3 text-center"><p className="text-xs text-gray-400">Fin</p><p className="font-medium">{fmtD(v.fecha_fin)}</p></div>
                  <div className="bg-gray-50 rounded-xl p-3 text-center"><p className="text-xs text-gray-400">Días solicitados</p><p className="font-bold" style={{color:'#00b5b5'}}>{v.dias_solicitados}</p></div>

                    <Btn size="sm" color="red" onClick={()=>cambiar(v.id,'Rechazado')}>✗ Rechazar</Btn>
                  </div>
                )}
                {v.apr&&<p className="text-xs text-gray-400 mt-2">Revisado por: {v.apr.nombre}</p>}
              </div>

      {modal&&(
        <Modal title="Nueva solicitud de vacaciones/permiso" onClose={()=>setModal(false)}>

            <Sel label="Empleado" value={form.empleado_id||''} onChange={v=>{
              setForm(f=>({...f,empleado_id:v}));
            }} required options={[{value:'',label:'Selecciona empleado'},...emps.map(e=>({value:e.id,label:`${e.nombre} (${(e.dias_vacaciones||0)-(diasUsadosPorEmp[e.id]||0)} días disp.)`}))]}/>
            <Sel label="Tipo" value={form.tipo} onChange={v=>setForm(f=>({...f,tipo:v}))} options={['Vacaciones','Permiso con goce','Permiso sin goce','Incapacidad'].map(t=>({value:t,label:t}))}/>
            <div className="grid grid-cols-2 gap-3">
              <Input label="Fecha inicio" type="date" value={form.fecha_inicio} onChange={v=>setForm(f=>({...f,fecha_inicio:v}))} required/>
              <Input label="Fecha fin" type="date" value={form.fecha_fin} onChange={v=>setForm(f=>({...f,fecha_fin:v}))} required/>

            {form.fecha_inicio&&form.fecha_fin&&<div className="bg-blue-50 rounded-xl p-3 text-sm text-blue-700 font-medium">📅 Total: {dias(form.fecha_inicio,form.fecha_fin)} día(s) solicitado(s)</div>}
            <Textarea label="Motivo" value={form.motivo} onChange={v=>setForm(f=>({...f,motivo:v}))} rows={2}/>
            {msg&&<p className="text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
            <div className="flex justify-end gap-2">
              <Btn color="gray" onClick={()=>setModal(false)}>Cancelar</Btn>
              <Btn type="submit" disabled={saving}>{saving?'Guardando...':'Registrar solicitud'}</Btn>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

function CapacitacionesTab({user}){
  const[caps,setCaps]=useState([]);
  const[emps,setEmps]=useState([]);
  const[loading,setLoading]=useState(true);
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');
  const isAdmin=user.rol==='Administrador'||user.rol==='Gerente';

  const load=useCallback(async()=>{
    setLoading(true);
    const[c,e]=await Promise.all([
      sb.from('capacitaciones').select('*').order('created_at',{ascending:false}),
      sb.from('empleados').select('id,nombre,foto_url').eq('activo',true).order('nombre')
    ]);
    setCaps(c.data||[]);setEmps(e.data||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const ef={titulo:'',descripcion:'',tipo:'Interna',instructor:'',proveedor:'',fecha_inicio:'',fecha_fin:'',duracion_horas:'',obligatoria:false,departamento:'',costo:''};

  const save=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      const obj={titulo:form.titulo,descripcion:form.descripcion,tipo:form.tipo,instructor:form.instructor,proveedor:form.proveedor,fecha_inicio:form.fecha_inicio||null,fecha_fin:form.fecha_fin||null,duracion_horas:parseInt(form.duracion_horas)||0,obligatoria:!!form.obligatoria,departamento:form.departamento,costo:parseFloat(form.costo)||0,activa:true};
      if(modal==='nueva'){const{error}=await sb.from('capacitaciones').insert(obj);if(error)throw error;}
      else{const{error}=await sb.from('capacitaciones').update(obj).eq('id',form.id);if(error)throw error;}
      setMsg('✅ Guardado');await load();setTimeout(()=>{setModal(null);setMsg('');},1000);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const tc=t=>t==='Interna'?'blue':t==='Externa'?'purple':t==='Online'?'green':'orange';

  return(
    <div className="fade">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div><h2 className="text-xl font-bold text-gray-800">Capacitaciones</h2><p className="text-sm text-gray-500">{caps.length} programas registrados</p></div>
        {isAdmin&&<Btn onClick={()=>{setForm(ef);setModal('nueva');setMsg('');}}>+ Nueva capacitación</Btn>}
      </div>
      {loading?<Spin/>:caps.length===0?<Empty msg="Sin capacitaciones registradas"/>:(
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {caps.map(c=>(
            <div key={c.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
              <div className="flex items-start justify-between gap-2 mb-2">
                <div>
                  <h3 className="font-semibold text-gray-800">{c.titulo}</h3>
                  {c.departamento&&<p className="text-xs text-gray-500">{c.departamento}</p>}
                </div>
                <div className="flex gap-1 flex-shrink-0">
                  <Badge text={c.tipo} color={tc(c.tipo)}/>
                  {c.obligatoria&&<Badge text="Obligatoria" color="red"/>}
                </div>
              </div>
              {c.descripcion&&<p className="text-sm text-gray-600 mb-3">{c.descripcion}</p>}
              <div className="grid grid-cols-2 gap-2 text-xs text-gray-500">
                {c.instructor&&<span>👤 {c.instructor}</span>}
                {c.duracion_horas>0&&<span>⏱️ {c.duracion_horas} hrs</span>}
                {c.fecha_inicio&&<span>📅 {fmtD(c.fecha_inicio)}</span>}
                {c.costo>0&&<span>💰 {fmt(c.costo)}</span>}
              </div>
              {isAdmin&&(
                <div className="flex gap-2 mt-3">
                  <Btn size="sm" color="outline" onClick={()=>{setForm(c);setModal('editar');setMsg('');}}>Editar</Btn>
                  <Btn size="sm" color="red" onClick={async()=>{await sb.from('capacitaciones').delete().eq('id',c.id);load();}}>Eliminar</Btn>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
      {(modal==='nueva'||modal==='editar')&&(
        <Modal title={modal==='nueva'?'Nueva capacitación':'Editar capacitación'} onClose={()=>setModal(null)} size="lg">
          <form onSubmit={save}>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Input label="Título" value={form.titulo} onChange={v=>setForm(f=>({...f,titulo:v}))} required className="md:col-span-2"/>
              <Textarea label="Descripción" value={form.descripcion} onChange={v=>setForm(f=>({...f,descripcion:v}))} className="md:col-span-2"/>
              <Sel label="Tipo" value={form.tipo} onChange={v=>setForm(f=>({...f,tipo:v}))} options={['Interna','Externa','Online','Certificación'].map(t=>({value:t,label:t}))}/>
              <Sel label="Departamento" value={form.departamento} onChange={v=>setForm(f=>({...f,departamento:v}))} options={[{value:'',label:'Todos'},{value:'Dirección General',label:'Dirección General'},{value:'Recursos Humanos',label:'Recursos Humanos'},{value:'Ventas / Comercial',label:'Ventas / Comercial'},{value:'Finanzas / Contabilidad',label:'Finanzas / Contabilidad'},{value:'Operaciones',label:'Operaciones'},{value:'Análisis',label:'Análisis'},{value:'Sistemas',label:'Sistemas'}]}/>
              <Input label="Instructor" value={form.instructor} onChange={v=>setForm(f=>({...f,instructor:v}))}/>
              <Input label="Proveedor / Empresa" value={form.proveedor} onChange={v=>setForm(f=>({...f,proveedor:v}))}/>
              <Input label="Fecha inicio" type="date" value={form.fecha_inicio} onChange={v=>setForm(f=>({...f,fecha_inicio:v}))}/>
              <Input label="Fecha fin" type="date" value={form.fecha_fin} onChange={v=>setForm(f=>({...f,fecha_fin:v}))}/>
              <Input label="Duración (horas)" type="number" value={form.duracion_horas} onChange={v=>setForm(f=>({...f,duracion_horas:v}))}/>
              <Input label="Costo" type="number" value={form.costo} onChange={v=>setForm(f=>({...f,costo:v}))}/>
            </div>
            <label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer mt-3">
              <input type="checkbox" checked={!!form.obligatoria} onChange={e=>setForm(f=>({...f,obligatoria:e.target.checked}))} className="w-4 h-4 accent-blue-600"/>
              Capacitación obligatoria
            </label>
            {msg&&<p className="mt-3 text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
            <div className="flex justify-end gap-2 mt-5"><Btn color="gray" onClick={()=>setModal(null)}>Cancelar</Btn><Btn type="submit" disabled={saving}>{saving?'Guardando...':'Guardar'}</Btn></div>
          </form>
        </Modal>
      )}
    </div>
  );
}

// RR.HH. — ORGANIGRAMA

function OrganigramaTab(){
  const[emps,setEmps]=useState([]);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{(async()=>{const{data}=await sb.from('empleados').select('id,nombre,puesto,departamento,rol,foto_url').eq('activo',true).order('rol');setEmps(data||[]);setLoading(false);})();},[]);
  const byDept=useMemo(()=>{const m={};(emps||[]).forEach(e=>{const d=e.departamento||'Sin departamento';if(!m[d])m[d]=[];m[d].push(e);});return m;},[emps]);
  const ro=['Administrador','Gerente','Coordinador','Analista','Operativo'];
  const bc=r=>r==='Administrador'?'border-blue-400 bg-blue-50':r==='Gerente'?'border-purple-400 bg-purple-50':r==='Coordinador'?'border-yellow-400 bg-yellow-50':'border-gray-200 bg-white';
  const rb=r=>r==='Administrador'?'blue':r==='Gerente'?'purple':r==='Coordinador'?'yellow':'gray';
  return(
    <div className="fade">
      <div className="mb-5"><h2 className="text-xl font-bold text-gray-800">Organigrama</h2><p className="text-sm text-gray-500">{emps.length} empleados activos</p></div>
      {loading?<Spin/>:(
        <div className="space-y-6">
          {Object.entries(byDept).sort().map(([dept,list])=>(
            <div key={dept} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
              <div className="flex items-center gap-2 mb-4"><div className="w-2 h-6 bg-brand rounded-full"/><h3 className="font-bold text-gray-700 text-lg">{dept}</h3><span className="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full">{list.length}</span></div>
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                {[...list].sort((a,b)=>ro.indexOf(a.rol)-ro.indexOf(b.rol)).map(e=>(
                  <div key={e.id} className={`border-2 ${bc(e.rol)} rounded-xl p-3 text-center`}>
                    <div className="flex justify-center mb-2"><Avatar nombre={e.nombre} foto_url={e.foto_url} size="lg"/></div>
                    <p className="font-semibold text-gray-800 text-sm">{e.nombre}</p>
                    <p className="text-gray-500 text-xs mt-0.5">{e.puesto||'—'}</p>
                    <div className="mt-2"><Badge text={e.rol} color={rb(e.rol)}/></div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
