// PROVEEDORES
// ═══════════════════════════════════════════════════════════════
const ACTS_DEFAULT=['Aforos','Análisis','Asesorías en Estudio','Barridos','Captura','Codificación','Conteo Poblacional','Coordinación de Proyectos','Copias','Encuestas online','Encuestas Personales','Encuestas Telefónicas','Entrevista a Profundidad','Fuentes Secundarias','Gastos a Comprobar','Geolocalización','Incentivos Vales','Levantamiento de precios','Materiales/Regalos/Incentivos','Moderación','Mystery Shopper Internet','Mystery Shopper Personal','Mystery Shopper Telefónica','Otros Servicios','Reclutamiento','Renta de salas','Servicio de mesero','Supervisión Presencial','Supervisión Telefónica','Traducciones','Transcripciones','Varios','Viáticos'];

function ProveedoresModule({user}){
  const[data,setData]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[modal,setModal]=useState(null);
  const[sel,setSel]=useState(null);
  const[form,setForm]=useState({});
  const[contactos,setContactos]=useState([]);
  const[formCont,setFormCont]=useState({});
  const[modalCont,setModalCont]=useState(false);
  const[contForm,setContForm]=useState([{nombre:'',telefono:'',email:''},{nombre:'',telefono:'',email:''}]);
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');
  const[rfcWarn,setRfcWarn]=useState('');
  const[actividades,setActividades]=useState(ACTS_DEFAULT);
  const[modalActs,setModalActs]=useState(false);
  const[nuevaAct,setNuevaAct]=useState('');
  const[savingAct,setSavingAct]=useState(false);
  const isAdmin=user.rol==='Administrador'||user.rol==='Gerente'||user.perm_proveedores;
  const isSuperAdmin=user.rol==='Administrador';

  const load=useCallback(async()=>{
    setLoading(true);
    const{data:d}=await sb.from('proveedores').select('*').order('nombre');
    setData(d||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const loadActividades=useCallback(async()=>{
    const{data:a,error}=await sb.from('actividades_proveedor').select('*').eq('activo',true).order('orden');
    if(!error&&a&&a.length>0) setActividades(a.map(x=>x.nombre));
  },[]);
  useEffect(()=>{loadActividades();},[loadActividades]);

  const loadContactos=async(provId)=>{
    const{data:c}=await sb.from('proveedor_contactos').select('*').eq('proveedor_id',provId).order('es_principal',{ascending:false});
    setContactos(c||[]);
  };

  const filt=useMemo(()=>(data||[]).filter(p=>{
    const q=search.toLowerCase();
    return !q||(p.nombre||'').toLowerCase().includes(q)||(p.rfc||'').toLowerCase().includes(q)||(p.razon_social||'').toLowerCase().includes(q);
  }),[data,search]);

  const ef={nombre:'',razon_social:'',rfc:'',email:'',telefono:'',direccion:'',ciudad:'',estado:'',cp:'',categorias:[],calificacion:3,tipo_comprobante:'fisica_factura',banco:'',cuenta_banco:'',sucursal_banco:'',clabe:'',notas:'',activo:true};

  const checkRfc=async(rfc,excluirId=null)=>{
    if(!rfc||rfc.length<5){setRfcWarn('');return;}
    const{data:r}=await sb.rpc('fn_verificar_rfc',{p_rfc:rfc,p_excluir_id:excluirId||0,p_tabla:'ambas'});
    if(r&&r.length>0) setRfcWarn(`⚠️ RFC ya registrado como ${r[0].encontrado_en}: ${r[0].nombre}`);
    else setRfcWarn('');
  };

  const save=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      const obj={nombre:form.nombre,razon_social:form.razon_social,rfc:(form.rfc||'').toUpperCase().trim(),email:form.email,telefono:form.telefono,direccion:form.direccion,ciudad:form.ciudad,estado:form.estado,cp:form.cp,categoria:(form.categorias||[]).join(','),calificacion:parseInt(form.calificacion)||3,tipo_comprobante:form.tipo_comprobante||'fisica_factura',regimen_fiscal:form.tipo_comprobante||'fisica_factura',banco:form.banco,cuenta_banco:form.cuenta_banco,sucursal_banco:form.sucursal_banco||'',clabe:form.clabe,notas:form.notas,activo:form.activo!==false};
      let provId=sel?.id;
      if(modal==='nuevo'){
        const{data:ins,error}=await sb.from('proveedores').insert(obj).select('id').single();
        if(error)throw error;
        provId=ins.id;
      } else {
        const{error}=await sb.from('proveedores').update(obj).eq('id',sel.id);
        if(error)throw error;
      }
      // Guardar contactos inline (hasta 2)
      for(let i=0;i<contForm.length;i++){
        const c=contForm[i];
        if(!c.nombre?.trim())continue;
        const cObj={proveedor_id:provId,nombre:c.nombre.trim(),telefono:c.telefono||'',email:c.email||'',es_principal:i===0,puesto:'',notas:''};
        if(c.id){await sb.from('proveedor_contactos').update(cObj).eq('id',c.id);}
        else{await sb.from('proveedor_contactos').insert(cObj);}
      }
      setMsg('✅ Guardado correctamente');await load();
      setTimeout(()=>{setModal(null);setMsg('');setRfcWarn('');},1100);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const saveCont=async e=>{
    e.preventDefault();setSaving(true);
    try{
      const obj={proveedor_id:sel.id,nombre:formCont.nombre,puesto:formCont.puesto||'',email:formCont.email||'',telefono:formCont.telefono||'',es_principal:!!formCont.es_principal,notas:formCont.notas||''};
      if(formCont.id){await sb.from('proveedor_contactos').update(obj).eq('id',formCont.id);}
      else{await sb.from('proveedor_contactos').insert(obj);}
      await loadContactos(sel.id);setModalCont(false);setFormCont({});
    }catch(er){console.error(er);}
    setSaving(false);
  };

  const estrellas=n=>'★'.repeat(n)+'☆'.repeat(5-n);
  const cc=()=>'blue';

  const addActividad=async e=>{
    e.preventDefault();
    const nom=(nuevaAct||'').trim();
    if(!nom)return;
    setSavingAct(true);
    const{error}=await sb.from('actividades_proveedor').insert({nombre:nom,orden:actividades.length+1});
    if(!error){await loadActividades();setNuevaAct('');}
    setSavingAct(false);
  };

  const delActividad=async(nombre)=>{
    if(!confirm(`¿Eliminar "${nombre}"?`))return;
    await sb.from('actividades_proveedor').delete().eq('nombre',nombre);
    await loadActividades();
  };

  return(
    <div className="p-6 fade">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div><h1 className="text-2xl font-bold text-gray-800">Proveedores</h1><p className="text-sm text-gray-500">{filt.length} registros</p></div>
        <div className="flex gap-2 flex-wrap">
          {isSuperAdmin&&<Btn color="outline" onClick={()=>setModalActs(true)}>⚙️ Gestionar actividades</Btn>}
          {isAdmin&&<Btn onClick={()=>{setForm({...ef,categoria:actividades[0]||'Aforos'});setRfcWarn('');setContForm([{nombre:'',telefono:'',email:''},{nombre:'',telefono:'',email:''}]);setModal('nuevo');setMsg('');}}>+ Nuevo proveedor</Btn>}
        </div>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar nombre, RFC, razón social..." className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 mb-4"/>
      {loading?<Spin/>:filt.length===0?<Empty msg="Sin proveedores registrados"/>:(
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="bg-gray-50 border-b border-gray-100">
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Proveedor</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden md:table-cell">RFC</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">Actividad</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">Calificación</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Estatus</th>
                <th className="px-4 py-3 text-right font-semibold text-gray-600">Acciones</th>
              </tr></thead>
              <tbody className="divide-y divide-gray-50">
                {filt.map(p=>(
                  <tr key={p.id} className="hover:bg-gray-50/70 transition">
                    <td className="px-4 py-3">
                      <p className="font-medium text-gray-800">{p.nombre}</p>
                      <p className="text-xs text-gray-400">{p.razon_social||p.email||'—'}</p>
                    </td>
                    <td className="px-4 py-3 text-gray-600 font-mono text-xs hidden md:table-cell">{p.rfc||'—'}</td>
                    <td className="px-4 py-3 hidden lg:table-cell"><Badge text={p.categoria||'—'} color={cc(p.categoria)}/></td>
                    <td className="px-4 py-3 text-yellow-500 hidden lg:table-cell">{p.calificacion?estrellas(p.calificacion):'—'}</td>
                    <td className="px-4 py-3"><Badge text={p.activo?'Activo':'Inactivo'} color={p.activo?'green':'red'}/></td>
                    <td className="px-4 py-3">
                      <div className="flex items-center justify-end gap-1">
                        <Btn size="sm" color="outline" onClick={async()=>{setSel(p);await loadContactos(p.id);setModal('ver');}}>Ver</Btn>
                        {isAdmin&&<Btn size="sm" color="outline" onClick={async()=>{setSel(p);setForm({...p,categorias:p.categoria?(p.categoria.split(',').map(x=>x.trim()).filter(Boolean)):[],tipo_comprobante:p.tipo_comprobante||p.regimen_fiscal||'fisica_factura'});setRfcWarn('');setMsg('');const{data:cx}=await sb.from('proveedor_contactos').select('*').eq('proveedor_id',p.id).order('es_principal',{ascending:false});const lc=cx||[];setContForm([lc[0]?{id:lc[0].id,nombre:lc[0].nombre,telefono:lc[0].telefono||'',email:lc[0].email||''}:{nombre:'',telefono:'',email:''},lc[1]?{id:lc[1].id,nombre:lc[1].nombre,telefono:lc[1].telefono||'',email:lc[1].email||''}:{nombre:'',telefono:'',email:''}]);setModal('editar');}}>Editar</Btn>}
                        {isAdmin&&<Btn size="sm" color={p.activo?'red':'green'} onClick={async()=>{await sb.from('proveedores').update({activo:!p.activo}).eq('id',p.id);load();}}>{p.activo?'Baja':'Alta'}</Btn>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Modal VER */}
      {modal==='ver'&&sel&&(
        <Modal title="Detalle del proveedor" onClose={()=>setModal(null)} size="lg">
          <div className="space-y-4">
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              {[['🏢 Nombre',sel.nombre],['📋 Razón social',sel.razon_social||'—'],['🔢 RFC',sel.rfc||'—'],['📧 Email',sel.email||'—'],['📞 Teléfono',sel.telefono||'—'],['📍 Dirección',sel.direccion||'—'],['🏙️ Ciudad',sel.ciudad||'—'],['🗺️ Estado',sel.estado||'—'],['📮 C.P.',sel.cp||'—'],['🏷️ Actividades',sel.categoria||'—'],['🧾 Tipo comprobante',REGIMENES[sel.tipo_comprobante||sel.regimen_fiscal]?.label||sel.tipo_comprobante||'—'],['⭐ Calificación',sel.calificacion?estrellas(sel.calificacion):'—']].map(([k,v])=>(
                <div key={k} className="bg-gray-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-0.5">{k}</p><p className="text-sm font-medium text-gray-800">{v}</p></div>
              ))}
            </div>
            {(sel.banco||sel.cuenta_banco)&&(
              <div className="bg-blue-50 rounded-xl p-4">
                <p className="text-xs font-semibold text-gray-600 mb-2">🏦 Datos bancarios</p>
                <div className="grid grid-cols-3 gap-3">
                  {[['Banco',sel.banco],['Sucursal',sel.sucursal_banco||'—'],['Cuenta',sel.cuenta_banco],['CLABE',sel.clabe]].map(([k,v])=>(
                    <div key={k}><p className="text-xs text-gray-500">{k}</p><p className="text-sm font-medium font-mono">{v||'—'}</p></div>
                  ))}
                </div>
              </div>
            )}
            {/* Contactos */}
            <div>
              <div className="flex items-center justify-between mb-2">
                <p className="text-sm font-semibold text-gray-700">👤 Contactos directos</p>
                {isAdmin&&<Btn size="sm" onClick={()=>{setFormCont({});setModalCont(true);}}>+ Agregar</Btn>}
              </div>
              {contactos.length===0?<p className="text-sm text-gray-400 text-center py-4">Sin contactos registrados</p>:(
                <div className="space-y-2">
                  {contactos.map(c=>(
                    <div key={c.id} className="flex items-center justify-between bg-gray-50 rounded-xl p-3">
                      <div>
                        <div className="flex items-center gap-2">
                          <p className="text-sm font-medium text-gray-800">{c.nombre}</p>
                          {c.es_principal&&<Badge text="Principal" color="blue"/>}
                        </div>
                        <p className="text-xs text-gray-500">{c.puesto||''}{c.puesto&&c.email?' · ':''}{c.email||''}</p>
                        {c.telefono&&<p className="text-xs text-gray-500">📞 {c.telefono}</p>}
                      </div>
                      {isAdmin&&<div className="flex gap-1">
                        <Btn size="sm" color="outline" onClick={()=>{setFormCont(c);setModalCont(true);}}>Editar</Btn>
                        <Btn size="sm" color="red" onClick={async()=>{await sb.from('proveedor_contactos').delete().eq('id',c.id);loadContactos(sel.id);}}>×</Btn>
                      </div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
            {sel.notas&&<div className="bg-yellow-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-1">📝 Notas</p><p className="text-sm">{sel.notas}</p></div>}
          </div>
          {modalCont&&(
            <div className="modal-bg fixed inset-0 z-[60] flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 fade">
                <h3 className="font-semibold text-gray-800 mb-4">{formCont.id?'Editar':'Nuevo'} contacto</h3>
                <form onSubmit={saveCont} className="space-y-3">
                  <Input label="Nombre" value={formCont.nombre||''} onChange={v=>setFormCont(f=>({...f,nombre:v}))} required/>
                  <Input label="Puesto" value={formCont.puesto||''} onChange={v=>setFormCont(f=>({...f,puesto:v}))}/>
                  <Input label="Email" type="email" value={formCont.email||''} onChange={v=>setFormCont(f=>({...f,email:v}))}/>
                  <Input label="Teléfono" value={formCont.telefono||''} onChange={v=>setFormCont(f=>({...f,telefono:v}))}/>
                  <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" checked={!!formCont.es_principal} onChange={e=>setFormCont(f=>({...f,es_principal:e.target.checked}))} className="accent-blue-600"/>Contacto principal</label>
                  <div className="flex justify-end gap-2 mt-4">
                    <Btn color="gray" onClick={()=>setModalCont(false)}>Cancelar</Btn>
                    <Btn type="submit" disabled={saving}>{saving?'Guardando...':'Guardar'}</Btn>
                  </div>
                </form>
              </div>
            </div>
          )}
        </Modal>
      )}

      {/* Modal NUEVO/EDITAR */}
      {(modal==='nuevo'||modal==='editar')&&(
        <Modal title={modal==='nuevo'?'Nuevo proveedor':'Editar proveedor'} onClose={()=>{setModal(null);setRfcWarn('');}} size="xl">
          <form onSubmit={save}>
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Datos generales</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
              <Input label="Nombre comercial" value={form.nombre} onChange={v=>setForm(f=>({...f,nombre:v}))} required/>
              <Input label="Razón social" value={form.razon_social} onChange={v=>setForm(f=>({...f,razon_social:v}))}/>
              <div className="flex flex-col gap-1">
                <Input label="RFC" value={form.rfc} onChange={v=>{setForm(f=>({...f,rfc:v.toUpperCase()}));checkRfc(v,modal==='editar'?sel.id:null);}}/>
                {rfcWarn&&<p className="text-xs text-orange-600 bg-orange-50 px-2 py-1 rounded-lg">{rfcWarn}</p>}
              </div>
              <Input label="Email" type="email" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))}/>
              <Input label="Teléfono" value={form.telefono} onChange={v=>setForm(f=>({...f,telefono:v}))}/>
              <div className="flex flex-col gap-1 md:col-span-2">
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Actividades <span className="text-gray-300 font-normal normal-case">(selecciona una o varias)</span></label>
                <div className="flex flex-wrap gap-2 p-3 border border-gray-200 rounded-xl bg-gray-50 min-h-10">
                  {actividades.map(a=>{
                    const sel=(form.categorias||[]).includes(a);
                    return(<button key={a} type="button"
                      onClick={()=>setForm(f=>({...f,categorias:sel?(f.categorias||[]).filter(x=>x!==a):[...(f.categorias||[]),a]}))}
                      className="px-3 py-1 rounded-full text-xs font-medium border transition"
                      style={sel?{background:'#00b5b5',color:'white',borderColor:'#00b5b5'}:{background:'white',color:'#6b7280',borderColor:'#e5e7eb'}}>
                      {a}
                    </button>);
                  })}
                  {actividades.length===0&&<p className="text-xs text-gray-400">Sin actividades configuradas</p>}
                </div>
              </div>
              <Input label="Dirección" value={form.direccion} onChange={v=>setForm(f=>({...f,direccion:v}))} className="md:col-span-2"/>
              <Input label="Ciudad" value={form.ciudad} onChange={v=>setForm(f=>({...f,ciudad:v}))}/>
              <Input label="Estado" value={form.estado} onChange={v=>setForm(f=>({...f,estado:v}))}/>
              <Input label="C.P." value={form.cp} onChange={v=>setForm(f=>({...f,cp:v}))}/>
              <Sel label="Calificación" value={String(form.calificacion||3)} onChange={v=>setForm(f=>({...f,calificacion:parseInt(v)}))} options={[1,2,3,4,5].map(n=>({value:String(n),label:'★'.repeat(n)+'☆'.repeat(5-n)}))}/>
            </div>
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Tipo de comprobante <span className="text-gray-400 font-normal normal-case">(define el cálculo de IVA y retenciones en requisiciones)</span></p>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              {[
                {v:'fisica_factura',   label:'Persona física\ncon factura',    sub:'IVA · Ret.IVA · ISR'},
                {v:'fisica_honorarios',label:'Persona física\ncon honorarios', sub:'IVA · Ret.IVA · ISR'},
                {v:'extranjero',       label:'Persona\nextranjera',            sub:'Sin retenciones'},
                {v:'resico',           label:'Persona física\nRESICO',         sub:'Solo IVA'},
              ].map(opt=>{
                const sel=(form.tipo_comprobante||'fisica_factura')===opt.v;
                return(
                  <button key={opt.v} type="button"
                    onClick={()=>setForm(f=>({...f,tipo_comprobante:opt.v}))}
                    className="rounded-xl border-2 p-3 text-left transition"
                    style={sel?{borderColor:'#00b5b5',background:'rgba(0,181,181,0.07)'}:{borderColor:'#e5e7eb',background:'white'}}>
                    <p className="text-xs font-semibold text-gray-700 leading-tight whitespace-pre-line">{opt.label}</p>
                    <p className="text-xs mt-1" style={{color:sel?'#008a8a':'#9ca3af'}}>{opt.sub}</p>
                  </button>
                );
              })}
            </div>
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Datos bancarios (opcional)</p>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
              <Input label="Banco" value={form.banco||''} onChange={v=>setForm(f=>({...f,banco:v}))}/>
              <Input label="No. de sucursal" value={form.sucursal_banco||''} onChange={v=>setForm(f=>({...f,sucursal_banco:v}))} placeholder="Ej. 0012"/>
              <Input label="No. de cuenta" value={form.cuenta_banco||''} onChange={v=>setForm(f=>({...f,cuenta_banco:v}))}/>
              <Input label="CLABE interbancaria" value={form.clabe||''} onChange={v=>setForm(f=>({...f,clabe:v}))} className="md:col-span-1"/>
            </div>
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3 mt-2">Contactos <span className="font-normal text-gray-400 normal-case">(opcional, hasta 2)</span></p>
            <div className="space-y-3 mb-4">
              {[0,1].map(i=>(
                <div key={i} className="grid grid-cols-1 md:grid-cols-3 gap-3 p-3 rounded-xl border border-gray-100 bg-gray-50">
                  <p className="text-xs font-medium text-gray-500 md:col-span-3">{i===0?'👤 Contacto principal':'👤 Contacto secundario'}</p>
                  <Input label="Nombre" value={contForm[i]?.nombre||''} onChange={v=>setContForm(f=>{const n=[...f];n[i]={...n[i],nombre:v};return n;})} placeholder="Nombre completo"/>
                  <Input label="Teléfono" value={contForm[i]?.telefono||''} onChange={v=>setContForm(f=>{const n=[...f];n[i]={...n[i],telefono:v};return n;})} placeholder="Ej. 55 1234 5678"/>
                  <Input label="Email" type="email" value={contForm[i]?.email||''} onChange={v=>setContForm(f=>{const n=[...f];n[i]={...n[i],email:v};return n;})} placeholder="correo@ejemplo.com"/>
                </div>
              ))}
            </div>
            <Textarea label="Notas" value={form.notas} onChange={v=>setForm(f=>({...f,notas:v}))}/>
            {modal==='editar'&&<label className="flex items-center gap-2 text-sm mt-3 cursor-pointer"><input type="checkbox" checked={!!form.activo} onChange={e=>setForm(f=>({...f,activo:e.target.checked}))} className="accent-blue-600"/>Proveedor activo</label>}
            {msg&&<p className="mt-3 text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
            <div className="flex justify-end gap-2 mt-5"><Btn color="gray" onClick={()=>{setModal(null);setRfcWarn('');}}>Cancelar</Btn><Btn type="submit" disabled={saving}>{saving?'Guardando...':'Guardar proveedor'}</Btn></div>
          </form>
        </Modal>
      )}

      {/* Modal GESTIONAR ACTIVIDADES */}
      {modalActs&&(
        <Modal title="⚙️ Gestionar actividades" onClose={()=>setModalActs(false)} size="md">
          <div className="space-y-4">
            <p className="text-xs text-gray-500">Lista de actividades disponibles para clasificar proveedores. Solo el Administrador puede editarla.</p>
            <form onSubmit={addActividad} className="flex gap-2">
              <input value={nuevaAct} onChange={e=>setNuevaAct(e.target.value)} placeholder="Nueva actividad..." className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"/>
              <Btn type="submit" disabled={savingAct||!nuevaAct.trim()}>{savingAct?'...':'+ Agregar'}</Btn>
            </form>
            <div className="max-h-96 overflow-y-auto space-y-1">
              {actividades.map((a,i)=>(
                <div key={i} className="flex items-center justify-between bg-gray-50 hover:bg-gray-100 rounded-lg px-3 py-2 text-sm text-gray-700">
                  <span>{a}</span>
                  <button onClick={()=>delActividad(a)} className="text-red-400 hover:text-red-600 text-lg leading-none font-bold ml-2" title="Eliminar">×</button>
                </div>
              ))}
            </div>
            <p className="text-xs text-gray-400 text-right">{actividades.length} actividades registradas</p>
          </div>
        </Modal>
      )}
    </div>
  );
}
