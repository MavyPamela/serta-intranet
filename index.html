// CLIENTES
// ═══════════════════════════════════════════════════════════════
function ClientesModule({user}){
  const[data,setData]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[fSeg,setFSeg]=useState('');
  const[modal,setModal]=useState(null);
  const[sel,setSel]=useState(null);
  const[form,setForm]=useState({});
  const[contactos,setContactos]=useState([]);
  const[formCont,setFormCont]=useState({});
  const[modalCont,setModalCont]=useState(false);
  const[contForm,setContForm]=useState([{nombre:'',telefono:'',email:''},{nombre:'',telefono:'',email:''}]);
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');
  const[rfcWarn,setRfcWarn]=useState('');
  const canEdit=user.rol==='Administrador'||user.perm_clientes;

  const load=useCallback(async()=>{
    setLoading(true);
    const{data:d}=await sb.from('clientes').select('*').order('nombre');
    setData(d||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const loadContactos=async(cliId)=>{
    const{data:c}=await sb.from('contactos').select('*').eq('cliente_id',cliId).order('es_principal',{ascending:false});
    setContactos(c||[]);
  };

  const filt=useMemo(()=>(data||[]).filter(c=>{
    const q=search.toLowerCase();
    return(!q||(c.nombre||'').toLowerCase().includes(q)||(c.rfc||'').toLowerCase().includes(q)||(c.razon_social||'').toLowerCase().includes(q)||(c.empresa||'').toLowerCase().includes(q))&&(!fSeg||c.segmento===fSeg);
  }),[data,search,fSeg]);

  const ef={nombre:'',razon_social:'',empresa:'',rfc:'',email:'',telefono:'',direccion:'',ciudad:'',estado:'',cp:'',segmento:'Empresa',estatus:'Activo',notas:'',activo:true};

  const checkRfc=async(rfc,excluirId=null)=>{
    if(!rfc||rfc.length<5){setRfcWarn('');return;}
    const{data:r}=await sb.rpc('fn_verificar_rfc',{p_rfc:rfc,p_excluir_id:excluirId||0,p_tabla:'ambas'});
    if(r&&r.length>0) setRfcWarn(`⚠️ RFC ya registrado como ${r[0].encontrado_en}: ${r[0].nombre}`);
    else setRfcWarn('');
  };

  const save=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      const obj={nombre:form.nombre,razon_social:form.razon_social||'',empresa:form.empresa||form.nombre,rfc:(form.rfc||'').toUpperCase().trim(),email:form.email||'',telefono:form.telefono||'',direccion:form.direccion||'',ciudad:form.ciudad||'',estado:form.estado||'',cp:form.cp||'',segmento:form.segmento||'Empresa',estatus:form.estatus||'Activo',notas:form.notas||'',activo:form.activo!==false};
      let cliId=sel?.id;
      if(modal==='nuevo'){
        const{data:ins,error}=await sb.from('clientes').insert(obj).select('id').single();
        if(error)throw error;
        cliId=ins.id;
      } else {
        const{error}=await sb.from('clientes').update(obj).eq('id',sel.id);
        if(error)throw error;
      }
      // Guardar contactos inline (hasta 2)
      for(let i=0;i<contForm.length;i++){
        const c=contForm[i];
        if(!c.nombre?.trim())continue;
        const cObj={cliente_id:cliId,nombre:c.nombre.trim(),telefono:c.telefono||'',email:c.email||'',es_principal:i===0,puesto:'',notas:''};
        if(c.id){await sb.from('contactos').update(cObj).eq('id',c.id);}
        else{await sb.from('contactos').insert(cObj);}
      }
      setMsg('✅ Guardado correctamente');await load();
      setTimeout(()=>{setModal(null);setMsg('');setRfcWarn('');},1100);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const saveCont=async e=>{
    e.preventDefault();setSaving(true);
    try{
      const obj={cliente_id:sel.id,nombre:formCont.nombre,puesto:formCont.puesto||'',email:formCont.email||'',telefono:formCont.telefono||'',es_principal:!!formCont.es_principal,notas:formCont.notas||''};
      if(formCont.id){await sb.from('contactos').update(obj).eq('id',formCont.id);}
      else{await sb.from('contactos').insert(obj);}
      await loadContactos(sel.id);setModalCont(false);setFormCont({});
    }catch(er){console.error(er);}
    setSaving(false);
  };

  const sc=s=>s==='Empresa'?'blue':s==='Gobierno'?'purple':s==='PyME'?'green':'gray';
  const se=s=>s==='Activo'?'green':s==='Prospecto'?'yellow':'red';

  return(
    <div className="p-6 fade">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div><h1 className="text-2xl font-bold text-gray-800">Clientes</h1><p className="text-sm text-gray-500">{filt.length} registros</p></div>
        {canEdit&&<Btn onClick={()=>{setForm(ef);setRfcWarn('');setContForm([{nombre:'',telefono:'',email:''},{nombre:'',telefono:'',email:''}]);setModal('nuevo');setMsg('');}}>+ Nuevo cliente</Btn>}
      </div>
      <div className="flex flex-wrap gap-2 mb-4">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar nombre, RFC, razón social..." className="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 flex-1 min-w-48"/>
        <select value={fSeg} onChange={e=>setFSeg(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
          <option value="">Todos los segmentos</option>
          {['Empresa','Gobierno','PyME','Persona física'].map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>
      {loading?<Spin/>:filt.length===0?<Empty msg="Sin clientes registrados"/>:(
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="bg-gray-50 border-b border-gray-100">
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Cliente</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden md:table-cell">RFC</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">Ciudad</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Segmento</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Estatus</th>
                <th className="px-4 py-3 text-right font-semibold text-gray-600">Acciones</th>
              </tr></thead>
              <tbody className="divide-y divide-gray-50">
                {filt.map(c=>(
                  <tr key={c.id} className="hover:bg-gray-50/70 transition">
                    <td className="px-4 py-3">
                      <p className="font-medium text-gray-800">{c.nombre}</p>
                      <p className="text-xs text-gray-400">{c.razon_social||c.email||'—'}</p>
                    </td>
                    <td className="px-4 py-3 text-gray-600 font-mono text-xs hidden md:table-cell">{c.rfc||'—'}</td>
                    <td className="px-4 py-3 text-gray-500 hidden lg:table-cell">{c.ciudad||'—'}</td>
                    <td className="px-4 py-3"><Badge text={c.segmento||'—'} color={sc(c.segmento)}/></td>
                    <td className="px-4 py-3"><Badge text={c.estatus||'Activo'} color={se(c.estatus)}/></td>
                    <td className="px-4 py-3">
                      <div className="flex items-center justify-end gap-1">
                        <Btn size="sm" color="outline" onClick={async()=>{setSel(c);await loadContactos(c.id);setModal('ver');}}>Ver</Btn>
                        {canEdit&&<Btn size="sm" color="outline" onClick={async()=>{setSel(c);setForm({...c});setRfcWarn('');setMsg('');const{data:cx}=await sb.from('contactos').select('*').eq('cliente_id',c.id).order('es_principal',{ascending:false});const lc=cx||[];setContForm([lc[0]?{id:lc[0].id,nombre:lc[0].nombre,telefono:lc[0].telefono||'',email:lc[0].email||''}:{nombre:'',telefono:'',email:''},lc[1]?{id:lc[1].id,nombre:lc[1].nombre,telefono:lc[1].telefono||'',email:lc[1].email||''}:{nombre:'',telefono:'',email:''}]);setModal('editar');}}>Editar</Btn>}
                        {canEdit&&<Btn size="sm" color={c.activo?'red':'green'} onClick={async()=>{await sb.from('clientes').update({activo:!c.activo,estatus:c.activo?'Inactivo':'Activo'}).eq('id',c.id);load();}}>{c.activo?'Baja':'Alta'}</Btn>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Modal VER */}
      {modal==='ver'&&sel&&(
        <Modal title="Detalle del cliente" onClose={()=>setModal(null)} size="lg">
          <div className="space-y-4">
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              {[['🏢 Nombre',sel.nombre],['📋 Razón social',sel.razon_social||'—'],['🔢 RFC',sel.rfc||'—'],['📧 Email',sel.email||'—'],['📞 Teléfono',sel.telefono||'—'],['📍 Dirección',sel.direccion||'—'],['🏙️ Ciudad',sel.ciudad||'—'],['🗺️ Estado',sel.estado||'—'],['📮 C.P.',sel.cp||'—'],['🏷️ Segmento',sel.segmento||'—'],['📊 Estatus',sel.estatus||'—']].map(([k,v])=>(
                <div key={k} className="bg-gray-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-0.5">{k}</p><p className="text-sm font-medium text-gray-800">{v}</p></div>
              ))}
            </div>
            {/* Contactos */}
            <div>
              <div className="flex items-center justify-between mb-2">
                <p className="text-sm font-semibold text-gray-700">👤 Contactos</p>
                {canEdit&&<Btn size="sm" onClick={()=>{setFormCont({});setModalCont(true);}}>+ Agregar</Btn>}
              </div>
              {contactos.length===0?<p className="text-sm text-gray-400 text-center py-4">Sin contactos registrados</p>:(
                <div className="space-y-2">
                  {contactos.map(c=>(
                    <div key={c.id} className="flex items-center justify-between bg-gray-50 rounded-xl p-3">
                      <div>
                        <div className="flex items-center gap-2"><p className="text-sm font-medium text-gray-800">{c.nombre}</p>{c.es_principal&&<Badge text="Principal" color="blue"/>}</div>
                        <p className="text-xs text-gray-500">{c.puesto||''}{c.puesto&&c.email?' · ':''}{c.email||''}</p>
                        {c.telefono&&<p className="text-xs text-gray-500">📞 {c.telefono}</p>}
                      </div>
                      {canEdit&&<div className="flex gap-1">
                        <Btn size="sm" color="outline" onClick={()=>{setFormCont(c);setModalCont(true);}}>Editar</Btn>
                        <Btn size="sm" color="red" onClick={async()=>{await sb.from('contactos').delete().eq('id',c.id);loadContactos(sel.id);}}>×</Btn>
                      </div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
            {sel.notas&&<div className="bg-yellow-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-1">📝 Notas</p><p className="text-sm">{sel.notas}</p></div>}
          </div>
          {modalCont&&(
            <div className="modal-bg fixed inset-0 z-[60] flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 fade">
                <h3 className="font-semibold text-gray-800 mb-4">{formCont.id?'Editar':'Nuevo'} contacto</h3>
                <form onSubmit={saveCont} className="space-y-3">
                  <Input label="Nombre" value={formCont.nombre||''} onChange={v=>setFormCont(f=>({...f,nombre:v}))} required/>
                  <Input label="Puesto" value={formCont.puesto||''} onChange={v=>setFormCont(f=>({...f,puesto:v}))}/>
                  <Input label="Email" type="email" value={formCont.email||''} onChange={v=>setFormCont(f=>({...f,email:v}))}/>
                  <Input label="Teléfono" value={formCont.telefono||''} onChange={v=>setFormCont(f=>({...f,telefono:v}))}/>
                  <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" checked={!!formCont.es_principal} onChange={e=>setFormCont(f=>({...f,es_principal:e.target.checked}))} className="accent-blue-600"/>Contacto principal</label>
                  <div className="flex justify-end gap-2 mt-4">
                    <Btn color="gray" onClick={()=>setModalCont(false)}>Cancelar</Btn>
                    <Btn type="submit" disabled={saving}>{saving?'Guardando...':'Guardar'}</Btn>
                  </div>
                </form>
              </div>
            </div>
          )}
        </Modal>
      )}

      {/* Modal NUEVO/EDITAR */}
      {(modal==='nuevo'||modal==='editar')&&(
        <Modal title={modal==='nuevo'?'Nuevo cliente':'Editar cliente'} onClose={()=>{setModal(null);setRfcWarn('');}} size="xl">
          <form onSubmit={save}>
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Datos generales</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
              <Input label="Nombre comercial" value={form.nombre} onChange={v=>setForm(f=>({...f,nombre:v}))} required/>
              <Input label="Razón social" value={form.razon_social||''} onChange={v=>setForm(f=>({...f,razon_social:v}))}/>
              <div className="flex flex-col gap-1">
                <Input label="RFC" value={form.rfc||''} onChange={v=>{setForm(f=>({...f,rfc:v.toUpperCase()}));checkRfc(v,modal==='editar'?sel.id:null);}}/>
                {rfcWarn&&<p className="text-xs text-orange-600 bg-orange-50 px-2 py-1 rounded-lg">{rfcWarn}</p>}
              </div>
              <Input label="Email" type="email" value={form.email||''} onChange={v=>setForm(f=>({...f,email:v}))}/>
              <Input label="Teléfono" value={form.telefono||''} onChange={v=>setForm(f=>({...f,telefono:v}))}/>
              <Sel label="Segmento" value={form.segmento||'Empresa'} onChange={v=>setForm(f=>({...f,segmento:v}))} options={['Empresa','Gobierno','PyME','Persona física'].map(s=>({value:s,label:s}))}/>
              <Input label="Dirección" value={form.direccion||''} onChange={v=>setForm(f=>({...f,direccion:v}))} className="md:col-span-2"/>
              <Input label="Ciudad" value={form.ciudad||''} onChange={v=>setForm(f=>({...f,ciudad:v}))}/>
              <Input label="Estado" value={form.estado||''} onChange={v=>setForm(f=>({...f,estado:v}))}/>
              <Input label="C.P." value={form.cp||''} onChange={v=>setForm(f=>({...f,cp:v}))}/>
              <Sel label="Estatus" value={form.estatus||'Activo'} onChange={v=>setForm(f=>({...f,estatus:v}))} options={['Activo','Prospecto','Inactivo'].map(s=>({value:s,label:s}))}/>
            </div>
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3 mt-2">Contactos <span className="font-normal text-gray-400 normal-case">(opcional, hasta 2)</span></p>
            <div className="space-y-3 mb-4">
              {[0,1].map(i=>(
                <div key={i} className="grid grid-cols-1 md:grid-cols-3 gap-3 p-3 rounded-xl border border-gray-100 bg-gray-50">
                  <p className="text-xs font-medium text-gray-500 md:col-span-3">{i===0?'👤 Contacto principal':'👤 Contacto secundario'}</p>
                  <Input label="Nombre" value={contForm[i]?.nombre||''} onChange={v=>setContForm(f=>{const n=[...f];n[i]={...n[i],nombre:v};return n;})} placeholder="Nombre completo"/>
                  <Input label="Teléfono" value={contForm[i]?.telefono||''} onChange={v=>setContForm(f=>{const n=[...f];n[i]={...n[i],telefono:v};return n;})} placeholder="Ej. 55 1234 5678"/>
                  <Input label="Email" type="email" value={contForm[i]?.email||''} onChange={v=>setContForm(f=>{const n=[...f];n[i]={...n[i],email:v};return n;})} placeholder="correo@ejemplo.com"/>
                </div>
              ))}
            </div>
            <Textarea label="Notas" value={form.notas||''} onChange={v=>setForm(f=>({...f,notas:v}))}/>
            {msg&&<p className="mt-3 text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
            <div className="flex justify-end gap-2 mt-5"><Btn color="gray" onClick={()=>{setModal(null);setRfcWarn('');}}>Cancelar</Btn><Btn type="submit" disabled={saving}>{saving?'Guardando...':'Guardar cliente'}</Btn></div>
          </form>
        </Modal>
      )}
    </div>
  );
}

function Pronto({titulo,icon,semana}){
  return(
    <div className="p-6 flex items-center justify-center min-h-96 fade">
      <div className="text-center bg-white rounded-2xl border border-gray-100 shadow-sm px-12 py-12">
        <div className="text-6xl mb-4 opacity-70">{icon}</div>
        <h2 className="text-xl font-bold text-gray-700">{titulo}</h2>
        <p className="text-gray-400 text-sm mt-2">Módulo en construcción</p>
        <div className="mt-5 inline-block text-xs font-semibold px-4 py-2 rounded-full" style={{background:'rgba(0,181,181,0.10)',color:'#008a8a'}}>Próximamente · Semana {semana}</div>
      </div>

}

// ═══════════════════════════════════════════════════════════════
// VENTAS — Pipeline comercial
// ═══════════════════════════════════════════════════════════════
const TIPOS_ESTUDIO=['Cuantitativo','Cualitativo','Cuantitativo y Cualitativo','Precios','Mystery Shopper','Fuentes secundarias','Otro'];
const STATUS_COLOR={Venta:'purple','En espera de autorización':'orange',Autorizado:'green',Cancelado:'red','En venta':'purple',Perdido:'gray',Activo:'green',Cerrado:'blue'};

function VentasModule({user}){
  const[data,setData]=useState([]);
  const[clientes,setClientes]=useState([]);
  const[empleados,setEmpleados]=useState([]);
  const[contactosCliente,setContactosCliente]=useState([]);
  const[loading,setLoading]=useState(true);
  const[fStatus,setFStatus]=useState('pipeline');
  const[search,setSearch]=useState('');
  const[modal,setModal]=useState(null); // null|'nuevo'|'ver'|'editar'|'perder'|'autorizar'
  const[sel,setSel]=useState(null);
  const[form,setForm]=useState({});
  const[pmSelId,setPmSelId]=useState('');
  const[notasPerdido,setNotasPerdido]=useState('');
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');

  const canCreate=user.rol==='Administrador'||user.perm_ventas||user.perm_proyectos;
  const canAuthorize=user.rol==='Administrador'||user.perm_autorizar_proyectos;
  const isAdmin=user.rol==='Administrador';

  const load=useCallback(async()=>{
    setLoading(true);
    const{data:d}=await sb.from('proyectos')
      .select('*, cliente:clientes(nombre,razon_social)')
      .order('numero_proyecto',{ascending:false});
    setData(d||[]);setLoading(false);
  },[]);

  useEffect(()=>{
    load();
    sb.from('clientes').select('id,nombre').order('nombre').then(({data:d})=>setClientes(d||[]));
    sb.from('empleados').select('id,nombre,foto_url,puesto').eq('activo',true).order('nombre').then(({data:d})=>setEmpleados(d||[]));
  },[load]);

  const PIPELINE_STATUSES=['En venta','Venta','En espera de autorización'];
  const filt=useMemo(()=>(data||[]).filter(p=>{
    const q=search.toLowerCase();
    const matchQ=!q||(p.nombre||'').toLowerCase().includes(q)||(p.numero_proyecto?.toString()||'').includes(q)||(p.cliente?.nombre||'').toLowerCase().includes(q);
    let matchS=true;
    if(fStatus==='pipeline') matchS=PIPELINE_STATUSES.includes(p.status);
    else if(fStatus==='Autorizado') matchS=p.status==='Autorizado'||p.status==='Activo';
    else if(fStatus) matchS=p.status===fStatus;
    return matchQ&&matchS;
  }),[data,search,fStatus]);

  const efNuevo={nombre:'',cliente_id:'',cliente_nuevo_nombre:'',contacto_id:'',estado_venta:'Venta',empresa:'SERTA',tipo_estudio:'Cuantitativo',num_pagos:1,anio_fiscal:new Date().getFullYear(),fecha_inicio_venta:new Date().toISOString().split('T')[0],fecha_inicio_proyecto:'',importe:'',notas:'',flag_renovacion:false,flag_prospectado:false,flag_cliente_nuevo:false,flag_sindicado:false};
  const ESTADOS_VENTA=['Venta','En espera de autorización','Autorizado','Cancelado'];

  const handleClienteChange=async(clienteId)=>{
    setForm(f=>({...f,cliente_id:clienteId,cliente_nuevo_nombre:'',contacto_id:''}));
    setContactosCliente([]);
    if(clienteId&&clienteId!=='__nuevo__'){
      const{data:c}=await sb.from('contactos').select('id,nombre,puesto,email,telefono').eq('cliente_id',parseInt(clienteId)).order('es_principal',{ascending:false});
      setContactosCliente(c||[]);
    }
  };
  const ESTADO_COLOR={'Venta':'blue','En espera de autorización':'orange','Autorizado':'green','Cancelado':'red'};

  const crearProyecto=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      // Si es cliente nuevo, crear primero con el nombre
      let clienteId=form.cliente_id?parseInt(form.cliente_id):null;
      if(form.cliente_id==='__nuevo__'&&form.cliente_nuevo_nombre.trim()){
        const{data:nc,error:eNC}=await sb.from('clientes').insert({nombre:form.cliente_nuevo_nombre.trim(),activo:true,estatus:'Activo'}).select('id').single();
        if(eNC)throw eNC;
        clienteId=nc.id;
        setClientes(prev=>[...prev,{id:nc.id,nombre:form.cliente_nuevo_nombre.trim()}]);
      }
      const{data:r,error}=await sb.rpc('fn_crear_proyecto',{
        p_nombre:form.nombre,
        p_cliente_id:clienteId,
        p_empresa:form.empresa||'SERTA',
        p_tipo_estudio:form.tipo_estudio||'',
        p_num_pagos:parseInt(form.num_pagos)||1,
        p_anio_fiscal:parseInt(form.anio_fiscal)||new Date().getFullYear(),
        p_fecha_inicio_venta:form.fecha_inicio_venta||null,
        p_fecha_inicio_proyecto:form.fecha_inicio_proyecto||null,
        p_importe:parseFloat(form.importe)||null,
        p_notas:form.notas||'',
        p_created_by:user.id,
        p_flag_renovacion:!!form.flag_renovacion,
        p_flag_prospectado:!!form.flag_prospectado,
        p_flag_cliente_nuevo:!!form.flag_cliente_nuevo,
        p_flag_sindicado:!!form.flag_sindicado,
      });
      if(error)throw error;
      // Actualizar status y/o contacto si aplica
      const upd={};
      if(form.estado_venta&&form.estado_venta!=='Venta') upd.status=form.estado_venta;
      if(form.contacto_id) upd.contacto_cliente_id=parseInt(form.contacto_id);
      if(Object.keys(upd).length>0) await sb.from('proyectos').update(upd).eq('id',r[0].id);
      setMsg(`✅ Proyecto #${r[0].numero_proyecto} registrado en pipeline`);
      await load();
      setTimeout(()=>{setModal(null);setMsg('');},1300);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const editarProyecto=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      const{error}=await sb.from('proyectos').update({
        nombre:form.nombre,
        cliente_id:form.cliente_id?parseInt(form.cliente_id):null,
        contacto_cliente_id:form.contacto_id?parseInt(form.contacto_id):null,
        empresa:form.empresa,
        tipo_estudio:form.tipo_estudio,
        num_pagos:parseInt(form.num_pagos)||1,
        anio_fiscal:parseInt(form.anio_fiscal)||null,
        fecha_inicio_venta:form.fecha_inicio_venta||null,
        fecha_inicio_proyecto:form.fecha_inicio_proyecto||null,
        importe:parseFloat(form.importe)||null,
        notas:form.notas||'',
        status:form.estado_venta||form.status||'En venta',
        flag_renovacion:!!form.flag_renovacion,
        flag_prospectado:!!form.flag_prospectado,
        flag_cliente_nuevo:!!form.flag_cliente_nuevo,
        flag_sindicado:!!form.flag_sindicado,
        updated_at:new Date().toISOString()
      }).eq('id',sel.id);
      if(error)throw error;
      setMsg('✅ Proyecto actualizado');
      await load();
      setTimeout(()=>{setModal(null);setMsg('');},1100);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const autorizarVenta=(p)=>{
    setSel(p);
    setPmSelId('');
    setMsg('');
    setModal('autorizar');
  };

  const confirmarAutorizacion=async()=>{
    if(!sel)return;
    setSaving(true);setMsg('');
    const upd={status:'Prospecto'};
    if(pmSelId) upd.pm_id=parseInt(pmSelId);
    const{error}=await sb.from('proyectos').update(upd).eq('id',sel.id);
    if(error){setMsg('❌ '+error.message);setSaving(false);return;}
    await load();
    setSaving(false);
    setModal(null);
    const pmNombre=pmSelId?empleados.find(e=>String(e.id)===pmSelId)?.nombre:'(sin asignar)';
    alert(`✅ Proyecto autorizado.\n\nPM asignado: ${pmNombre}\nAparece en Proyectos con status "Prospecto".\nDesde ahí se puede activar y generar el número de estudio.`);
  };

  const marcarPerdido=async e=>{
    e.preventDefault();setSaving(true);
    const{error}=await sb.rpc('fn_marcar_perdido',{p_proyecto_id:sel.id,p_notas:notasPerdido});
    if(!error){await load();setModal(null);setNotasPerdido('');}
    else{setMsg('❌ '+error.message);}
    setSaving(false);
  };

  const totalPor=st=>{
    if(st==='pipeline') return (data||[]).filter(p=>PIPELINE_STATUSES.includes(p.status)).length;
    if(st==='Autorizado') return (data||[]).filter(p=>p.status==='Autorizado'||p.status==='Activo').length;
    return (data||[]).filter(p=>p.status===st).length;
  };
  const importeTotal=()=>(data||[]).filter(p=>PIPELINE_STATUSES.includes(p.status)&&p.importe).reduce((s,p)=>s+(p.importe||0),0);

  return(
    <div className="p-6 fade">
      {/* Header */}
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">Ventas</h1>
          <p className="text-sm text-gray-500">Pipeline de proyectos en proceso de venta</p>
        </div>
        {canCreate&&<Btn onClick={()=>{setForm(efNuevo);setMsg('');setModal('nuevo');}}>+ Nuevo proyecto</Btn>}
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        <div onClick={()=>setFStatus('pipeline')} className="rounded-2xl p-4 border-2 cursor-pointer transition" style={fStatus==='pipeline'?{borderColor:'#00b5b5',background:'rgba(0,181,181,0.07)'}:{borderColor:'#e5e7eb',background:'white'}}>
          <div className="flex items-center justify-between"><span className="text-sm text-gray-500">Pipeline activo</span><span>💼</span></div>
          <p className="text-2xl font-bold mt-1 text-gray-800">{totalPor('pipeline')}</p>
          <p className="text-xs text-gray-400 mt-0.5">{fmt(importeTotal())} sin IVA</p>
        </div>
        <div onClick={()=>setFStatus('En espera de autorización')} className="rounded-2xl p-4 border-2 cursor-pointer transition" style={fStatus==='En espera de autorización'?{borderColor:'#f59e0b',background:'#fffbeb'}:{borderColor:'#e5e7eb',background:'white'}}>
          <div className="flex items-center justify-between"><span className="text-sm text-gray-500">En espera</span><span>⏳</span></div>
          <p className="text-2xl font-bold mt-1 text-gray-800">{totalPor('En espera de autorización')}</p>
        </div>
        <div onClick={()=>setFStatus('Autorizado')} className="rounded-2xl p-4 border-2 cursor-pointer transition" style={fStatus==='Autorizado'?{borderColor:'#10b981',background:'#f0fdf4'}:{borderColor:'#e5e7eb',background:'white'}}>
          <div className="flex items-center justify-between"><span className="text-sm text-gray-500">Autorizados</span><span>✅</span></div>
          <p className="text-2xl font-bold mt-1 text-gray-800">{totalPor('Autorizado')}</p>
          <p className="text-xs text-green-600 mt-0.5">Visibles en Proyectos</p>
        </div>
        <div onClick={()=>setFStatus('Perdido')} className="rounded-2xl p-4 border-2 cursor-pointer transition" style={fStatus==='Perdido'?{borderColor:'#ef4444',background:'#fef2f2'}:{borderColor:'#e5e7eb',background:'white'}}>
          <div className="flex items-center justify-between"><span className="text-sm text-gray-500">Perdidos</span><span>❌</span></div>
          <p className="text-2xl font-bold mt-1 text-gray-800">{totalPor('Perdido')}</p>
        </div>
      </div>
      {/* Filtro tab "Todos" */}
      <div className="flex gap-2 mb-3">
        <button onClick={()=>setFStatus('')} className="text-xs px-3 py-1.5 rounded-full border transition" style={fStatus===''?{background:'#1a252f',color:'white',borderColor:'#1a252f'}:{borderColor:'#e5e7eb',color:'#6b7280'}}>Todos los registros</button>
        <button onClick={()=>setFStatus('Cancelado')} className="text-xs px-3 py-1.5 rounded-full border transition" style={fStatus==='Cancelado'?{background:'#6b7280',color:'white',borderColor:'#6b7280'}:{borderColor:'#e5e7eb',color:'#6b7280'}}>Cancelados</button>
      </div>

      {/* Buscador */}
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar nombre, folio, cliente..." className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 mb-4"/>

      {/* Tabla */}
      {loading?<Spin/>:filt.length===0?<Empty msg="Sin proyectos en pipeline"/>:(
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="bg-gray-50 border-b border-gray-100">
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Folio</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Proyecto</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden md:table-cell">Cliente</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">Importe s/IVA</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">Inicio venta</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Status</th>
                <th className="px-4 py-3 text-right font-semibold text-gray-600">Acciones</th>
              </tr></thead>
              <tbody className="divide-y divide-gray-50">
                {filt.map(p=>(
                  <tr key={p.id} className="hover:bg-gray-50/70 transition">
                    <td className="px-4 py-3 font-mono text-xs">{(p.status==='Autorizado'||p.status==='Activo'||p.status==='Cerrado')?<span className="text-gray-700 font-medium">#{p.numero_proyecto}</span>:<span className="text-gray-300 italic">Sin folio</span>}</td>
                    <td className="px-4 py-3">
                      <p className="font-medium text-gray-800">{p.nombre}</p>
                      <p className="text-xs text-gray-400">{p.empresa} · {p.tipo_estudio||'—'}</p>
                    </td>
                    <td className="px-4 py-3 text-gray-600 hidden md:table-cell">{p.cliente?.nombre||'—'}</td>
                    <td className="px-4 py-3 text-gray-700 font-medium hidden lg:table-cell">{p.importe?fmt(p.importe):'—'}</td>
                    <td className="px-4 py-3 text-gray-500 text-xs hidden lg:table-cell">{p.fecha_inicio_venta?fmtD(p.fecha_inicio_venta):'—'}</td>
                    <td className="px-4 py-3"><Badge text={p.status} color={STATUS_COLOR[p.status]||'gray'}/></td>
                    <td className="px-4 py-3">
                      <div className="flex items-center justify-end gap-1 flex-wrap">
                        <Btn size="sm" color="outline" onClick={()=>{setSel(p);setModal('ver');}}>Ver</Btn>
                        {(canCreate||isAdmin)&&!['Autorizado','Activo','Cerrado','Perdido','Cancelado'].includes(p.status)&&<Btn size="sm" color="outline" onClick={async()=>{setSel(p);setForm({...p,cliente_id:p.cliente_id||'',contacto_id:p.contacto_cliente_id||''});setMsg('');if(p.cliente_id){const{data:cx}=await sb.from('contactos').select('id,nombre,puesto,email,telefono').eq('cliente_id',p.cliente_id).order('es_principal',{ascending:false});setContactosCliente(cx||[]);}else{setContactosCliente([]);}setModal('editar');}}>Editar</Btn>}
                        {canAuthorize&&!['Autorizado','Activo','Cerrado','Perdido','Cancelado'].includes(p.status)&&<Btn size="sm" color="green" onClick={()=>autorizarVenta(p)}>Autorizar ✓</Btn>}
                        {(canCreate||isAdmin)&&!['Autorizado','Activo','Cerrado','Perdido','Cancelado'].includes(p.status)&&<Btn size="sm" color="red" onClick={()=>{setSel(p);setNotasPerdido('');setMsg('');setModal('perder');}}>Perdido</Btn>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── Modal VER ── */}
      {modal==='ver'&&sel&&(
        <Modal title={(sel.status==='Autorizado'||sel.status==='Activo'||sel.status==='Cerrado')?`Proyecto #${sel.numero_proyecto}`:`Proyecto en pipeline`} onClose={()=>setModal(null)} size="lg">
          <div className="space-y-4">
            <Badge text={sel.status} color={STATUS_COLOR[sel.status]||'gray'}/>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              {[
                ['📌 Nombre',sel.nombre],
                ['🏢 Cliente',sel.cliente?.nombre||'—'],
                ['🏷️ Empresa',sel.empresa||'—'],
                ['🔬 Tipo de estudio',sel.tipo_estudio||'—'],
                ['💵 Importe s/IVA',sel.importe?fmt(sel.importe):'—'],
                ['🗓️ Año fiscal',sel.anio_fiscal||'—'],
                ['💳 No. de pagos',sel.num_pagos||'—'],
                ['📅 Inicio venta',sel.fecha_inicio_venta?fmtD(sel.fecha_inicio_venta):'—'],
                ['🚀 Inicio proyecto',sel.fecha_inicio_proyecto?fmtD(sel.fecha_inicio_proyecto):'—'],
                ['👤 Registrado por',empleados.find(e=>e.id===sel.created_by)?.nombre||'—'],
              ].map(([k,v])=>(
                <div key={k} className="bg-gray-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-0.5">{k}</p><p className="text-sm font-medium text-gray-800">{v}</p></div>
              ))}
            </div>
            {(sel.flag_renovacion||sel.flag_prospectado||sel.flag_cliente_nuevo||sel.flag_sindicado)&&(
              <div className="bg-amber-50 rounded-xl p-3">
                <p className="text-xs text-gray-500 mb-2">🏷️ Características de comisión</p>
                <div className="flex flex-wrap gap-2">
                  {sel.flag_renovacion&&<Badge text="🔄 Renovación" color="gray"/>}
                  {sel.flag_prospectado&&<Badge text="🎯 Prospectado" color="green"/>}
                  {sel.flag_cliente_nuevo&&<Badge text="🆕 Cliente Nuevo" color="blue"/>}
                  {sel.flag_sindicado&&<Badge text="🏭 Sindicado" color="orange"/>}
                </div>
              </div>
            )}
            {sel.notas&&<div className="bg-yellow-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-1">📝 Notas</p><p className="text-sm">{sel.notas}</p></div>}
            {canAuthorize&&!['Autorizado','Activo','Cerrado','Perdido','Cancelado','Prospecto'].includes(sel.status)&&(
              <div className="flex justify-end gap-2 pt-2">
                <Btn color="red" onClick={()=>{setModal('perder');setNotasPerdido('');}}>Marcar perdido</Btn>
                <Btn color="green" onClick={()=>autorizarVenta(sel)}>✅ Autorizar → Proyectos</Btn>
              </div>
            )}
          </div>
        </Modal>
      )}

      {/* ── Modal NUEVO / EDITAR ── */}
      {(modal==='nuevo'||modal==='editar')&&(
        <Modal title={modal==='nuevo'?'Nuevo proyecto en pipeline':'Editar proyecto'} onClose={()=>setModal(null)} size="xl">
          <form onSubmit={modal==='nuevo'?crearProyecto:editarProyecto}>
            {modal==='nuevo'&&<p className="text-xs text-gray-400 mb-4 bg-purple-50 rounded-xl px-3 py-2">Se asignará un folio automáticamente. El número de estudio se genera cuando el Director lo active en Proyectos.</p>}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <Input label="Nombre del proyecto" value={form.nombre||''} onChange={v=>setForm(f=>({...f,nombre:v}))} required className="md:col-span-2"/>

              {/* Cliente con opción Nuevo */}
              <div className="flex flex-col gap-1">
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Cliente</label>
                <select value={form.cliente_id||''} onChange={e=>handleClienteChange(e.target.value)} className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white">
                  <option value="">— Sin cliente asignado —</option>
                  <option value="__nuevo__">✚ Nuevo cliente (capturar nombre)</option>
                  {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
                </select>
                {form.cliente_id==='__nuevo__'&&(<>
                  <input value={form.cliente_nuevo_nombre||''} onChange={e=>setForm(f=>({...f,cliente_nuevo_nombre:e.target.value}))}
                    placeholder="Nombre del nuevo cliente..." required
                    className="border rounded-xl px-3 py-2 text-sm mt-1"
                    style={{borderColor:'#f59e0b',background:'#fffbeb'}}/>
                  <p className="text-xs text-amber-600">Se creará al guardar. Completa sus datos en el módulo Clientes una vez autorizado.</p>
                </>)}
              </div>

              {/* Contacto del cliente */}
              <div className="flex flex-col gap-1">
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Contacto del cliente</label>
                {form.cliente_id&&form.cliente_id!=='__nuevo__'?(
                  contactosCliente.length>0?(
                    <select value={form.contacto_id||''} onChange={e=>setForm(f=>({...f,contacto_id:e.target.value}))} className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white">
                      <option value="">— Sin contacto específico —</option>
                      {contactosCliente.map(c=><option key={c.id} value={c.id}>{c.nombre}{c.puesto?` · ${c.puesto}`:''}{c.email?` · ${c.email}`:''}</option>)}
                    </select>
                  ):(
                    <p className="text-xs text-gray-400 border border-dashed border-gray-200 rounded-xl px-3 py-2.5">Este cliente no tiene contactos aún. Agrégalos en el módulo Clientes.</p>
                  )
                ):(
                  <p className="text-xs text-gray-300 border border-dashed border-gray-100 rounded-xl px-3 py-2.5">Selecciona un cliente primero</p>
                )}
              </div>

              {/* Estado del proyecto */}
              <div className="flex flex-col gap-1">
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Estado del proyecto</label>
                <div className="grid grid-cols-2 gap-2">
                  {[['Venta','#7c3aed'],['En espera de autorización','#f59e0b'],['Autorizado','#10b981'],['Cancelado','#ef4444']].map(([st,col])=>{
                    const activo=(form.estado_venta||form.status||'Venta')===st;
                    return(<button key={st} type="button" onClick={()=>setForm(f=>({...f,estado_venta:st}))}
                      className="rounded-xl border-2 px-2 py-2 text-xs font-medium transition text-left leading-tight"
                      style={activo?{borderColor:col,background:col+'18',color:col}:{borderColor:'#e5e7eb',color:'#6b7280'}}>
                      {st}
                    </button>);
                  })}
                </div>
              </div>

              <Sel label="Empresa" value={form.empresa||'SERTA'} onChange={v=>setForm(f=>({...f,empresa:v}))} options={['SERTA','GIPA'].map(x=>({value:x,label:x}))}/>
              <Sel label="Tipo de estudio" value={form.tipo_estudio||''} onChange={v=>setForm(f=>({...f,tipo_estudio:v}))} options={TIPOS_ESTUDIO.map(x=>({value:x,label:x}))}/>
              <Input label="Importe sin IVA" type="number" value={form.importe||''} onChange={v=>setForm(f=>({...f,importe:v}))} placeholder="0.00"/>
              <Input label="No. de pagos" type="number" value={form.num_pagos||1} onChange={v=>setForm(f=>({...f,num_pagos:v}))}/>
              <Input label="Año fiscal" type="number" value={form.anio_fiscal||new Date().getFullYear()} onChange={v=>setForm(f=>({...f,anio_fiscal:v}))}/>
              <Input label="Fecha inicio de venta" type="date" value={form.fecha_inicio_venta||''} onChange={v=>setForm(f=>({...f,fecha_inicio_venta:v}))}/>
              <Input label="Fecha inicio del proyecto" type="date" value={form.fecha_inicio_proyecto||''} onChange={v=>setForm(f=>({...f,fecha_inicio_proyecto:v}))}/>
            </div>
            {/* Flags de comisión */}
            <div className="bg-amber-50 border border-amber-100 rounded-xl p-4 mb-4">
              <p className="text-xs font-semibold text-amber-700 uppercase mb-3">Características para cálculo de comisión</p>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                {[['flag_renovacion','🔄 Renovación','Cliente que ya compró antes','−0.5%'],['flag_prospectado','🎯 Prospectado','Vendedor prospectó activamente','＋1.5%'],['flag_cliente_nuevo','🆕 Cliente Nuevo','Primera vez que compra','＋1.5%'],['flag_sindicado','🏭 Sindicado','Empresa con sindicato','−1.5%']].map(([key,label,desc,delta])=>(
                  <label key={key} className={`flex flex-col gap-1 cursor-pointer rounded-xl border-2 p-3 transition ${form[key]?'border-amber-400 bg-white':'border-amber-100 bg-white/60 hover:border-amber-200'}`}>
                    <div className="flex items-center justify-between">
                      <span className="text-sm font-medium text-gray-700">{label}</span>
                      <input type="checkbox" checked={!!form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.checked}))} className="accent-amber-500 w-4 h-4"/>
                    </div>
                    <span className="text-xs text-gray-400">{desc}</span>
                    <span className={`text-xs font-medium ${delta.startsWith('−')?'text-red-500':'text-green-600'}`}>{delta} com. ventas</span>
                  </label>
                ))}
              </div>
            </div>
            <Textarea label="Notas" value={form.notas||''} onChange={v=>setForm(f=>({...f,notas:v}))}/>
            {msg&&<p className="mt-3 text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
            <div className="flex justify-end gap-2 mt-5">
              <Btn color="gray" onClick={()=>setModal(null)}>Cancelar</Btn>
              <Btn type="submit" disabled={saving||!form.nombre}>{saving?'Guardando...':modal==='nuevo'?'Crear proyecto':'Guardar cambios'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {/* ── Modal AUTORIZAR → asignar PM ── */}
      {modal==='autorizar'&&sel&&(
        <Modal title="Autorizar proyecto" onClose={()=>setModal(null)} size="md">
          <div className="space-y-5">
            {/* Info del proyecto */}
            <div className="rounded-xl p-4 border-2 border-green-200 bg-green-50">
              <p className="text-xs text-green-600 font-bold uppercase tracking-wide mb-1">Proyecto a autorizar</p>
              <p className="font-semibold text-gray-800 text-base">{sel.nombre}</p>
              <div className="flex gap-4 mt-2 text-xs text-green-700">
                <span>🏢 {sel.cliente?.nombre||'—'}</span>
                {sel.importe&&<span>💵 {fmt(sel.importe)}</span>}
                {sel.tipo_estudio&&<span>🔬 {sel.tipo_estudio}</span>}
              </div>
            </div>

            {/* Selector de PM */}
            <div>
              <label className="text-xs font-semibold text-gray-600 block mb-1.5">
                👤 Project Manager asignado <span className="font-normal text-gray-400">(opcional — puedes asignarlo después desde Proyectos)</span>
              </label>
              <select
                value={pmSelId}
                onChange={e=>setPmSelId(e.target.value)}
                className="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-green-200"
              >
                <option value="">— Sin asignar por ahora —</option>
                {empleados.map(e=>(
                  <option key={e.id} value={e.id}>{e.nombre}{e.puesto?' · '+e.puesto:''}</option>
                ))}
              </select>
              {pmSelId&&(
                <p className="text-xs text-green-700 mt-1.5 bg-green-50 rounded-lg px-3 py-1.5">
                  ✅ <strong>{empleados.find(e=>String(e.id)===pmSelId)?.nombre}</strong> verá este proyecto en su módulo de Proyectos.
                </p>
              )}
            </div>

            {/* Nota informativa */}
            <div className="bg-blue-50 rounded-xl p-3 text-xs text-blue-700">
              <p>📋 Al autorizar, el proyecto pasa a <strong>Proyectos</strong> con status <strong>"Prospecto"</strong>. Desde ahí se puede activar, generar el número de estudio y asignar o cambiar el PM en cualquier momento.</p>
            </div>

            {msg&&<p className="text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2">{msg}</p>}

            <div className="flex justify-end gap-2 pt-1">
              <Btn color="gray" onClick={()=>setModal(null)}>Cancelar</Btn>
              <Btn color="green" onClick={confirmarAutorizacion} disabled={saving}>
                {saving?'Autorizando...':'✅ Autorizar proyecto'}
              </Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* ── Modal MARCAR PERDIDO ── */}
      {modal==='perder'&&sel&&(
        <Modal title="Marcar como perdido" onClose={()=>setModal(null)} size="md">
          <form onSubmit={marcarPerdido} className="space-y-4">
            <div className="bg-red-50 border border-red-200 rounded-xl p-4">
              <p className="text-sm text-red-800 font-medium">📌 {sel.nombre}</p>
              <p className="text-xs text-red-600 mt-1">Esta acción marcará el proyecto como perdido. Se puede consultar en el historial.</p>
            </div>
            <Textarea label="Motivo o notas (opcional)" value={notasPerdido} onChange={v=>setNotasPerdido(v)} placeholder="¿Por qué se perdió este proyecto?"/>
            {msg&&<p className="text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
            <div className="flex justify-end gap-2">
              <Btn color="gray" onClick={()=>setModal(null)}>Cancelar</Btn>
              <Btn type="submit" color="red" disabled={saving}>{saving?'Guardando...':'Confirmar perdido'}</Btn>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PROYECTOS
// ═══════════════════════════════════════════════════════════════

function ProyectosModule({user}){
  const[data,setData]=useState([]);
  const[clientes,setClientes]=useState([]);
  const[empleados,setEmpleados]=useState([]);
  const[loading,setLoading]=useState(true);
  const[fStatus,setFStatus]=useState('');
  const[search,setSearch]=useState('');
  const[modal,setModal]=useState(null); // null | 'nuevo' | 'ver' | 'activar' | 'colabs'
  const[sel,setSel]=useState(null);
  const[form,setForm]=useState({});
  const[colabs,setColabs]=useState([]);
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');

  // permisos
  const canCreate=user.rol==='Administrador'||user.perm_proyectos;
  const canActivate=user.rol==='Administrador'||user.perm_autorizar_proyectos;
  const isAdmin=user.rol==='Administrador';
  const isPM=(p)=>p&&(String(p.pm_id)===String(user.id)||isAdmin);

  const PROJ_STATUS=['Prospecto','Activo','Cerrado','Cancelado'];
  const load=useCallback(async()=>{
    setLoading(true);
    const{data:d}=await sb.from('proyectos')
      .select('*, cliente:clientes(nombre)')
      .in('status',['Prospecto','Activo','Cerrado','Cancelado','Autorizado'])
      .order('numero_proyecto',{ascending:false});
    setData(d||[]);setLoading(false);
  },[]);

  useEffect(()=>{
    load();
    sb.from('clientes').select('id,nombre').order('nombre').then(({data:d})=>setClientes(d||[]));
    sb.from('empleados').select('id,nombre,foto_url,puesto').eq('activo',true).order('nombre').then(({data:d})=>setEmpleados(d||[]));
  },[load]);

  const loadColabs=async(pid)=>{
    const{data:c}=await sb.from('proyecto_colaboradores')
      .select('id,empleado_id,rol,empleado:empleados(nombre,foto_url,puesto)')
      .eq('proyecto_id',pid);
    setColabs(c||[]);
  };

  const filt=useMemo(()=>(data||[]).filter(p=>{
    const q=search.toLowerCase();
    const matchQ=!q||(p.nombre||'').toLowerCase().includes(q)||(p.numero_proyecto?.toString()||'').includes(q)||(p.numero_estudio||'').toLowerCase().includes(q)||(p.cliente?.nombre||'').toLowerCase().includes(q);
    const matchS=!fStatus||p.status===fStatus;
    return matchQ&&matchS;
  }),[data,search,fStatus]);

  const efNuevo={nombre:'',cliente_id:'',empresa:'SERTA',tipo_estudio:'Cuantitativo',num_pagos:1,anio_fiscal:new Date().getFullYear(),fecha_inicio_venta:'',fecha_inicio_proyecto:'',importe:'',notas:'',flag_renovacion:false,flag_prospectado:false,flag_cliente_nuevo:false,flag_sindicado:false};

  const crearProyecto=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      const{data:r,error}=await sb.rpc('fn_crear_proyecto',{
        p_nombre:form.nombre,
        p_cliente_id:form.cliente_id?parseInt(form.cliente_id):null,
        p_empresa:form.empresa,
        p_tipo_estudio:form.tipo_estudio,
        p_num_pagos:parseInt(form.num_pagos)||1,
        p_anio_fiscal:parseInt(form.anio_fiscal)||new Date().getFullYear(),
        p_fecha_inicio_venta:form.fecha_inicio_venta||null,
        p_fecha_inicio_proyecto:form.fecha_inicio_proyecto||null,
        p_importe:parseFloat(form.importe)||null,
        p_notas:form.notas||'',
        p_created_by:user.id,
        p_flag_renovacion:!!form.flag_renovacion,
        p_flag_prospectado:!!form.flag_prospectado,
        p_flag_cliente_nuevo:!!form.flag_cliente_nuevo,
        p_flag_sindicado:!!form.flag_sindicado,
      });
      if(error)throw error;
      setMsg(`✅ Proyecto #${r[0].numero_proyecto} creado correctamente`);
      await load();
      setTimeout(()=>{setModal(null);setMsg('');},1200);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const activarProyecto=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      const pmId=parseInt(form.pm_id);
      // Intentar RPC (genera numero_estudio automático)
      const{data:r,error:rpcErr}=await sb.rpc('fn_activar_proyecto',{p_proyecto_id:sel.id,p_pm_id:pmId});
      if(rpcErr){
        // Fallback directo: activar sin generar número de estudio (se puede agregar manualmente)
        const{error:updErr}=await sb.from('proyectos').update({
          status:'Activo',
          pm_id:pmId,
        }).eq('id',sel.id);
        if(updErr)throw updErr;
        setMsg('✅ Proyecto activado y PM asignado.');
      }else{
        setMsg(`✅ Proyecto activado. No. de estudio: ${r}`);
      }
      await load();
      setTimeout(()=>{setModal(null);setMsg('');},1400);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const cancelarProyecto=async(p)=>{
    if(!confirm(`¿Cancelar el proyecto "${p.nombre}"?`))return;
    await sb.from('proyectos').update({status:'Cancelado'}).eq('id',p.id);
    load();
  };

  const editarProyecto=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      const{error}=await sb.from('proyectos').update({
        nombre:       form.nombre,
        tipo_estudio: form.tipo_estudio||'',
        empresa:      form.empresa||'SERTA',
        num_pagos:    parseInt(form.num_pagos)||1,
        anio_fiscal:  parseInt(form.anio_fiscal)||null,
        importe:      form.importe?parseFloat(form.importe):null,
        costo_final:  form.costo_final?parseFloat(form.costo_final):null,
        fecha_inicio_venta:    form.fecha_inicio_venta||null,
        fecha_inicio_proyecto: form.fecha_inicio_proyecto||null,
        notas:        form.notas||'',
        pm_id:        form.pm_id?parseInt(form.pm_id):null,
      }).eq('id',sel.id);
      if(error)throw error;
      setMsg('✅ Proyecto actualizado');
      await load();
      setTimeout(()=>{setModal(null);setMsg('');},1000);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  const cerrarProyecto=async(p)=>{
    if(!confirm(`¿Marcar como Cerrado el proyecto "${p.nombre}"?`))return;
    await sb.from('proyectos').update({status:'Cerrado',closed_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq('id',p.id);
    load();
  };

  const addColab=async(empId)=>{
    if(!empId)return;
    const{error}=await sb.from('proyecto_colaboradores').insert({proyecto_id:sel.id,empleado_id:parseInt(empId),rol:'Colaborador'});
    if(!error)await loadColabs(sel.id);
  };

  const delColab=async(id)=>{
    await sb.from('proyecto_colaboradores').delete().eq('id',id);
    await loadColabs(sel.id);
  };

  const totalPor=st=>data.filter(p=>p.status===st).length;

  const exportReqExcel=async(proyecto)=>{
    try{
      const{data:reqs,error}=await sb.from('requisiciones')
        .select('numero_requisicion,tipo,descripcion,observaciones,subtotal,iva,ret_iva,ret_isr,total_pago,status,director_id,fecha_autorizacion,fecha_pago,created_at,proveedores(nombre)')
        .eq('proyecto_id',proyecto.id)
        .order('numero_requisicion',{ascending:true});
      if(error)throw error;
      if(!reqs||reqs.length===0){alert('Este proyecto no tiene requisiciones registradas.');return;}
      const rows=reqs.map(r=>({
        'No. Req':r.numero_requisicion||'—',
        'Tipo':r.tipo||'Normal',
        'Proveedor':r.proveedores?.nombre||'—',
        'Descripción':r.descripcion||'',
        'Observaciones':r.observaciones||'',
        'Subtotal':parseFloat(r.subtotal)||0,
        'IVA':parseFloat(r.iva)||0,
        'Ret. IVA':parseFloat(r.ret_iva)||0,
        'Ret. ISR':parseFloat(r.ret_isr)||0,
        'Total a Pagar':parseFloat(r.total_pago)||0,
        'Status':r.status||'',
        'Director':r.director_id||'—',
        'Fecha Creación':r.created_at?new Date(r.created_at).toLocaleDateString('es-MX'):'',
        'Fecha Autorización':r.fecha_autorizacion?new Date(r.fecha_autorizacion).toLocaleDateString('es-MX'):'',
        'Fecha Pago':r.fecha_pago?new Date(r.fecha_pago).toLocaleDateString('es-MX'):'',
      }));
      // Totales
      const tot={
        'No. Req':'TOTALES','Tipo':'','Proveedor':'','Descripción':'','Observaciones':'',
        'Subtotal':rows.reduce((s,r)=>s+r['Subtotal'],0),
        'IVA':rows.reduce((s,r)=>s+r['IVA'],0),
        'Ret. IVA':rows.reduce((s,r)=>s+r['Ret. IVA'],0),
        'Ret. ISR':rows.reduce((s,r)=>s+r['Ret. ISR'],0),
        'Total a Pagar':rows.reduce((s,r)=>s+r['Total a Pagar'],0),
        'Status':'','Director':'','Fecha Creación':'','Fecha Autorización':'','Fecha Pago':'',
      };
      rows.push(tot);
      const wb=window.XLSX.utils.book_new();
      const ws=window.XLSX.utils.json_to_sheet(rows);
      // Ancho de columnas
      ws['!cols']=[{wch:10},{wch:10},{wch:28},{wch:35},{wch:25},{wch:14},{wch:12},{wch:12},{wch:12},{wch:15},{wch:16},{wch:22},{wch:16},{wch:18},{wch:14}];
      const nombre=(proyecto.nombre||'Proyecto').replace(/[^a-zA-Z0-9_\-áéíóúÁÉÍÓÚ ]/g,'').substring(0,30);
      const folio=proyecto.numero_proyecto||proyecto.id;
      window.XLSX.utils.book_append_sheet(wb,ws,`Req ${folio}`);
      window.XLSX.writeFile(wb,`Requisiciones_${folio}_${nombre}.xlsx`);
    }catch(e){alert('Error al exportar: '+e.message);}
  };

  return(
    <div className="p-6 fade">
      {/* Header */}
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">Proyectos</h1>
          <p className="text-sm text-gray-500">{filt.length} proyectos · Los proyectos llegan desde el módulo Ventas</p>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        {[['Por activar','Prospecto','yellow','🔍'],['Activos','Activo','green','▶️'],['Cerrados','Cerrado','blue','✅'],['Cancelados','Cancelado','red','❌']].map(([lbl,st,col,ic])=>(
          <div key={st} onClick={()=>setFStatus(fStatus===st?'':st)} className={`rounded-2xl p-4 border-2 cursor-pointer transition ${fStatus===st?'border-gray-100 bg-white':'border-gray-100 bg-white hover:border-gray-200'}`} style={fStatus===st?{borderColor:'#00b5b5',background:'rgba(0,181,181,0.07)'}:{}}>
            <div className="flex items-center justify-between"><span className="text-sm text-gray-500">{lbl}</span><span>{ic}</span></div>
            <p className="text-2xl font-bold mt-1 text-gray-800">{totalPor(st)}</p>
          </div>
        ))}
      </div>

      {/* Buscador */}
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar nombre, folio, No. estudio, cliente..." className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 mb-4"/>

      {/* Tabla */}
      {loading?<Spin/>:filt.length===0?<Empty msg="Sin proyectos"/>:(
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="bg-gray-50 border-b border-gray-100">
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Folio</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Proyecto</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden md:table-cell">Cliente</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">No. Estudio</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600 hidden lg:table-cell">PM</th>
                <th className="px-4 py-3 text-left font-semibold text-gray-600">Status</th>
                <th className="px-4 py-3 text-right font-semibold text-gray-600">Acciones</th>
              </tr></thead>
              <tbody className="divide-y divide-gray-50">
                {filt.map(p=>(
                  <tr key={p.id} className="hover:bg-gray-50/70 transition">
                    <td className="px-4 py-3 font-mono text-gray-600 font-medium">#{p.numero_proyecto}</td>
                    <td className="px-4 py-3">
                      <p className="font-medium text-gray-800">{p.nombre}</p>
                      <p className="text-xs text-gray-400">{p.empresa} · {p.tipo_estudio||'—'}</p>
                    </td>
                    <td className="px-4 py-3 text-gray-600 hidden md:table-cell">{p.cliente?.nombre||'—'}</td>
                    <td className="px-4 py-3 hidden lg:table-cell">
                      {p.numero_estudio?<span className="font-mono font-medium" style={{color:'#00b5b5'}}>{p.numero_estudio}</span>:<span className="text-gray-300 text-xs">Sin asignar</span>}
                    </td>
                    <td className="px-4 py-3 hidden lg:table-cell">
                      {p.pm_id?(()=>{const pm=empleados.find(e=>e.id===p.pm_id);return pm?<div className="flex items-center gap-2"><Avatar nombre={pm.nombre} foto_url={pm.foto_url} size="sm"/><span className="text-gray-700 text-xs">{pm.nombre}</span></div>:<span className="text-gray-300 text-xs">ID:{p.pm_id}</span>;})():<span className="text-gray-300 text-xs">Sin asignar</span>}
                    </td>
                    <td className="px-4 py-3"><Badge text={p.status} color={STATUS_COLOR[p.status]||'gray'}/></td>
                    <td className="px-4 py-3">
                      <div className="flex items-center justify-end gap-1 flex-wrap">
                        <Btn size="sm" color="outline" onClick={async()=>{setSel(p);await loadColabs(p.id);setModal('ver');}}>Ver</Btn>
                        {(isPM(p)||isAdmin||canActivate)&&['Activo','Prospecto','Autorizado'].includes(p.status)&&<Btn size="sm" color="outline" onClick={()=>{setSel(p);setForm({...p,pm_id:p.pm_id||'',importe:p.importe||'',costo_final:p.costo_final||''});setMsg('');setModal('editar');}}>✏️ Editar</Btn>}
                        {canActivate&&(p.status==='Prospecto'||p.status==='Autorizado')&&<Btn size="sm" color="green" onClick={()=>{setSel(p);setForm({pm_id:''});setMsg('');setModal('activar');}}>Activar</Btn>}
                        {(isPM(p)||isAdmin)&&p.status==='Activo'&&<Btn size="sm" color="outline" onClick={async()=>{setSel(p);await loadColabs(p.id);setModal('colabs');}}>Equipo</Btn>}
                        {(isPM(p)||isAdmin)&&p.status==='Activo'&&<Btn size="sm" color="blue" onClick={()=>cerrarProyecto(p)}>Cerrar</Btn>}
                        {canActivate&&(p.status==='Prospecto'||p.status==='Autorizado')&&<Btn size="sm" color="red" onClick={()=>cancelarProyecto(p)}>Cancelar</Btn>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── Modal VER ── */}
      {modal==='ver'&&sel&&(
        <Modal title={`Proyecto #${sel.numero_proyecto}`} onClose={()=>setModal(null)} size="lg">
          <div className="space-y-4">
            <div className="flex items-center gap-3 mb-1">
              <Badge text={sel.status} color={STATUS_COLOR[sel.status]||'gray'}/>
              {sel.numero_estudio&&<span className="font-mono font-semibold text-sm px-3 py-1 rounded-full" style={{color:'#008a8a',background:'rgba(0,181,181,0.1)'}}>{sel.numero_estudio}</span>}
            </div>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              {[
                ['📌 Nombre',sel.nombre],
                ['🏢 Cliente',sel.cliente?.nombre||'—'],
                ['🏷️ Empresa',sel.empresa],
                ['🔬 Tipo de estudio',sel.tipo_estudio||'—'],
                ['💵 Importe (venta)',sel.importe?fmt(sel.importe):'—'],
                ['🗓️ Año fiscal',sel.anio_fiscal||'—'],
                ['💳 No. de pagos',sel.num_pagos||'—'],
                ['📅 Inicio venta',sel.fecha_inicio_venta?fmtD(sel.fecha_inicio_venta):'—'],
                ['🚀 Inicio proyecto',sel.fecha_inicio_proyecto?fmtD(sel.fecha_inicio_proyecto):'—'],
              ].map(([k,v])=>(
                <div key={k} className="bg-gray-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-0.5">{k}</p><p className="text-sm font-medium text-gray-800">{v}</p></div>
              ))}
            </div>
            {/* Rentabilidad */}
            {(sel.importe||sel.costo_final)&&(()=>{
              const ingreso=parseFloat(sel.importe)||0;
              const costo=parseFloat(sel.costo_final)||0;
              const margen=ingreso-costo;
              const pct=ingreso>0?((margen/ingreso)*100).toFixed(1):null;
              const color=margen>=0?'#10b981':'#ef4444';
              return(
                <div className="rounded-xl p-4 border-2" style={{borderColor:margen>=0?'#a7f3d0':'#fecaca',background:margen>=0?'#f0fdf4':'#fef2f2'}}>
                  <p className="text-xs font-bold uppercase tracking-wide mb-3" style={{color}}>💹 Rentabilidad del proyecto</p>
                  <div className="grid grid-cols-3 gap-3">
                    <div><p className="text-xs text-gray-500">Ingreso (venta)</p><p className="font-bold text-gray-800">{fmt(ingreso)}</p></div>
                    <div>
                      <p className="text-xs text-gray-500">Costo final</p>
                      {sel.costo_final?<p className="font-bold text-gray-800">{fmt(costo)}</p>:(
                        <div className="flex items-center gap-1">
                          <input type="number" placeholder="0.00" className="border border-gray-200 rounded-lg px-2 py-1 text-xs w-24"
                            onBlur={async e=>{const v=parseFloat(e.target.value)||0;if(v>0){await sb.from('proyectos').update({costo_final:v}).eq('id',sel.id);setSel(s=>({...s,costo_final:v}));}}}/>
                          <span className="text-xs text-gray-400">Guardar</span>
                        </div>
                      )}
                    </div>
                    <div><p className="text-xs text-gray-500">Margen {pct&&`(${pct}%)`}</p><p className="font-bold text-lg" style={{color}}>{fmt(margen)}</p></div>
                  </div>
                  {sel.costo_final&&<button className="text-xs mt-2 underline" style={{color:'#9ca3af'}} onClick={()=>setSel(s=>({...s,costo_final:null}))}>Editar costo</button>}
                </div>
              );
            })()}
            {sel.pm_id&&(()=>{const pm=empleados.find(e=>e.id===sel.pm_id);return pm?(
              <div className="bg-blue-50 rounded-xl p-3 flex items-center gap-3">
                <Avatar nombre={pm.nombre} foto_url={pm.foto_url}/>
                <div><p className="text-xs text-gray-500">Project Manager</p><p className="text-sm font-semibold text-gray-800">{pm.nombre}</p></div>
              </div>
            ):null;})()}
            {colabs.length>0&&(
              <div>
                <p className="text-xs font-semibold text-gray-600 mb-2">👥 Equipo del proyecto</p>
                <div className="flex flex-wrap gap-2">
                  {colabs.map(c=>(
                    <div key={c.id} className="flex items-center gap-2 bg-gray-50 rounded-xl px-3 py-2">
                      <Avatar nombre={c.empleado?.nombre} foto_url={c.empleado?.foto_url} size="sm"/>
                      <div><p className="text-xs font-medium text-gray-700">{c.empleado?.nombre}</p><p className="text-xs text-gray-400">{c.empleado?.puesto||c.rol}</p></div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {sel.notas&&<div className="bg-yellow-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-1">📝 Notas</p><p className="text-sm">{sel.notas}</p></div>}
            {/* Exportar Requisiciones */}
            <div className="border-t border-gray-100 pt-4 mt-2">
              <button
                onClick={()=>exportReqExcel(sel)}
                className="w-full flex items-center justify-center gap-2 rounded-xl py-2.5 text-sm font-semibold transition"
                style={{background:'#f0fdf4',color:'#16a34a',border:'1.5px solid #bbf7d0'}}
                onMouseOver={e=>{e.currentTarget.style.background='#dcfce7';}}
                onMouseOut={e=>{e.currentTarget.style.background='#f0fdf4';}}
              >
                📥 Exportar requisiciones a Excel
              </button>
            </div>
          </div>
        </Modal>
      )}

      {/* ── Modal EDITAR proyecto ── */}
      {modal==='editar'&&sel&&(
        <Modal title={`Editar — ${sel.nombre}`} onClose={()=>setModal(null)} size="xl">
          <form onSubmit={editarProyecto} className="space-y-4">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Input label="Nombre del proyecto" value={form.nombre||''} onChange={v=>setForm(f=>({...f,nombre:v}))} required className="md:col-span-2"/>
              <div className="flex flex-col gap-1">
                <label className="text-xs font-medium text-gray-600">Tipo de estudio</label>
                <select value={form.tipo_estudio||''} onChange={e=>setForm(f=>({...f,tipo_estudio:e.target.value}))} className="border border-gray-300 rounded-xl px-3 py-2 text-sm bg-white">
                  {['Cuantitativo','Cualitativo','Mixto','Panel','Rastreo','Misterioso','Otro'].map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div className="flex flex-col gap-1">
                <label className="text-xs font-medium text-gray-600">Empresa</label>
                <select value={form.empresa||'SERTA'} onChange={e=>setForm(f=>({...f,empresa:e.target.value}))} className="border border-gray-300 rounded-xl px-3 py-2 text-sm bg-white">
                  <option>SERTA</option><option>SERTA MR</option><option>Otra</option>
                </select>
              </div>
              <Input label="Año fiscal" type="number" value={form.anio_fiscal||''} onChange={v=>setForm(f=>({...f,anio_fiscal:v}))}/>
              <Input label="No. de pagos" type="number" min="1" value={form.num_pagos||1} onChange={v=>setForm(f=>({...f,num_pagos:v}))}/>
              <Input label="Fecha inicio venta" type="date" value={form.fecha_inicio_venta||''} onChange={v=>setForm(f=>({...f,fecha_inicio_venta:v}))}/>
              <Input label="Fecha inicio proyecto" type="date" value={form.fecha_inicio_proyecto||''} onChange={v=>setForm(f=>({...f,fecha_inicio_proyecto:v}))}/>
            </div>

            {/* Financiero */}
            <div className="rounded-xl border-2 border-teal-100 bg-teal-50/40 p-4">
              <p className="text-xs font-bold text-teal-700 uppercase tracking-wide mb-3">💵 Información financiera</p>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="flex flex-col gap-1">
                  <label className="text-xs font-medium text-gray-600">Importe de venta (s/IVA)</label>
                  <input type="number" min="0" step="0.01" value={form.importe||''} onChange={e=>setForm(f=>({...f,importe:e.target.value}))} placeholder="0.00" className="border border-gray-300 rounded-xl px-3 py-2 text-sm"/>
                </div>
                <div className="flex flex-col gap-1">
                  <label className="text-xs font-medium text-gray-600">Costo final del proyecto</label>
                  <input type="number" min="0" step="0.01" value={form.costo_final||''} onChange={e=>setForm(f=>({...f,costo_final:e.target.value}))} placeholder="0.00" className="border border-gray-300 rounded-xl px-3 py-2 text-sm"/>
                </div>
              </div>
              {(form.importe||form.costo_final)&&(()=>{
                const ing=parseFloat(form.importe)||0;
                const cos=parseFloat(form.costo_final)||0;
                const mar=ing-cos;
                const pct=ing>0?((mar/ing)*100).toFixed(1):null;
                const color=mar>=0?'#10b981':'#ef4444';
                return mar||cos?(
