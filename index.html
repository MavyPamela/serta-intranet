function ComisionesModule({user}){
  const isSuperAdmin=user.rol==='Administrador';
  const canSeeAll=isSuperAdmin||user.perm_autorizar_proyectos||user.perm_ver_comisiones;
  const esContabilidad=isSuperAdmin||user.perm_finanzas||user.perm_contabilidad;
  const esVendedor=(r)=>String(r.vendedor_id)===String(user.id);

  // Estado
  const[rows,setRows]=useState([]);
  const[proyectos,setProyectos]=useState([]);
  const[usuarios,setUsuarios]=useState([]);
  const[cfg,setCfg]=useState({});
  const[loading,setLoading]=useState(true);
  const[modal,setModal]=useState(null); // null | 'new' | 'edit' | 'view' | 'config'
  const[selRow,setSelRow]=useState(null);
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');

  // Filtros
  const[fAnio,setFAnio]=useState('');
  const[fEmpresa,setFEmpresa]=useState('');
  const[fVendedores,setFVendedores]=useState([]);
  const[fMeses,setFMeses]=useState([]);

  // Form
  const initForm=()=>({proyecto_id:'',vendedor_id:canSeeAll?'':String(user.id),
    empresa:'SERTA',anio_fiscal:new Date().getFullYear(),mes_cierre:new Date().getMonth()+1,
    fecha_cierre:'',monto_cerrado:'',comision_conecta:'',costos_directos:'',
    flag_renovacion:false,flag_prospectado:false,flag_cliente_nuevo:false,flag_sindicado:false,
    notas:'',status:'Borrador'});
  const[form,setForm]=useState(initForm());

  const[loadError,setLoadError]=useState('');

  const load=useCallback(async()=>{
    setLoading(true);
    setLoadError('');
    try{
      // Queries independientes para evitar fallo en cadena
      const[cfgRes,proyRes,usuRes,comRes]=await Promise.all([
        sb.from('config_comisiones').select('clave,valor'),
        sb.from('proyectos').select('id,numero_proyecto,nombre,empresa,status,importe,flag_renovacion,flag_prospectado,flag_cliente_nuevo,flag_sindicado').order('numero_proyecto',{ascending:false}),
        sb.from('empleados').select('id,nombre,rol,perm_ventas').eq('activo',true).order('nombre'),
        sb.from('comisiones').select(
          'id,proyecto_id,vendedor_id,empresa,anio_fiscal,mes_cierre,fecha_cierre,'+
          'monto_cerrado,comision_conecta,costos_directos,'+
          'flag_renovacion,flag_prospectado,flag_cliente_nuevo,flag_sindicado,'+
          'monto_serta,comision_pm_max,msd_antes_cv,pct_com_ventas,'+
          'com_ventas_max,excedente,com_final_pm,com_final_ventas,msd_final,'+
          'notas,status,fecha_pago_pm,fecha_pago_ventas,created_at'
        ).order('created_at',{ascending:false}),
      ]);

      if(comRes.error) throw new Error('Comisiones: '+comRes.error.message);

      const cfgMap={};(cfgRes.data||[]).forEach(r=>{cfgMap[r.clave]=r.valor;});
      setCfg(cfgMap);

      const proyMap={};(proyRes.data||[]).forEach(p=>{proyMap[p.id]=p;});
      const usuMap={};(usuRes.data||[]).forEach(u=>{usuMap[u.id]=u;});
      setProyectos(proyRes.data||[]);
      setUsuarios(usuRes.data||[]);

      // Enriquecer comisiones con nombre de proyecto y vendedor
      const todas=(comRes.data||[]).map(r=>({
        ...r,
        proyectos: proyMap[r.proyecto_id]||null,
        empleados: usuMap[r.vendedor_id]||null,
      }));

      if(canSeeAll) setRows(todas);
      else setRows(todas.filter(r=>String(r.vendedor_id)===String(user.id)));
    }catch(err){
      setLoadError(err.message||'Error al cargar comisiones');
    }
    setLoading(false);
  },[canSeeAll,user.id]);

  useEffect(()=>{load();},[load]);

  // Filtrado
  const filtered=useMemo(()=>{
    return rows.filter(r=>{
      if(fAnio&&String(r.anio_fiscal)!==fAnio)return false;
      if(fEmpresa&&r.empresa!==fEmpresa)return false;
      if(fVendedores.length>0&&!fVendedores.includes(String(r.vendedor_id)))return false;
      if(fMeses.length>0&&!fMeses.includes(String(r.mes_cierre)))return false;
      return true;
    });
  },[rows,fAnio,fEmpresa,fVendedores,fMeses]);

  // KPIs
  const kpis=useMemo(()=>{
    const proyC=filtered.length;
    const msdT=filtered.reduce((s,r)=>s+(r.msd_final||0),0);
    const comPM=filtered.reduce((s,r)=>s+(r.com_final_pm||0),0);
    const comV=filtered.reduce((s,r)=>s+(r.com_final_ventas||0),0);
    return{proyC,msdT,comPM,comV};
  },[filtered]);

  // Datos gráfica por mes
  const chartData=useMemo(()=>{
    const byMes={};
    filtered.forEach(r=>{
      const k=r.mes_cierre;
      if(!byMes[k])byMes[k]={label:MESES[(k||1)-1],msd_final:0};
      byMes[k].msd_final+=(r.msd_final||0);
    });
    return Array.from({length:12},(_,i)=>byMes[i+1]||{label:MESES[i],msd_final:0});
  },[filtered]);

  // Calcular en tiempo real para el form
  const calc=useMemo(()=>calcComision({
    monto_cerrado:parseFloat(form.monto_cerrado)||0,
    comision_conecta:parseFloat(form.comision_conecta)||0,
    costos_directos:parseFloat(form.costos_directos)||0,
    empresa:form.empresa,
    flag_renovacion:form.flag_renovacion,
    flag_prospectado:form.flag_prospectado,
    flag_cliente_nuevo:form.flag_cliente_nuevo,
    flag_sindicado:form.flag_sindicado,
  },cfg),[form,cfg]);

  const openNew=()=>{setForm(initForm());setMsg('');setModal('new');};
  const openEdit=row=>{
    setSelRow(row);
    setForm({
      proyecto_id:String(row.proyecto_id||''),
      vendedor_id:String(row.vendedor_id||''),
      empresa:row.empresa||'SERTA',
      anio_fiscal:row.anio_fiscal||new Date().getFullYear(),
      mes_cierre:row.mes_cierre||1,
      fecha_cierre:row.fecha_cierre||'',
      monto_cerrado:row.monto_cerrado||'',
      comision_conecta:row.comision_conecta||'',
      costos_directos:row.costos_directos||'',
      flag_renovacion:row.flag_renovacion||false,
      flag_prospectado:row.flag_prospectado||false,
      flag_cliente_nuevo:row.flag_cliente_nuevo||false,
      flag_sindicado:row.flag_sindicado||false,
      notas:row.notas||'',
      status:row.status||'Borrador',
    });
    setMsg('');setModal('edit');
  };
  const openView=row=>{setSelRow(row);setModal('view');};

  const save=async(e,statusOverride)=>{
    if(e)e.preventDefault();
    setSaving(true);setMsg('');
    const st=statusOverride||form.status;
    try{
      const{error}=await sb.rpc('fn_guardar_comision',{
        p_id:modal==='edit'?(selRow.id||null):null,
        p_proyecto_id:form.proyecto_id?parseInt(form.proyecto_id):null,
        p_vendedor_id:form.vendedor_id?parseInt(form.vendedor_id):null,
        p_empresa:form.empresa,
        p_anio_fiscal:parseInt(form.anio_fiscal)||new Date().getFullYear(),
        p_mes_cierre:parseInt(form.mes_cierre)||1,
        p_fecha_cierre:form.fecha_cierre||null,
        p_monto_cerrado:parseFloat(form.monto_cerrado)||0,
        p_comision_conecta:parseFloat(form.comision_conecta)||0,
        p_costos_directos:parseFloat(form.costos_directos)||0,
        p_flag_renovacion:form.flag_renovacion,
        p_flag_prospectado:form.flag_prospectado,
        p_flag_cliente_nuevo:form.flag_cliente_nuevo,
        p_flag_sindicado:form.flag_sindicado,
        p_monto_serta:calc.monto_serta,
        p_comision_pm_max:calc.comision_pm_max,
        p_msd_antes_cv:calc.msd_antes_cv,
        p_pct_com_ventas:calc.pct_com_ventas,
        p_com_ventas_max:calc.com_ventas_max,
        p_excedente:calc.excedente,
        p_com_final_pm:calc.com_final_pm,
        p_com_final_ventas:calc.com_final_ventas,
        p_msd_final:calc.msd_final,
        p_notas:form.notas||'',
        p_status:st,
      });
      if(error)throw error;
      setMsg(st==='Registrado'?'✅ Comisión registrada':'✅ Guardado como borrador');
      await load();
      setTimeout(()=>setModal(null),900);
    }catch(err){setMsg('❌ Error: '+err.message);}
    setSaving(false);
  };

  // Panel de configuración de parámetros
  const[cfgEdit,setCfgEdit]=useState({});
  const openCfg=()=>{
    const copy={};Object.keys(cfg).forEach(k=>{copy[k]=String(cfg[k]||'');});
    setCfgEdit(copy);setModal('config');
  };
  const saveCfg=async()=>{
    setSaving(true);
    const updates=Object.entries(cfgEdit).map(([clave,valor])=>
      sb.from('config_comisiones').update({valor:parseFloat(valor)}).eq('clave',clave)
    );
    await Promise.all(updates);
    await load();setSaving(false);setModal(null);
  };

  const anios=Array.from({length:5},(_,i)=>String(new Date().getFullYear()-i));

  if(loading)return<div className="p-8"><Spin/></div>;
  if(loadError)return(
    <div className="p-8">
      <div className="bg-red-50 border border-red-200 rounded-2xl p-6 max-w-xl">
        <p className="font-bold text-red-700 mb-2">❌ Error al cargar el módulo de Comisiones</p>
        <p className="text-sm text-red-600 font-mono mb-4">{loadError}</p>
        <p className="text-xs text-gray-500 mb-3">Posibles causas: la tabla <code>comisiones</code> o <code>config_comisiones</code> no existe. Ejecuta <strong>migracion_v8.sql</strong> en Supabase SQL Editor.</p>
        <Btn onClick={load}>🔄 Reintentar</Btn>
      </div>
    </div>
  );

  return(
    <div className="p-6 max-w-full">
      {/* Header */}
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">💲 Comisiones</h1>
          <p className="text-sm text-gray-500 mt-0.5">Dashboard de comisiones por cierre de proyecto</p>
        </div>
        <div className="flex gap-2">
          {isSuperAdmin&&<Btn color="outline" onClick={openCfg} size="sm">⚙️ Parámetros</Btn>}
          <Btn onClick={openNew}>+ Nueva comisión</Btn>
        </div>
      </div>

      {/* Mini dashboard de KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        {[
          {label:'Proyectos',val:filtered.length,icon:'📁',color:'#00b5b5'},
          {label:'Com. Ventas',val:fmt(filtered.reduce((s,r)=>s+(r.com_final_ventas||0),0)),icon:'💲',color:'#f59e0b'},
          {label:'Com. PM',val:fmt(filtered.reduce((s,r)=>s+(r.com_final_pm||0),0)),icon:'👤',color:'#8b5cf6'},
          {label:'MSD Total',val:fmt(filtered.reduce((s,r)=>s+(r.msd_final||0),0)),icon:'📊',color:'#10b981'},
        ].map(({label,val,icon,color})=>(
          <div key={label} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
            <div className="flex items-center justify-between mb-1">
              <span className="text-xs text-gray-500 font-medium">{label}</span>
              <span>{icon}</span>
            </div>
            <p className="text-xl font-bold" style={{color}}>{val}</p>
          </div>
        ))}
      </div>

      {/* Filtros */}
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-5 flex flex-wrap gap-3 items-end">
        <Sel label="Año fiscal" value={fAnio} onChange={setFAnio} options={[{value:'',label:'Todos'}, ...anios.map(a=>({value:a,label:a}))]}/>
        <Sel label="Empresa" value={fEmpresa} onChange={setFEmpresa} options={[{value:'',label:'Todas'},{value:'SERTA',label:'SERTA'},{value:'GIPA',label:'GiPA'}]}/>
        {canSeeAll&&(
          <div className="flex flex-col gap-1">
            <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">
              Vendedor {fVendedores.length>0&&<span className="text-teal-600 font-bold">({fVendedores.length} sel.)</span>}
            </label>
            <div className="flex flex-wrap gap-1">
              {(()=>{
                // Solo vendedores con comisiones reales o con perm_ventas
                const vendIds=new Set(rows.map(r=>String(r.vendedor_id)).filter(Boolean));
                const vendsConVentas=usuarios.filter(u=>vendIds.has(String(u.id))||u.perm_ventas);
                return vendsConVentas.map(u=>{
                  const v=String(u.id);
                  const sel=fVendedores.includes(v);
                  return(
                    <button key={v} type="button"
                      onClick={()=>setFVendedores(prev=>sel?prev.filter(x=>x!==v):[...prev,v])}
                      className="px-2 py-1 rounded-lg text-xs font-medium border transition"
                      style={sel?{background:'#00b5b5',color:'#fff',borderColor:'#00b5b5'}:{background:'#f9fafb',color:'#6b7280',borderColor:'#e5e7eb'}}>
                      {u.nombre.split(' ').slice(0,2).join(' ')}
                    </button>
                  );
                });
              })()}
              {fVendedores.length>0&&<button type="button" onClick={()=>setFVendedores([])} className="px-2 py-1 rounded-lg text-xs border" style={{color:'#ef4444',borderColor:'#fca5a5'}}>✕</button>}
            </div>
          </div>
        )}
        <div className="flex flex-col gap-1">
          <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">
            Mes {fMeses.length>0&&<span className="text-teal-600 font-bold">({fMeses.length} sel.)</span>}
          </label>
          <div className="flex flex-wrap gap-1">
            {MESES.map((m,i)=>{
              const v=String(i+1);
              const sel=fMeses.includes(v);
              return(
                <button key={v} type="button"
                  onClick={()=>setFMeses(prev=>sel?prev.filter(x=>x!==v):[...prev,v])}
                  className="px-2 py-1 rounded-lg text-xs font-medium border transition"
                  style={sel?{background:'#00b5b5',color:'#fff',borderColor:'#00b5b5'}:{background:'#f9fafb',color:'#6b7280',borderColor:'#e5e7eb'}}>
                  {m}
                </button>
              );
            })}
          </div>
        </div>
        <Btn color="gray" size="sm" onClick={()=>{setFAnio('');setFEmpresa('');setFVendedores([]);setFMeses([]);}}>Limpiar</Btn>
      </div>

      {/* KPI Cards */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-5">
        <StatCard title="Proyectos" value={kpis.proyC} icon="📁" color="blue"/>
        <StatCard title="MSD Total" value={fmt(kpis.msdT)} icon="📈" color="green"/>
        <StatCard title="Com. PM" value={fmt(kpis.comPM)} icon="👤" color="purple"/>
        <StatCard title="Com. Ventas" value={fmt(kpis.comV)} icon="🤝" color="orange"/>
      </div>

      {/* Gráfica */}
      {filtered.length>0&&(
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-5">
          <h3 className="font-semibold text-gray-700 text-sm mb-4">MSD por mes (año {fAnio||'todos'})</h3>
          <BarChart data={chartData} labelKey="label" valueKey="msd_final"/>
        </div>
      )}

      {/* Tabla */}
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>
                <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Proyecto</th>
                {canSeeAll&&<th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Vendedor</th>}
                <th className="px-3 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Empresa</th>
                <th className="px-3 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Mes/Año</th>
                <th className="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Monto Cerrado</th>
                <th className="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Monto SERTA</th>
                <th className="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Com. PM</th>
                <th className="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Com. Ventas</th>
                <th className="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">MSD Final</th>
                <th className="px-3 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Status</th>
                <th className="px-3 py-3"></th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-50">
              {filtered.length===0&&<tr><td colSpan={canSeeAll?11:10}><Empty msg="No hay comisiones registradas con estos filtros"/></td></tr>}
              {filtered.map(r=>(
                <tr key={r.id} className="hover:bg-gray-50 transition">
                  <td className="px-4 py-3">
                    <p className="font-medium text-gray-800">{r.proyectos?.nombre||'—'}</p>
                    <p className="text-xs text-gray-400">{r.proyectos?.numero_proyecto}</p>
                  </td>
                  {canSeeAll&&<td className="px-4 py-3 text-gray-600 text-xs">{r.empleados?.nombre||'—'}</td>}
                  <td className="px-3 py-3 text-center"><Badge text={r.empresa} color={r.empresa==='SERTA'?'blue':'purple'}/></td>
                  <td className="px-3 py-3 text-center text-xs text-gray-600">{r.mes_cierre?MESES[r.mes_cierre-1]:''} {r.anio_fiscal}</td>
                  <td className="px-4 py-3 text-right text-gray-700 font-mono text-xs">{fmt(r.monto_cerrado)}</td>
                  <td className="px-4 py-3 text-right text-gray-700 font-mono text-xs">{fmt(r.monto_serta)}</td>
                  <td className="px-4 py-3 text-right text-purple-700 font-mono text-xs font-medium">{fmt(r.com_final_pm)}</td>
                  <td className="px-4 py-3 text-right text-orange-700 font-mono text-xs font-medium">{(canSeeAll||esVendedor(r))?fmt(r.com_final_ventas):<span className="text-gray-300">—</span>}</td>
                  <td className="px-4 py-3 text-right text-green-700 font-mono text-xs font-bold">{fmt(r.msd_final)}</td>
                  <td className="px-3 py-3 text-center">
                    <Badge text={r.status} color={r.status==='Registrado'?'green':'gray'}/>
                    {r.fecha_pago_pm&&<span className="ml-1 text-xs text-purple-600" title={`PM pagado: ${fmtD(r.fecha_pago_pm)}`}>💜</span>}
                    {r.fecha_pago_ventas&&<span className="ml-1 text-xs text-orange-500" title={`Ventas pagado: ${fmtD(r.fecha_pago_ventas)}`}>🧡</span>}
                  </td>
                  <td className="px-3 py-3">
                    <div className="flex gap-1">
                      <button onClick={()=>openView(r)} className="text-gray-400 hover:text-teal-600 text-xs px-2 py-1 rounded hover:bg-teal-50 transition">Ver</button>
                      {(canSeeAll||r.vendedor_id===user.id)&&r.status==='Borrador'&&
                        <button onClick={()=>openEdit(r)} className="text-gray-400 hover:text-gray-700 text-xs px-2 py-1 rounded hover:bg-gray-100 transition">Editar</button>
                      }
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* MODAL: Nueva / Editar comisión */}
      {(modal==='new'||modal==='edit')&&(
        <Modal title={modal==='new'?'Nueva comisión':'Editar comisión'} onClose={()=>setModal(null)} size="xl">
          <form onSubmit={e=>save(e,'Borrador')} className="space-y-4">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {/* Proyecto */}
              <div className="flex flex-col gap-1">
                <label className="text-xs font-medium text-gray-600">Proyecto <span className="text-red-500">*</span></label>
                <select value={form.proyecto_id} onChange={e=>{
                  const pid=e.target.value;
                  const p=proyectos.find(x=>String(x.id)===pid);
                  setForm(f=>({...f,
                    proyecto_id:pid,
                    empresa:p?.empresa||f.empresa,
                    // Auto-poblar flags desde el proyecto
                    flag_renovacion:   p?.flag_renovacion   ?? f.flag_renovacion,
                    flag_prospectado:  p?.flag_prospectado  ?? f.flag_prospectado,
                    flag_cliente_nuevo:p?.flag_cliente_nuevo?? f.flag_cliente_nuevo,
                    flag_sindicado:    p?.flag_sindicado    ?? f.flag_sindicado,
                    // Importe del proyecto como sugerencia para monto_cerrado
                    monto_cerrado: f.monto_cerrado || (p?.importe||''),
                  }));
                }} required className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-200">
                  <option value="">— Seleccionar proyecto —</option>
                  {proyectos.map(p=><option key={p.id} value={p.id}>{p.numero_proyecto} · {p.nombre} ({p.empresa})</option>)}
                </select>
              </div>
              {/* Vendedor */}
              <div className="flex flex-col gap-1">
                <label className="text-xs font-medium text-gray-600">Vendedor</label>
                {canSeeAll
                  ?<select value={form.vendedor_id} onChange={e=>setForm(f=>({...f,vendedor_id:e.target.value}))} className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-200">
                    <option value="">— Sin asignar —</option>
                    {usuarios.map(u=><option key={u.id} value={u.id}>{u.nombre}</option>)}
                  </select>
                  :<input value={user.nombre} disabled className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50"/>
                }
              </div>
              <Sel label="Empresa" value={form.empresa} onChange={v=>setForm(f=>({...f,empresa:v}))} options={[{value:'SERTA',label:'SERTA'},{value:'GIPA',label:'GiPA'}]}/>
              <Sel label="Año fiscal" value={String(form.anio_fiscal)} onChange={v=>setForm(f=>({...f,anio_fiscal:parseInt(v)}))} options={anios.map(a=>({value:a,label:a}))}/>
              <Sel label="Mes de cierre" value={String(form.mes_cierre)} onChange={v=>setForm(f=>({...f,mes_cierre:parseInt(v)}))} options={MESES.map((m,i)=>({value:String(i+1),label:m}))}/>
              <Input label="Fecha de cierre" type="date" value={form.fecha_cierre} onChange={v=>setForm(f=>({...f,fecha_cierre:v}))}/>
              <Input label="Monto cerrado (sin IVA)" type="number" value={form.monto_cerrado} onChange={v=>setForm(f=>({...f,monto_cerrado:v}))} placeholder="0.00" required/>
              {form.empresa==='SERTA'&&<Input label="Comisión Conecta" type="number" value={form.comision_conecta} onChange={v=>setForm(f=>({...f,comision_conecta:v}))} placeholder="0.00"/>}
              <Input label="Costos directos" type="number" value={form.costos_directos} onChange={v=>setForm(f=>({...f,costos_directos:v}))} placeholder="0.00"/>
            </div>

            {/* Flags */}
            <div className="bg-gray-50 rounded-xl p-4">
              <div className="flex items-center justify-between mb-3">
                <p className="text-xs font-semibold text-gray-600 uppercase">Características del proyecto</p>
                {form.proyecto_id&&<span className="text-xs text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full">Pre-cargadas del proyecto · puedes ajustar</span>}
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                {[['flag_renovacion','Renovación','−0.5%'],['flag_prospectado','Prospectado','＋1.5%'],['flag_cliente_nuevo','Cliente Nuevo','＋1.5%'],['flag_sindicado','Sindicado','−1.5%']].map(([key,label,delta])=>(
                  <label key={key} className="flex items-center gap-2 cursor-pointer bg-white rounded-lg border border-gray-200 px-3 py-2 hover:border-blue-300 transition">
                    <input type="checkbox" checked={form[key]||false} onChange={e=>setForm(f=>({...f,[key]:e.target.checked}))} className="rounded"/>
                    <span className="text-xs font-medium text-gray-700">{label}</span>
                    <span className={`text-xs ml-auto ${delta.startsWith('−')?'text-red-500':'text-green-600'}`}>{delta}</span>
                  </label>
                ))}
              </div>
              {form.empresa==='SERTA'&&<p className="text-xs mt-2" style={{color:"#008a8a"}}>+1.5% adicional por ser proyecto SERTA</p>}
            </div>

            {/* Preview de cálculo */}
            {parseFloat(form.monto_cerrado)>0&&(
              <div className="rounded-xl p-4 border" style={{background:'rgba(0,181,181,0.06)',borderColor:'rgba(0,181,181,0.2)'}}>
                <p className="text-xs font-semibold mb-3 uppercase" style={{color:'#008a8a'}}>Vista previa del cálculo</p>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs">
                  <div><p className="text-gray-500">Monto SERTA</p><p className="font-bold text-gray-800">{fmt(calc.monto_serta)}</p></div>

            <hr/>

              <div><p className="text-xs text-gray-500">Monto Cerrado</p><p className="font-mono font-bold">{fmt(selRow.monto_cerrado)}</p></div>

              <div><p className="text-xs text-gray-500">Monto SERTA</p><p className="font-mono font-bold" style={{color:'#008a8a'}}>{fmt(selRow.monto_serta)}</p></div>

            <div className="grid grid-cols-3 gap-3">
              <div className="bg-purple-50 rounded-xl p-3 text-center"><p className="text-xs text-gray-500">Com. PM Final</p><p className="font-bold text-purple-700 text-lg">{fmt(selRow.com_final_pm)}</p></div>
              {(canSeeAll||esVendedor(selRow))&&<div className="bg-orange-50 rounded-xl p-3 text-center"><p className="text-xs text-gray-500">Com. Ventas Final</p><p className="font-bold text-orange-700 text-lg">{fmt(selRow.com_final_ventas)}</p></div>}
              <div className="bg-green-50 rounded-xl p-3 text-center border-2 border-green-200"><p className="text-xs text-gray-500">MSD Final</p><p className="font-bold text-green-700 text-xl">{fmt(selRow.msd_final)}</p></div>
            </div>
            <div className="flex flex-wrap gap-2">
              {selRow.flag_renovacion&&<Badge text="Renovación" color="gray"/>}
              {selRow.flag_prospectado&&<Badge text="Prospectado" color="green"/>}

            {selRow.notas&&<div className="bg-gray-50 rounded-lg px-3 py-2 text-sm text-gray-600">{selRow.notas}</div>}

            {/* Fechas de pago — solo contabilidad puede editar */}

              <p className="text-xs font-bold text-teal-700 uppercase tracking-wide mb-2">📅 Registro de pagos (Contabilidad)</p>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <p className="text-xs text-gray-500 mb-1">Fecha pago comisión PM</p>

                    ?<input type="date" value={selRow.fecha_pago_pm||''} onChange={async e=>{
                        await sb.from('comisiones').update({fecha_pago_pm:e.target.value||null}).eq('id',selRow.id);
                        setSelRow(r=>({...r,fecha_pago_pm:e.target.value}));

                    :<p className="text-sm font-medium text-gray-800">{selRow.fecha_pago_pm?fmtD(selRow.fecha_pago_pm):'Pendiente'}</p>
                  }
                </div>
                <div>
                  <p className="text-xs text-gray-500 mb-1">Fecha pago comisión Ventas</p>
                  {esContabilidad
                    ?<input type="date" value={selRow.fecha_pago_ventas||''} onChange={async e=>{
                        await sb.from('comisiones').update({fecha_pago_ventas:e.target.value||null}).eq('id',selRow.id);
                        setSelRow(r=>({...r,fecha_pago_ventas:e.target.value}));

                      }} className="border border-gray-200 rounded-lg px-2 py-1 text-xs w-full focus:outline-none" style={{borderColor:'#00b5b5'}}/>
                    :<p className="text-sm font-medium text-gray-800">{selRow.fecha_pago_ventas?fmtD(selRow.fecha_pago_ventas):'Pendiente'}</p>
                  }
                </div>

            </div>

            {(canSeeAll||selRow.vendedor_id===user.id)&&selRow.status==='Borrador'&&(
              <div className="flex justify-end"><Btn onClick={()=>{openEdit(selRow);}}>✏️ Editar</Btn></div>
            )}
          </div>
        </Modal>
      )}

      {/* MODAL: Configurar parámetros */}
      {modal==='config'&&(
        <Modal title="⚙️ Parámetros de comisiones" onClose={()=>setModal(null)} size="md">
          <div className="space-y-3">
            <p className="text-xs text-gray-500 bg-yellow-50 px-3 py-2 rounded-lg">Modifica los porcentajes base. Los cambios afectarán cálculos futuros; los registros guardados conservan los valores al momento de registrarse.</p>
            {[
              ['factor_gipa','Factor GiPA','%'],['pct_pm_gipa','% Com. PM GiPA','%'],['pct_pm_serta','% Com. PM SERTA','%'],
              ['tope_pm','Tope máximo PM','$'],['pct_costo_max','% Costo máximo','%'],
              ['tope_com_ventas','Tope com. ventas','%'],['base_com_ventas','Base com. ventas','%'],
              ['delta_renovacion','Δ Renovación','%'],['delta_prospectado','Δ Prospectado','%'],
              ['delta_serta','Δ SERTA','%'],['delta_cliente_nuevo','Δ Cliente Nuevo','%'],['delta_sindicado','Δ Sindicado','%'],
            ].map(([k,label,unit])=>(
              <div key={k} className="flex items-center gap-3">

// MÓDULO REQUISICIONES DE PAGO
// ══════════════════════════════════════════════════════════════

const REGIMENES={
  fisica_factura:   {label:'Persona física con factura',    iva:true, ret_iva:true,  isr:true},
  fisica_honorarios:{label:'Persona física con honorarios', iva:true, ret_iva:true,  isr:true},
  extranjero:       {label:'Persona extranjera',            iva:false,ret_iva:false, isr:false},
  resico:           {label:'Persona física RESICO',         iva:true, ret_iva:false, isr:false},
  // compatibilidad heredada
  moral:            {label:'Persona Moral',                 iva:true, ret_iva:true,  isr:false},
  fisica_actividad_emp:{label:'Act. Empresarial',           iva:true, ret_iva:true,  isr:true},
  sin_obligaciones: {label:'Sin obligaciones',              iva:false,ret_iva:false, isr:false},
};

function calcImpuestos(subtotal, regimen){
  const r=REGIMENES[regimen]||REGIMENES['moral'];
  const iva      = r.iva      ? subtotal*0.16 : 0;
  const ret_iva  = r.ret_iva  ? (iva/3)*2     : 0;
  const ret_isr  = r.isr      ? subtotal*0.10 : 0;
  const total_pago = subtotal + iva - ret_iva - ret_isr;
  return{iva, ret_iva, ret_isr, total_pago};
}

const REQ_STATUS_COLOR={Pendiente:'blue',Autorizada:'green','Pago en proceso':'orange',Pagada:'purple',Cancelada:'red'};
const AREAS_OPT=['Calidad en el trabajo entregado','Precio adecuado','Disponibilidad y posibilidad de contactarlo','Puntualidad en entrega'];

/* ── Botón para exportar requisiciones de un proyecto a Excel ── */
function RequisicionesModule({user}){
  const isAdmin   = user.rol==='Administrador';
  const canAll    = isAdmin||user.rol==='Director'||user.rol==='Gerente'||user.perm_contabilidad||user.perm_finanzas;
  const canAprobar= isAdmin||user.rol==='Director'||user.rol==='Gerente'||user.perm_aprobar_req||user.perm_autorizar_proyectos;
  const canCreate = isAdmin||user.perm_requisiciones||user.perm_proyectos;

  const[rows,setRows]      =useState([]);
  const[proyectos,setProyectos]=useState([]);
  const[proveedores,setProveedores]=useState([]);
  const[directores,setDirectores]=useState([]);
  const[actividades,setActividades]=useState([]);
  const[empMap,setEmpMap]  =useState({});
  const eNom =id=>empMap[String(id)]||'—';
  const pNom =id=>{const p=proyectos.find(x=>String(x.id)===String(id));return p?`${p.nombre}`:'—';};
  const pNum =id=>{const p=proyectos.find(x=>String(x.id)===String(id));return p?.numero_proyecto||'';};
  const provNom=id=>{const p=proveedores.find(x=>String(x.id)===String(id));return p?.nombre||'—';};
  const provReg=id=>{const p=proveedores.find(x=>String(x.id)===String(id));return p?.regimen_fiscal||'';};
  const[loading,setLoading]=useState(true);
  const[modal,setModal]    =useState(null);
  const[sel,setSel]        =useState(null);
  const[saving,setSaving]  =useState(false);
  const[msg,setMsg]        =useState('');
  const[tab,setTab]        =useState('mis');   // 'mis'|'autorizar'|'todas'
  const[search,setSearch]  =useState('');
  const[cancelNota,setCancelNota]=useState('');
  const[evalForm,setEvalForm]=useState({score:8,areas:[],otro:''});

  // Form nueva requisición
  const initForm=()=>({
    proyecto_id:'',proveedor_id:'',director_id:'',tipo:'Normal',
    descripcion:'',observaciones:'',
    items:[{actividad:'',cantidad:1,precio_unitario:'',total:0}],
    subtotal:0,iva:0,ret_iva:0,ret_isr:0,total_pago:0,
    regimen:'moral',
    eval_score:8,eval_areas:[],eval_otro:'',
  });
  const[form,setForm]=useState(initForm());

  const load=useCallback(async()=>{
    setLoading(true);
    try{
      // Queries independientes para que si una falla no rompa todo
      const[
        {data:reqs,  error:eReqs},
        {data:proy,  error:eProy},
        {data:provs, error:eProvs},
        {data:dirs,  error:eDirs},
        {data:acts,  error:eActs},
      ]=await Promise.all([
        sb.from('requisiciones').select(
          'id,numero_requisicion,proyecto_id,proveedor_id,director_id,creado_por,tipo,'+
          'descripcion,observaciones,subtotal,iva,ret_iva,ret_isr,total_pago,status,'+
          'fecha_envio,fecha_autorizacion,fecha_pago,motivo_cancelacion,'+
          'eval_score,eval_areas,eval_otro,eval_fecha,created_at'
        ).order('created_at',{ascending:false}),
        sb.from('proyectos').select('id,numero_proyecto,nombre,empresa,status').in('status',['Activo','Cerrado','Prospecto','Autorizado']).order('numero_proyecto',{ascending:false}),
        sb.from('proveedores').select('id,nombre,email,regimen_fiscal').eq('activo',true).order('nombre'),
        sb.from('empleados').select('id,nombre,rol').eq('activo',true).order('nombre'),
        sb.from('actividades_proveedor').select('nombre').eq('activo',true).order('orden'),
      ]);

      if(eReqs){
        console.error('Error cargando requisiciones:',eReqs.message);
        alert('⚠️ No se pudieron cargar las requisiciones:\n\n'+eReqs.message+'\n\nEjecuta SQL_COMPLETO_REQUISICIONES.sql en Supabase.');
      }

      const all=reqs||[];
      // Filtrar requisiciones por proyectos accesibles
      const isContabReq=user.perm_finanzas||user.perm_contabilidad||user.rol==='Administrador'||user.rol==='Director'||user.rol==='Gerente';
      if(isContabReq){
        setRows(all);
      }else{
        // Solo ver req de proyectos donde soy PM, colabo, o creé la req
        const myProjIds=new Set();
        // Get my colabs
        const{data:myColabs}=await sb.from('proyecto_colaboradores').select('proyecto_id').eq('empleado_id',user.id);
        (myColabs||[]).forEach(x=>myProjIds.add(String(x.proyecto_id)));
        // Get projects where I'm PM or creator
        const{data:myProjs}=await sb.from('proyectos').select('id').or(`pm_id.eq.${user.id},created_by.eq.${user.id},vendedor_id.eq.${user.id}`);
        (myProjs||[]).forEach(x=>myProjIds.add(String(x.id)));
        setRows(all.filter(r=>String(r.creado_por)===String(user.id)||myProjIds.has(String(r.proyecto_id))));
      }
      setProyectos(eProy?[]:proy||[]);
      setProveedores(eProvs?[]:provs||[]);
      const todosEmp=eDirs?[]:dirs||[];
      setDirectores(todosEmp.filter(d=>d.rol==='Administrador'||d.rol==='Director'));
      setEmpMap(todosEmp.reduce((m,e)=>{m[String(e.id)]=e.nombre;return m;},{}));
      setActividades(eActs?['Trabajo de campo','Análisis de datos','Moderación','Transcripción','Reporte','Otro']:(acts||[]).map(a=>a.nombre));
    }catch(err){
      console.error('Error en load requisiciones:',err);
      alert('❌ Error cargando módulo:\n'+err.message);
    }
    setLoading(false);
  },[canAll,user.id]);

  useEffect(()=>{load();},[load]);

  // Tabs
  const misReqs     = rows.filter(r=>String(r.creado_por)===String(user.id));
  const porAutorizar= rows.filter(r=>String(r.director_id)===String(user.id)&&r.status==='Pendiente');
  const filtered    = useMemo(()=>{
    const base=tab==='mis'?misReqs:tab==='autorizar'?porAutorizar:rows;
    if(!search)return base;
    const q=search.toLowerCase();
    return base.filter(r=>pNom(r.proyecto_id).toLowerCase().includes(q)||String(r.numero_requisicion).includes(q)||provNom(r.proveedor_id).toLowerCase().includes(q));
  },[tab,rows,misReqs,porAutorizar,search]);

  // Recalcular impuestos al cambiar items o proveedor
  const recalcItems=(items,regimen)=>{
    const subtotal=items.reduce((s,i)=>s+(parseFloat(i.total)||0),0);
    const imp=calcImpuestos(subtotal,regimen);
    return{...imp,subtotal};
  };

  const setItem=(idx,field,val)=>{
    setForm(f=>{
      const items=[...f.items];
      items[idx]={...items[idx],[field]:val};
      if(field==='cantidad'||field==='precio_unitario'){
        const c=parseFloat(field==='cantidad'?val:items[idx].cantidad)||0;
        const p=parseFloat(field==='precio_unitario'?val:items[idx].precio_unitario)||0;
        items[idx].total=c*p;
      }
      const calc=recalcItems(items,f.regimen);
      return{...f,items,...calc};
    });
  };

  const addItem=()=>setForm(f=>({...f,items:[...f.items,{actividad:'',cantidad:1,precio_unitario:'',total:0}]}));
  const removeItem=idx=>setForm(f=>{
    const items=f.items.filter((_,i)=>i!==idx);
    const calc=recalcItems(items,f.regimen);
    return{...f,items,...calc};
  });

  const onProveedorChange=pid=>{
    const p=proveedores.find(x=>String(x.id)===pid);
    const reg=p?.regimen_fiscal||'moral';
    setForm(f=>{
      const calc=recalcItems(f.items,reg);
      return{...f,proveedor_id:pid,regimen:reg,...calc};
    });
  };

  // Guardar
  const save=async(statusFinal)=>{
    setSaving(true);setMsg('');
    try{
      // Número consecutivo: max existente + 1 (siempre ≥ 30100)
      let numReq=30100;
      const{data:maxRow}=await sb.from('requisiciones')
        .select('numero_requisicion')
        .order('numero_requisicion',{ascending:false})
        .limit(1)
        .maybeSingle();
      if(maxRow?.numero_requisicion) numReq=Math.max(30100,maxRow.numero_requisicion+1);

      // INSERT directo — sin RPC
      const tipoReq=form.tipo||'Normal';
      const obj={
        numero_requisicion:numReq,
        proyecto_id:form.proyecto_id?parseInt(form.proyecto_id):null,
        proveedor_id:form.proveedor_id?parseInt(form.proveedor_id):null,
        director_id:form.director_id?parseInt(form.director_id):null,
        creado_por:user.id,
        tipo:tipoReq,
        descripcion:form.descripcion||'',
        observaciones:form.observaciones||'',
        subtotal:parseFloat(form.subtotal)||0,
        iva:parseFloat(form.iva)||0,
        ret_iva:parseFloat(form.ret_iva)||0,
        ret_isr:parseFloat(form.ret_isr)||0,
        total_pago:parseFloat(form.total_pago)||0,
        status:statusFinal||'Pendiente',
        ...(tipoReq==='Normal'?{
          eval_score:form.eval_score!==''?parseInt(form.eval_score):null,
          eval_areas:form.eval_areas||[],
          eval_otro:form.eval_otro||'',
          eval_fecha:new Date().toISOString(),
        }:{}),
      };
      const{data:ins,error:insErr}=await sb.from('requisiciones').insert(obj).select('id').single();
      if(insErr)throw insErr;
      const reqId=ins.id;

      // Partidas (ignorar si req_items no existe)
      const items=form.items.filter(i=>i.actividad||i.precio_unitario).map((i,idx)=>({
        requisicion_id:reqId,
        actividad_nombre:i.actividad||'',
        cantidad:parseFloat(i.cantidad)||1,
        precio_unitario:parseFloat(i.precio_unitario)||0,
        total:parseFloat(i.total)||0,
        orden:idx,
      }));
      if(items.length){
        const{error:itemsErr}=await sb.from('req_items').insert(items);
        if(itemsErr) console.warn('req_items no guardados:',itemsErr.message);
      }

      setMsg(`✅ Requisición #${numReq} guardada`);
      await load();
      setTimeout(()=>{setModal(null);setMsg('');},1200);
    }catch(e){
      console.error('Error guardando requisición:',e);
      setMsg('❌ '+e.message);
      alert('❌ No se pudo guardar la requisición:\n\n'+e.message+'\n\nRevisa que hayas ejecutado el SQL en Supabase.');
    }
    setSaving(false);
  };

  const cambiarStatus=async(r,st,extra={})=>{
    // Intentar RPC; si falla, UPDATE directo
    const{error:rpcErr}=await sb.rpc('fn_status_requisicion',{
      p_id:r.id,p_status:st,p_actor_id:user.id,p_motivo:extra.motivo||''
    });
    if(rpcErr){
      const upd={status:st};
      if(st==='Autorizada') upd.fecha_autorizacion=new Date().toISOString();
      if(st==='Pagada')     upd.fecha_pago=new Date().toISOString();
      if(st==='Cancelada')  upd.motivo_cancelacion=extra.motivo||'';
      const{error:updErr}=await sb.from('requisiciones').update(upd).eq('id',r.id);
      if(updErr){alert('Error: '+updErr.message);return;}
    }
    await load();setSel(null);setModal(null);setCancelNota('');
  };

  const guardarEval=async()=>{
    setSaving(true);
    const{error}=await sb.rpc('fn_evaluar_proveedor_req',{
      p_id:sel.id,p_score:evalForm.score,
      p_areas:evalForm.areas,p_otro:evalForm.otro||''
    });
    if(!error){await load();setModal(null);}
    setSaving(false);
  };

  // Email mailto
  const sendEmail=r=>{
    const prov=r.proveedores||{};
    const proy=r.proyectos||{};
    const subject=encodeURIComponent(`Requisición de pago #${r.numero_requisicion} - ${proy.nombre||''}`);
    const body=encodeURIComponent(
`Estimado proveedor ${prov.nombre||''},

Le informamos que la requisición de pago #${r.numero_requisicion} ha sido autorizada.

Para proceder con el pago, favor de emitir su factura con los siguientes datos:

  Proyecto: ${proy.nombre||''} (${proy.numero_proyecto||''})
  Concepto: ${r.descripcion||''}
  Monto neto: ${fmt(r.subtotal)}
  IVA (16%): ${fmt(r.iva)}
  Total factura: ${fmt(r.subtotal+(r.iva||0))}

Retenciones que se aplicarán al pago:
  Retención IVA: ${fmt(r.ret_iva)}
  Retención ISR: ${fmt(r.ret_isr)}
  IMPORTE DE PAGO: ${fmt(r.total_pago)}

Por favor envíe su CFDI a: ${user.email||'contabilidad@serta.com.mx'}

Cualquier duda, no dude en contactarnos.

Saludos,
${user.nombre}
SERTA de México`
    );
    window.open(`mailto:${prov.email||''}?subject=${subject}&body=${body}`);
  };

  const openView=async r=>{
    setSel(r);
    const{data:items}=await sb.from('req_items').select('*').eq('requisicion_id',r.id).order('orden');
    setSel({...r,items:items||[]});
    setEvalForm({score:r.eval_score||8,areas:r.eval_areas||[],otro:r.eval_otro||''});
    setModal('ver');
  };

  const updItem=(i,k,v)=>setForm(f=>{
    const items=[...f.items];
    items[i]={...items[i],[k]:v};
    if(k==='cantidad'||k==='precio_unitario'){
      const qty=parseFloat(k==='cantidad'?v:items[i].cantidad)||0;
      const pu=parseFloat(k==='precio_unitario'?v:items[i].precio_unitario)||0;
      items[i].total=qty*pu;
    }
    const sub=items.reduce((s,r)=>s+(r.total||0),0);
    const reg=provReg(f.proveedor_id);
    const iva=['moral','fisica_factura','fisica_honorarios','resico','fisica_actividad_emp'].includes(reg)?sub*0.16:0;
    const retIva=['moral','fisica_factura','fisica_honorarios','fisica_actividad_emp'].includes(reg)?iva*(2/3):0;
    const retIsr=['fisica_factura','fisica_honorarios','fisica_actividad_emp'].includes(reg)?sub*0.10:0;
    return{...f,items,subtotal:sub,iva,ret_iva:retIva,ret_isr:retIsr,total_pago:sub+iva-retIva-retIsr};
  });

  const delItem=i=>setForm(f=>{
    const items=f.items.filter((_,idx)=>idx!==i);
    const sub=items.reduce((s,r)=>s+(r.total||0),0);
    return{...f,items,subtotal:sub};
  });

  const guardarReq=async e=>{
    e.preventDefault();setSaving(true);setMsg('');
    try{
      const{data:r,error}=await sb.rpc('fn_crear_requisicion',{
        p_proyecto_id:parseInt(form.proyecto_id),
        p_proveedor_id:parseInt(form.proveedor_id),
        p_director_id:parseInt(form.director_id),
        p_creado_por:user.id,
        p_tipo:form.tipo||'Normal',
        p_descripcion:form.descripcion||'',
        p_observaciones:form.observaciones||'',
        p_subtotal:form.subtotal||0,
        p_iva:form.iva||0,
        p_ret_iva:form.ret_iva||0,
        p_ret_isr:form.ret_isr||0,
        p_total_pago:form.total_pago||0,
        p_regimen:form.regimen||'moral',
      });
      if(error)throw error;
      const reqId=r[0]?.id||r?.id;
      if(reqId&&form.items.length>0){
        await sb.from('req_items').insert(form.items.map((it,i)=>({
          requisicion_id:reqId,actividad_nombre:it.actividad,
          cantidad:parseFloat(it.cantidad)||1,precio_unitario:parseFloat(it.precio_unitario)||0,
          total:it.total||0,orden:i+1
        })));
      }
      setMsg('✅ Requisición creada correctamente');
      await load();
      setTimeout(()=>{setModal(null);setMsg('');},1200);
    }catch(er){setMsg('❌ '+(er.message||'Error'));}
    setSaving(false);
  };

  if(loading)return<div className="p-8"><Spin/></div>;

  return(
    <div className="p-6 max-w-full fade">
      {/* Header */}
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">📋 Requisiciones de Pago</h1>
          <p className="text-sm text-gray-500 mt-0.5">Gestión de pagos a proveedores</p>
        </div>
        {canCreate&&<Btn onClick={()=>{setForm(initForm());setMsg('');setModal('nuevo');}}>+ Nueva requisición</Btn>}
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
        {[
          ['Mis requisiciones',misReqs.length,'📄','blue'],
          ['Por autorizar',porAutorizar.length,'⏳','orange'],
          ['Autorizadas',rows.filter(r=>r.status==='Autorizada').length,'✅','green'],
          ['Pagadas',rows.filter(r=>r.status==='Pagada').length,'💸','purple'],
        ].map(([t,v,ic,c])=><StatCard key={t} title={t} value={v} icon={ic} color={c}/>)}
      </div>

            {/* Tabs */}
      <div className="flex gap-2 mb-3 flex-wrap">
        {[['mis','Mis requisiciones'],['autorizar','Por autorizar'],['todas','Todas']].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} className="text-xs px-3 py-1.5 rounded-full border transition"
            style={tab===id?{background:'#1a252f',color:'white',borderColor:'#1a252f'}:{borderColor:'#e5e7eb',color:'#6b7280'}}>{lbl}</button>
        ))}
      </div>

      {/* Search */}
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar requisicion, proyecto, proveedor..."
        className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 mb-4"/>

      {/* Tabla */}
      {filtered.length===0?<Empty msg="Sin requisiciones con estos filtros"/>:(
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="bg-gray-50 border-b border-gray-100">
                <th className="px-4 py-3 text-left">#Req</th>
                <th className="px-4 py-3 text-left">Tipo</th>
                <th className="px-4 py-3 text-left hidden md:table-cell">Proyecto</th>
                <th className="px-4 py-3 text-left hidden md:table-cell">Proveedor</th>
                <th className="px-4 py-3 text-right">Total</th>
                <th className="px-4 py-3 text-center">Status</th>
                <th className="px-4 py-3 text-right">Acciones</th>
              </tr></thead>
              <tbody className="divide-y divide-gray-50">
                {filtered.map(r=>{
                  const sc=r.status==='Pendiente'?'orange':r.status==='Autorizada'?'blue':r.status==='Pago en proceso'?'purple':r.status==='Pagada'?'green':r.status==='Cancelada'?'red':'gray';
                  return(<tr key={r.id} className="hover:bg-gray-50/70 transition">
                    <td className="px-4 py-3 font-mono font-bold text-gray-700">#{r.numero_requisicion}</td>
                    <td className="px-4 py-3"><Badge text={r.tipo||'Normal'} color="gray"/></td>
                    <td className="px-4 py-3 hidden md:table-cell text-gray-600 text-xs">{pNom(r.proyecto_id)||'—'}</td>
                    <td className="px-4 py-3 hidden md:table-cell text-gray-600 text-xs">{provNom(r.proveedor_id)||'—'}</td>
                    <td className="px-4 py-3 text-right font-mono font-bold text-gray-800">{fmt(r.total_pago)}</td>
                    <td className="px-4 py-3 text-center"><Badge text={r.status} color={sc}/></td>
                    <td className="px-4 py-3">
                      <div className="flex items-center justify-end gap-1 flex-wrap">
                        <Btn size="sm" color="outline" onClick={()=>openView(r)}>Ver</Btn>
                        {canAprobar&&r.status==='Pendiente'&&(
                          <><Btn size="sm" color="green" onClick={()=>{setSel(r);setModal('autorizar');}}>Autorizar</Btn>
                          <Btn size="sm" color="red" onClick={()=>{setSel(r);setCancelNota('');setModal('rechazar');}}>Rechazar</Btn></>
                        )}
                        {(canAll||user.perm_finanzas)&&(r.status==='Autorizada'||r.status==='Pago en proceso')&&(
                          <Btn size="sm" color="outline" onClick={()=>{setSel(r);setModal('pago');}}>Pago</Btn>
                        )}
                        {(String(r.creado_por)===String(user.id)||canAll)&&r.status==='Pendiente'&&(
                          <Btn size="sm" color="red" onClick={()=>{setSel(r);setCancelNota('');setModal('cancelar');}}>Cancelar</Btn>
                        )}
                      </div>
                    </td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {modal==='ver'&&sel&&(
        <Modal title={"Requisicion #"+sel.numero_requisicion} onClose={()=>{setModal(null);setSel(null);}} size="xl">
          <div className="space-y-4">
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              {[['Proyecto',pNom(sel.proyecto_id)],['Proveedor',provNom(sel.proveedor_id)],['Tipo',sel.tipo||'Normal'],
                ['Status',sel.status],['Total a Pagar',fmt(sel.total_pago)],['Creado por',eNom(sel.creado_por)]
              ].map(([k,v])=>(<div key={k} className="bg-gray-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-0.5">{k}</p><p className="text-sm font-medium text-gray-800">{v||'—'}</p></div>))}
            </div>
            {sel.descripcion&&<div className="bg-blue-50 rounded-xl p-3"><p className="text-xs text-gray-500 mb-1">Descripcion</p><p className="text-sm">{sel.descripcion}</p></div>}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {[['Subtotal',fmt(sel.subtotal)],['IVA',fmt(sel.iva)],['Ret.IVA',fmt(sel.ret_iva)],['Ret.ISR',fmt(sel.ret_isr)]].map(([k,v])=>(
                <div key={k} className="bg-gray-50 rounded-xl p-2 text-center"><p className="text-xs text-gray-500">{k}</p><p className="font-mono font-bold text-sm">{v}</p></div>
              ))}
            </div>
            {sel.items&&sel.items.length>0&&(
              <div className="rounded-xl border border-gray-200 overflow-hidden">
                <table className="w-full text-xs">
                  <thead><tr className="bg-gray-50 border-b"><th className="px-3 py-2 text-left">Actividad</th><th className="px-3 py-2 text-center">Cant.</th><th className="px-3 py-2 text-right">P.Unit.</th><th className="px-3 py-2 text-right">Total</th></tr></thead>
                  <tbody>{sel.items.map((it,i)=>(
                    <tr key={i} className="border-b last:border-0"><td className="px-3 py-2">{it.actividad_nombre}</td><td className="px-3 py-2 text-center">{it.cantidad}</td><td className="px-3 py-2 text-right">{fmt(it.precio_unitario)}</td><td className="px-3 py-2 text-right font-mono">{fmt(it.total)}</td></tr>
                  ))}</tbody>
                </table>
              </div>
            )}
            <div className="flex justify-end gap-2 pt-2">
              {canAprobar&&sel.status==='Pendiente'&&<><Btn color="red" onClick={()=>setModal('rechazar')}>Rechazar</Btn><Btn color="green" onClick={()=>setModal('autorizar')}>Autorizar</Btn></>}
              {(canAll||user.perm_finanzas)&&(sel.status==='Autorizada'||sel.status==='Pago en proceso')&&<Btn onClick={()=>setModal('pago')}>Registrar pago</Btn>}
            </div>
          </div>
        </Modal>
      )}

      {modal==='autorizar'&&sel&&(
        <Modal title="Autorizar requisicion" onClose={()=>setModal(null)} size="sm">
          <p className="text-sm text-gray-600 mb-4">Autorizar requisicion <strong>{"#"+sel.numero_requisicion}</strong> por <strong>{fmt(sel.total_pago)}</strong></p>
          <div className="flex justify-end gap-2"><Btn color="gray" onClick={()=>setModal(null)}>Cancelar</Btn><Btn color="green" disabled={saving} onClick={()=>cambiarStatus(sel,'Autorizada')}>{saving?'...':'Autorizar'}</Btn></div>
        </Modal>
      )}

      {(modal==='rechazar'||modal==='cancelar')&&sel&&(
        <Modal title={modal==='rechazar'?'Rechazar':'Cancelar'} onClose={()=>setModal(null)} size="sm">
          <Textarea label="Motivo" value={cancelNota} onChange={setCancelNota} rows={3}/>
          <div className="flex justify-end gap-2 mt-3"><Btn color="gray" onClick={()=>setModal(null)}>Atras</Btn><Btn color="red" disabled={saving} onClick={()=>cambiarStatus(sel,'Cancelada',{motivo:cancelNota})}>{saving?'...':'Confirmar'}</Btn></div>
        </Modal>
      )}

      {modal==='pago'&&sel&&(
        <Modal title="Registrar pago" onClose={()=>setModal(null)} size="sm">
          <p className="text-sm text-gray-600 mb-4">Requisicion <strong>{"#"+sel.numero_requisicion}</strong> — <strong>{fmt(sel.total_pago)}</strong></p>
          <div className="flex justify-end gap-2"><Btn color="gray" onClick={()=>setModal(null)}>Cancelar</Btn><Btn disabled={saving} onClick={()=>cambiarStatus(sel,'Pagada')}>{saving?'...':'Marcar como pagada'}</Btn></div>
        </Modal>
      )}

      {modal==='nuevo'&&(
        <Modal title="Nueva requisicion de pago" onClose={()=>setModal(null)} size="xl">
          <form onSubmit={guardarReq}>
            <div className="space-y-4">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="flex flex-col gap-1">
                  <label className="text-xs font-medium text-gray-600">Proyecto</label>
                  <select value={form.proyecto_id} onChange={e=>setForm(f=>({...f,proyecto_id:e.target.value}))} required className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
                    <option value="">Seleccionar...</option>
                    {proyectos.filter(p=>p.status!=='Cerrado'&&p.status!=='Cancelado').map(p=><option key={p.id} value={p.id}>{"#"+p.numero_proyecto+" "+p.nombre}</option>)}
                  </select>
                </div>
                <div className="flex flex-col gap-1">
                  <label className="text-xs font-medium text-gray-600">Proveedor</label>
                  <select value={form.proveedor_id} onChange={e=>onProveedorChange(e.target.value)} required className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
                    <option value="">Seleccionar...</option>
                    {proveedores.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
                  </select>
                </div>
                <div className="flex flex-col gap-1">
                  <label className="text-xs font-medium text-gray-600">Director autorizador</label>
                  <select value={form.director_id} onChange={e=>setForm(f=>({...f,director_id:e.target.value}))} required className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
                    <option value="">Seleccionar...</option>
                    {directores.map(d=><option key={d.id} value={d.id}>{d.nombre}</option>)}
                  </select>
                </div>
                <Sel label="Tipo" value={form.tipo} onChange={v=>setForm(f=>({...f,tipo:v}))} options={['Normal','Viaticos','Anticipos'].map(x=>({value:x,label:x}))}/>
              </div>
              <Input label="Descripcion / Concepto" value={form.descripcion} onChange={v=>setForm(f=>({...f,descripcion:v}))} required/>
              <div className="rounded-xl border border-gray-200 overflow-hidden">
                <div className="bg-gray-50 px-4 py-2 border-b flex items-center justify-between">
                  <p className="text-xs font-bold text-gray-600 uppercase">Partidas</p>
                  <button type="button" onClick={addItem} className="text-xs px-3 py-1 rounded-lg text-white font-medium" style={{background:'#00b5b5'}}>+ Agregar</button>
                </div>
                <table className="w-full text-xs">
                  <thead><tr className="bg-gray-50 border-b"><th className="px-2 py-2 text-left">Actividad</th><th className="px-2 py-2 text-center w-16">Cant.</th><th className="px-2 py-2 text-right w-28">P.Unit.</th><th className="px-2 py-2 text-right w-24">Total</th><th className="w-8"></th></tr></thead>
                  <tbody>{form.items.map((it,i)=>(
                    <tr key={i} className="border-b last:border-0">
                      <td className="px-2 py-1"><select value={it.actividad} onChange={e=>updItem(i,'actividad',e.target.value)} className="border border-gray-200 rounded px-2 py-1 text-xs w-full bg-white"><option value="">Seleccionar...</option>{actividades.map(a=><option key={a} value={a}>{a}</option>)}</select></td>
                      <td className="px-2 py-1"><input type="number" min="1" value={it.cantidad} onChange={e=>updItem(i,'cantidad',e.target.value)} className="border border-gray-200 rounded px-2 py-1 text-xs w-full text-center"/></td>
                      <td className="px-2 py-1"><input type="number" min="0" step="0.01" value={it.precio_unitario} onChange={e=>updItem(i,'precio_unitario',e.target.value)} className="border border-gray-200 rounded px-2 py-1 text-xs w-full text-right"/></td>
                      <td className="px-2 py-1 text-right font-mono">{fmt(it.total)}</td>
                      <td className="px-2 py-1 text-center"><button type="button" onClick={()=>delItem(i)} className="text-red-400 hover:text-red-600 text-xs">x</button></td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
              <div className="bg-gray-50 rounded-xl p-4">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                  {[['Subtotal',fmt(form.subtotal)],['IVA (16%)',fmt(form.iva)],['Ret. IVA',fmt(form.ret_iva)],['Ret. ISR',fmt(form.ret_isr)]].map(([k,v])=>(<div key={k}><p className="text-xs text-gray-500">{k}</p><p className="font-mono font-bold">{v}</p></div>))}
                </div>
                <div className="mt-3 pt-3 border-t border-gray-200 flex items-center justify-between">
                  <p className="font-bold text-gray-700">Total a pagar</p>
                  <p className="text-xl font-bold" style={{color:'#00b5b5'}}>{fmt(form.total_pago)}</p>
                </div>
              </div>
              {msg&&<p className="text-sm bg-gray-50 rounded-lg px-3 py-2">{msg}</p>}
              <div className="flex justify-end gap-2 mt-2">
                <Btn color="gray" onClick={()=>setModal(null)}>Cancelar</Btn>
                <Btn type="submit" disabled={saving}>{saving?'Guardando...':'Crear requisicion'}</Btn>
              </div>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════
// APP PRINCIPAL
// ═══════════════════════════════════════════════════════════════
function App(){
  const[user,setUser]=useState(getS());
  const[mod,setMod]=useState('inicio');
  if(!user)return <LoginPage onLogin={u=>{setUser(u);setMod('inicio');}}/>;
  const logout=()=>{sessionStorage.removeItem(SK);setUser(null);};
  const isAdmin=user.rol==='Administrador';
  return(
    <div className="flex h-screen bg-gray-50 overflow-hidden">
      <div className="flex flex-col w-56 shrink-0 h-full overflow-y-auto" style={{background:'linear-gradient(180deg,#1a252f 0%,#2c3e50 100%)'}}>
        <div className="px-4 py-5 border-b border-white/10">
          <SertaLogo size="md" white/>
        </div>
        <nav className="flex-1 px-2 py-3 space-y-0.5">
          {MODS.map(m=>{
            const ok=!m.perm||isAdmin||user[m.perm];
            if(!ok)return null;
            const active=mod===m.id;
            return(<button key={m.id} onClick={()=>setMod(m.id)}
              className={"w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition text-left "+(active?'sidebar-item-active text-white':'text-white/60 hover:bg-white/10 hover:text-white')}>
              <span className="text-base">{m.icon}</span>{m.label}
            </button>);
          })}
        </nav>
        <div className="px-4 py-4 border-t border-white/10">
          <div className="flex items-center gap-2 mb-3">
            <Avatar nombre={user.nombre} foto_url={user.foto_url} size="sm"/>
            <div className="flex-1 min-w-0">
              <p className="text-xs font-medium text-white truncate">{user.nombre}</p>
              <p className="text-xs text-white/40 truncate">{user.rol}</p>
            </div>
          </div>
          <button onClick={logout} className="w-full text-xs text-white/40 hover:text-white/70 py-1 transition text-left">{"←"} Cerrar sesión</button>
        </div>
      </div>
      <div className="flex-1 overflow-auto">
        {mod==='inicio'&&<Dashboard user={user}/>}
        {mod==='rrhh'&&<RRHHModule user={user}/>}
        {mod==='proveedores'&&<ProveedoresModule user={user}/>}
        {mod==='clientes'&&<ClientesModule user={user}/>}
        {mod==='ventas'&&<VentasModule user={user}/>}
        {mod==='proyectos'&&<ProyectosModule user={user}/>}
        {mod==='requisiciones'&&<RequisicionesModule user={user}/>}
        {mod==='comisiones'&&<ComisionesModule user={user}/>}
        {mod==='finanzas'&&<div className="p-6"><Empty msg="Módulo Finanzas — próximamente"/></div>}
        {mod==='calidad'&&<div className="p-6"><Empty msg="Módulo Calidad — próximamente"/></div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
